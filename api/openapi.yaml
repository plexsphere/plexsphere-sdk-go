      summary: Look up a Project's management-cluster assignment.
      tags:
      - management-fleet
  /v1/projects/{project_id}/management-cluster-assignment/terminate:
    post:
      description: |
        Advances the namespace lifecycle phase of the Project
        identified by `{project_id}` to `Terminating`, signalling the
        reconciliation loop to tear the namespace down. The handler
        runs a `manage` ReBAC check on the `managementfleet:fleet`
        singleton.

        The call is idempotent: a namespace already `Terminating` or
        `Deleted` is returned unchanged with `200`. This is the ONLY
        assignment mutation on the operator surface — assignment
        creation, re-pointing, and the final unassign remain
        reconciliation/broker-driven so the assignment-immutability
        invariant cannot be bypassed over HTTP.
      operationId: TerminateProjectManagementClusterAssignment
      parameters:
      - $ref: "#/components/parameters/ManagementFleetProjectID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectClusterAssignmentResponse"
          description: |
            Teardown requested (or already in progress — the call is
            idempotent). Body is the assignment with
            `namespace_phase` advanced to `Terminating` (or its
            unchanged terminal phase).
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed Project id. Body is a `Problem` with
            `code: invalid_project_id`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the management fleet.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The Project has no management-cluster assignment. Body is a
            `Problem` with `code: management_assignment_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Request teardown of a Project's namespace.
      tags:
      - management-fleet
  /v1/projects:
    get:
      description: |
        Returns a slug-ordered page of tenancy Projects the caller is
        authorised to see. Per-row
        visibility is layered on top of the page: rows the caller
        cannot `read` are filtered out so the response items are a
        subset of the persistence-level page. The optional `domain_id`
        query parameter scopes the page to a single parent Domain.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListProjects
      parameters:
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      - description: |
          Optional filter scoping the page to a single parent
          Domain. Omit to page across every Domain the caller is
          authorised to see.
        explode: true
        in: query
        name: domain_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                  domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                  name: Acme Web
                  slug: acme-web
                  description: Web tier of Acme production.
                  sub_range_cidr: 10.42.4.0/22
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T10:00:00Z
                next_cursor: eyJzbHVnIjoiYWNtZS13ZWIifQ.signed
              schema:
                $ref: "#/components/schemas/ProjectList"
          description: Page of Projects.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor, an out-of-range limit, or a malformed
            `domain_id` filter.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to list Projects (body is a
            `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem`
            with `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List tenancy Projects.
      tags:
      - tenancy
    post:
      description: |
        Creates a new Project under the parent Domain identified by
        `domain_id`. The aggregate enforces every
        issuance invariant — non-zero parent Domain id, non-empty Name,
        kebab-case Slug, optional canonical RFC 4632 sub-range
        reservation. Cross-Project sub-range non-overlap inside the
        parent Domain is policed by the SQL GIST exclusion on
        `plexsphere.project_mesh_ip_reservations` and surfaces as
        `409 sub_range_overlap`; a duplicate (domain_id, slug) surfaces
        as `409 project_slug_conflict`.

        On success the handler emits a `project.create` audit row and
        appends a `ProjectCreated` outbox event in the same transaction
        .
      operationId: CreateProject
      requestBody:
        content:
          application/json:
            example:
              domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
              name: Acme Web
              slug: acme-web
              description: Web tier of Acme production.
              sub_range_cidr: 10.42.4.0/22
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              example:
                id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                name: Acme Web
                slug: acme-web
                description: Web tier of Acme production.
                sub_range_cidr: 10.42.4.0/22
                created_at: 2026-05-02T10:00:00Z
                updated_at: 2026-05-02T10:00:00Z
              schema:
                $ref: "#/components/schemas/ProjectResponse"
          description: Project created.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/invalid-project
                title: Invalid Project
                status: 400
                detail: 'Project.Name must not be empty or whitespace-only '
                instance: /v1/projects
                code: invalid_project
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Aggregate invariant rejected the body — empty Name,
            malformed Slug, malformed `sub_range_cidr`, etc. Body is a
            `Problem` with `code` ∈ { `invalid_project`, `invalid_body`
            }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to create Projects under the
            parent Domain. Body is a `PermissionDenied` problem
            carrying the ReBAC denial `reason`, `relation_path`, and
            `correlation_id`.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/sub-range-overlap
                title: Sub-range Overlap
                status: 409
                detail: sub_range_cidr 10.42.4.0/22 overlaps an existing Project's
                  reservation
                instance: /v1/projects
                code: sub_range_overlap
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Conflict — the proposed Project collides with a persisted
            Project in the same Domain. Body is a `Problem` with
            `code` ∈ { `project_slug_conflict`, `sub_range_overlap`,
            `parent_domain_missing` }.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB tenancy ceiling enforced
            by the handler.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Create a tenancy Project.
      tags:
      - tenancy
  /v1/projects/{id}:
    delete:
      description: |
        Deletes the Project identified by `{id}`.
        The empty-aggregate guard runs inside the same transaction as
        the row delete; at least one persisted Resource, Node, or
        relation tuple forces `409 project_not_empty` with the
        `ProjectChildCounts` payload in the Problem detail so the
        operator knows which sub-aggregate to drain first. A
        concurrent INSERT racing the guard is caught by
        defense-in-depth — the foreign-key violation surfaces as the
        same `409` so the caller never observes a half-deleted
        Project.
      operationId: DeleteProject
      parameters:
      - $ref: "#/components/parameters/ProjectID"
      responses:
        "204":
          description: Project deleted.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Path `{id}` was not a non-zero UUID. Body is a `Problem`
            with `code: invalid_project_id`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to delete the addressed Project.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Project not found. Body is a `Problem` with
            `code: project_not_found`.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/project-not-empty
                title: Project Not Empty
                status: 409
                detail: "Project still owns: resources=2, nodes=1, relation_tuples=3"
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                code: project_not_empty
                project_child_counts:
                  resources: 2
                  nodes: 1
                  relation_tuples: 3
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Project still owns at least one child aggregate. Body is
            a `Problem` with `code: project_not_empty` and the
            optional `project_child_counts` extension carrying the
            structured `ProjectChildCounts` so the operator knows
            which sub-aggregate is still attached.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Delete a Project.
      tags:
      - tenancy
    get:
      description: |
        Returns the Project identified by `{id}`.
        The handler runs the `read` ReBAC check BEFORE the persistence
        read; an unauthorised caller therefore receives `403` without
        the existence side-channel a "load-then-check" flow would
        leak. A missing aggregate surfaces as `404 project_not_found`.
      operationId: GetProject
      parameters:
      - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
          description: Project found.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Path `{id}` was not a non-zero UUID. Body is a `Problem`
            with `code: invalid_project_id`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the addressed Project.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/project-not-found
                title: Project Not Found
                status: 404
                detail: no Project with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                code: project_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Project not found. Body is a `Problem` with
            `code: project_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch a Project by identifier.
      tags:
      - tenancy
    patch:
      description: |
        Patches the Project identified by `{id}`.
        The body MUST set at least one of `name`, `description`,
        `sub_range_cidr`, or `release_sub_range` — an empty body
        surfaces as `400 empty_patch`.

        DECISION: `slug` is intentionally NOT a patchable field — it
        is the URL handle exported into cached dashboard links and
        outbox projections. The handler rejects any body that carries
        a `slug` key (even with the same value) at decode time with
        `400 slug_immutable`.

        Retargeting `sub_range_cidr` triggers an in-tx
        sibling-overlap guard inside the parent Domain. A patch that
        would overlap a sibling Project's reservation surfaces as
        `422 sub_range_invalidates_allocation` carrying the offending
        `project_id` and `sub_range` in the Problem detail.
      operationId: PatchProject
      parameters:
      - $ref: "#/components/parameters/ProjectID"
      requestBody:
        content:
          application/json:
            example:
              description: Acme Web — Q3 reorg.
              sub_range_cidr: 10.42.8.0/22
            schema:
              $ref: "#/components/schemas/ProjectPatchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
          description: Project patched.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/slug-immutable
                title: Slug Immutable
                status: 400
                detail: Project.Slug is immutable; remove the slug field from the
                  patch body
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                code: slug_immutable
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid body. Body is a `Problem` with `code` ∈
            { `invalid_project`, `slug_immutable`, `empty_patch`,
            `invalid_body`, `invalid_project_id` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the addressed Project.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Project not found. Body is a `Problem` with
            `code: project_not_found`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            sub_range_cidr retarget collides with another Project's
            reservation in the same Domain. Body is a `Problem` with
            `code: sub_range_overlap`.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB tenancy ceiling
            .
        "422":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/sub-range-invalidates-allocation
                title: Sub-range Invalidates Allocation
                status: 422
                detail: proposed sub_range 10.42.8.0/22 overlaps existing project_id
                  0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0bb sub_range 10.42.8.0/24
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                code: sub_range_invalidates_allocation
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            sub_range_cidr retarget would invalidate an existing
            allocation inside the parent Domain. Body is a `Problem`
            with `code: sub_range_invalidates_allocation` carrying
            the offending `project_id` and `sub_range` in `detail`
            .
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Patch mutable fields on a Project.
      tags:
      - tenancy
  /v1/domains/{id}/identities:
    get:
      description: |
        Returns a cursor-paginated page of principals attached to the
        addressed Domain. The handler runs the
        `read` ReBAC check on `domain:<id>` BEFORE the persistence
        read; an unauthorised caller therefore receives `403` without
        the existence side-channel a "load-then-check" flow would
        leak. The optional `kind` query parameter narrows the page to
        a single principal kind (`user` or `service-identity`); omit
        to page across both kinds in the same Domain.

        The summary projection NEVER carries plaintext
        `external_subject` or `email`. Auditor-only fields are reachable
        only via `GET /v1/domains/{id}/identities/{principalId}`
        .

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.

        On every served page the handler emits one
        `identity.list` audit row.
      operationId: ListIdentities
      parameters:
      - $ref: "#/components/parameters/DomainID"
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400 invalid_cursor`
          .
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      - description: |
          Optional principal-kind filter. Values outside the closed
          set surface as `400 invalid_kind`.
        explode: true
        in: query
        name: kind
        required: false
        schema:
          $ref: "#/components/schemas/IdentityKind"
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1
                  kind: user
                  domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                  display_name: Ada Lovelace
                  external_subject_pseudonym: 9f2c7c0d2a3a4b8d1e6c8a7f5b3d2e1c0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d
                  last_sign_in_at: 2026-05-02T09:30:00Z
                  created_at: 2026-05-01T10:00:00Z
                next_cursor: null
              schema:
                $ref: "#/components/schemas/IdentityList"
          description: Page of identity summaries.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/invalid-kind
                title: Invalid Identity Kind
                status: 400
                detail: "kind query parameter must be one of {user, service-identity}"
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1/identities
                code: invalid_kind
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameter — typically a tampered or
            malformed cursor (`code: invalid_cursor`), out-of-range
            limit (`code: invalid_limit`), or `kind` not in
            {user, service-identity} (`code: invalid_kind`).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `read` ReBAC relation on the addressed
            Domain (body is a `PermissionDenied` problem) OR the
            pagination cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay
            (body is a `Problem` with `code = cursor_binding_mismatch`).
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain not found. Surfaced only after the authorisation
            gate has passed so the endpoint cannot be used as a
            Domain-id oracle.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List principals (users + service identities) on a Domain.
      tags:
      - tenancy
