  /v1/approvals:
    get:
      description: |
        Returns a creation-ordered page of Approval lifecycle metadata
        across the approval queue, optionally narrowed to a single
        lifecycle `status` and/or a single owning `domain_id`. The
        handler runs the approval-read ReBAC check BEFORE the
        persistence read, then layers a per-row visibility filter on
        top so the response items are the subset of the persistence-
        level page the caller is authorised to see.

        The projection carries the proposal identity, the owning Domain,
        the proposer, the proposed action and target, the lifecycle
        state, the decision metadata once a terminal state is reached,
        and the names-only audit caveat projection.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListApprovals
      parameters:
      - description: |
          Optional lifecycle filter. When present, only Approvals in
          the named state are returned.
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/ApprovalState"
        style: form
      - description: |
          Optional owning-Domain filter. When present, only Approvals
          belonging to the named Domain are returned.
        explode: true
        in: query
        name: domain_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the read service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f1
                  domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1
                  proposer_subject: user:alice
                  action_kind: cloud.credential.rotate
                  target_resource: cloud-credential:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
                  payload: {}
                  state: pending-approval
                  created_at: 2026-05-02T10:00:00Z
                  expires_at: 2026-05-03T10:00:00Z
                next_cursor: eyJjIjoiMDE5MGE4YjgifQ.signed
              schema:
                $ref: "#/components/schemas/ApprovalList"
          description: Page of Approvals.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor, an out-of-range `limit`, or a malformed
            `domain_id` filter.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the approval queue (body is
            a `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem` with
            `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List dual-control Approvals.
      tags:
      - approvals
