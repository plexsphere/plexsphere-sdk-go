            schema:
              $ref: "#/components/schemas/RevokeSessionRequest"
        required: true
      responses:
        "204":
          description: |
            Session revoked (or already revoked — the operation is
            idempotent). No body.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈ {
            `invalid_session_id`, `invalid_body` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to revoke this Session. Body is a
            `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Session not found. Body is a `Problem` with
            `code: session_not_found`.
        "501":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The access-orchestrator surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `access_session_not_provisioned`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      security:
      - operatorBearer: []
      summary: Instantly revoke a live mediated session.
      tags:
      - access
  /v1/nodes/{id}/sessions/{session_id}:
    post:
      description: |
        Accepts a per-kind session-activity callback from the target plexd
        and appends it to the session's append-only activity log, touching
        the session's last-active timestamp so the idle-timeout sweeper
        sees progress. The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             rejecting revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `nsk_node_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node's session.
          3. Appends the reported per-kind activity row. An `ssh` session
             records `command_executed` / `command_exited` activity; a
             `k8s` session records `api_request` activity; a `tcp` session
             records exactly a `session_started` and a `session_ended`
             pair — the TCP shape is deliberately payload-blind, with no
             L7 parsing.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the callback service and its NSK validator, every request
        to this endpoint returns 501 with `code:
        access_session_not_provisioned` so log scrapers can alert on the
        deferred-wiring state.
      operationId: PostNodeSessionCallback
      parameters:
      - description: Node identifier (UUIDv7) — the callback scope.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Session identifier (UUIDv7) the activity belongs to.
        explode: false
        in: path
        name: session_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: |
          `Bearer <NSK plaintext>` — the per-Node Node Secret Key issued
          at registration time. The NSK is bound to the Node addressed by
          the path `id`; a credential belonging to a different Node
          surfaces as 403 `nsk_node_mismatch`.
        explode: false
        in: header
        name: Authorization
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              ssh:
                command: journalctl -u plexd
                exit_code: 0
                started_at: 2026-05-02T10:06:00Z
                completed_at: 2026-05-02T10:06:02Z
            schema:
              $ref: "#/components/schemas/SessionActivityRequest"
        required: true
      responses:
        "204":
          description: Activity recorded. No body.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Callback body failed structural validation — an invalid JSON
            envelope or an activity variant that does not match the
            session's kind.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code` field
            is `nsk_revoked` so log scrapers can distinguish credential
            revocation from generic auth failures.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            The NSK authenticates successfully but belongs to a different
            Node than the path `id`. The PermissionDenied body's `code`
            field is `nsk_node_mismatch`.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            No Session resolves for the addressed `(id, session_id)` pair.
            Body is a `Problem` with `code: session_not_found`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The Session is no longer live. Body is a `Problem` with `code`
            ∈ { `session_already_revoked`, `session_expired` }.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/access-session-not-provisioned
                title: Not Implemented
                status: 501
                detail: "POST /v1/nodes/{id}/sessions/{session_id} requires the production\
                  \ wiring of the session-callback service and its NSK validator.\
                  \ One or more ports are not yet provisioned in this build."
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/sessions/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f2
                code: access_session_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The session-callback surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `access_session_not_provisioned`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Report per-kind session activity from a Node.
      tags:
      - access
components:
  parameters:
    DomainID:
      description: |
        Domain identifier (UUIDv7). Bound on `/v1/domains/{id}` for
        the tenancy CRUD surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    CloudID:
      description: |
        Cloud identifier (UUIDv7). Bound on `/v1/clouds/{id}` for the
        Cloud Inventory CRUD surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    CloudCredentialID:
      description: |
        Cloud Credential identifier (UUIDv7). Bound on
        `/v1/cloud-credentials/{id}` and
        `/v1/cloud-credentials/{id}/revoke` for the operator-facing
        Cloud Credentials read + revoke surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    BlueprintID:
      description: |
        Blueprint identifier (UUIDv7). Bound on `/v1/blueprints/{id}`
        for the read-only Blueprint Catalog surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ResourceID:
      description: |
        Resource identifier (UUIDv7). Bound on `/v1/resources/{id}`
        for the Tenancy Resource read + delete surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ResourceProjectID:
      description: |
        Owning Project (UUIDv7). Bound on
        `/v1/projects/{project_id}/resources` for the Resource
        collection — create and list. Reused by the Bridge Orchestrator
        surface under
        `/v1/projects/{project_id}/resources/{resource_id}/bridge/...`.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    BridgeResourceID:
      description: |
        Addressed bridge Resource (UUIDv7). Bound on every
        `/v1/projects/{project_id}/resources/{resource_id}/bridge/...`
        operation. A Resource that exists but is not kind `bridge`
        surfaces as `409 resource_not_bridge` on every mutating call.
      explode: false
      in: path
      name: resource_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    BridgeSlug:
      description: |
        Stable slug of a bridge user-access provider, public-ingress
        rule, or site-to-site tunnel. Bound on the `/{slug}` sub-resource
        operations. Unique per `(resource_id, slug)` within its
        aggregate kind.
      explode: false
      in: path
      name: slug
      required: true
      schema:
        maxLength: 63
        pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
        type: string
      style: simple
    ProjectID:
      description: |
        Project identifier (UUIDv7). Bound on `/v1/projects/{id}` for
        the tenancy CRUD surface and on
        `/v1/projects/{id}/credentials` for the operator-facing
        OpenBao Credential Broker inventory list.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    CredentialID:
      description: |
        Credential identifier (UUIDv7). Bound on
        `/v1/credentials/{id}`, `/v1/credentials/{id}/revoke`, and
        `/v1/credentials/{id}/rotate` for the operator-facing OpenBao
        Credential Broker read + lifecycle surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    CredentialAssignmentID:
      description: |
        Credential Assignment identifier (UUIDv7). Bound on
        `/v1/credential-assignments/{id}/approve`,
        `/v1/credential-assignments/{id}/reject`, and
        `/v1/credential-assignments/{id}/revoke` for the Credential
        Assignment decision surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    IntegrityViolationID:
      description: |
        Integrity-violation identifier (UUIDv7). Bound on
        `/v1/integrity-violations/{id}/acknowledge` for the triage
        acknowledge surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ApprovalID:
      description: |
        Approval identifier (UUIDv7). Bound on
        `/v1/approvals/{id}`, `/v1/approvals/{id}/approve`,
        `/v1/approvals/{id}/reject`, and
        `/v1/approvals/{id}/break-glass` for the dual-control approval
        read + decision surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ExecutionProjectID:
      description: |
        Owning Project. The Action Orchestrator dispatch and read
        operations are scoped per Project, so every operator-facing
        endpoint requires the Project identifier in the path.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ExecutionID:
      description: |
        Execution identifier (UUIDv7). Bound on
        `/v1/projects/{project_id}/executions/{execution_id}` for the
        single-Execution read.
      explode: false
      in: path
      name: execution_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    SessionProjectID:
      description: |
        Owning Project. The Access Orchestrator issue, list, read, and
        revoke operations are scoped per Project, so every operator-facing
        endpoint requires the Project identifier in the path.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    SessionID:
      description: |
        Session identifier (UUIDv7). Bound on
        `/v1/projects/{project_id}/sessions/{session_id}`, its `:revoke`
        sub-resource, and its `/attach` WebSocket gateway for the
        single-Session read, revoke, and attach.
      explode: false
      in: path
      name: session_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    SecretInventoryProjectID:
      description: |
        Owning Project. The operator-facing Secret Store inventory is scoped
        per Project, so the listing endpoint requires the Project identifier
        in the path.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    BootstrapTokenProjectID:
      description: |
        Owning Project. The BootstrapToken aggregate is scoped per
        Project so every administration endpoint requires the Project
        identifier in the path.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ManagementClusterID:
      description: |
        Management cluster identifier (UUIDv7). Bound on
        `/v1/management-clusters/{id}` and
        `/v1/management-clusters/{id}/assignments` for the
        operator-facing Management Fleet surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ManagementFleetProjectID:
      description: |
        Owning Project (UUIDv7). Bound on
        `/v1/projects/{project_id}/management-cluster-assignment` and
        its `/terminate` sub-resource — the Management Fleet assignment
        is keyed by the Project it places.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    AuditDomainID:
      description: |
        Owning Domain. The Platform Audit Log is per-Domain by
        residency contract — cross-Domain decisions land in EACH
        affected Domain's chain, never on a shared system chain
        . Every audit endpoint requires the Domain
        identifier in the path.
      explode: false
      in: path
      name: domainId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    PrincipalID:
      description: |
        Principal identifier (UUIDv7). Bound on
        `/v1/domains/{id}/identities/{principalId}` for the per-Domain
        identity-read surface.
      explode: false
      in: path
      name: principalId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    InvitationID:
      description: |
        Invitation identifier (UUIDv7). Bound on
        `/v1/domains/{id}/invitations/{invitationId}` for the per-
        Domain invitation read / revoke surface.
      explode: false
      in: path
      name: invitationId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    RelationTupleID:
      description: |
        Relation tuple identifier (UUIDv7). Bound on
        `/v1/authz/relation-tuples/{id}` for the per-tuple PATCH /
        DELETE surface.
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    PolicyProjectID:
      description: |
        Owning Project (UUIDv7). Bound on every
        `/v1/projects/{project_id}/policies/...` operation — the
        Policy aggregate is per-Project and the dual ReBAC check uses
        the Project as the second relation target.
      explode: false
      in: path
      name: project_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    PolicyID:
      description: |
        Policy identifier (UUIDv7). Bound on every
        `/v1/projects/{project_id}/policies/{policy_id}/...` operation.
      explode: false
      in: path
      name: policy_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    PolicyRevisionID:
      description: |
        Revision identifier (UUIDv7). Bound on
        `/v1/projects/{project_id}/policies/{policy_id}/revisions/{revision_id}`.
        Revisions that do not belong to the addressed Policy surface
        as `404 revision_not_visible`.
      explode: false
      in: path
      name: revision_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ArtifactVersion:
      description: |
        plexd release version the registry indexes — the upstream
        release tag, for example a semver tag such as `v1.4.2`. Bound on
        `/v1/artifacts/plexd/{version}` and its `.sigstore` companion
        for the read-only plexd release registry surface.
      explode: false
      in: path
      name: version
      required: true
      schema:
        type: string
      style: simple
    Authorization:
      description: |
        `Bearer <access token>` — the operator bearer credential the
        request authenticates with. A missing, malformed, or rejected
        token surfaces as `401`.
      explode: false
      in: header
      name: Authorization
      required: true
      schema:
        type: string
      style: simple
  schemas:
    HealthStatus:
      description: Aggregated health state of the plexsphere process.
      example:
        status: ok
        checks:
        - name: database
          status: ok
          detail: postgres reachable in 3ms
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus_status"
        checks:
          description: Per-dependency health checks.
          items:
            $ref: "#/components/schemas/HealthCheck"
          type: array
      required:
      - checks
      - status
    HealthCheck:
      description: Single dependency probe result.
      example:
        name: database
        status: ok
        detail: postgres reachable in 3ms
      properties:
        name:
          description: Stable identifier of the checked dependency.
          type: string
        status:
          description: "Outcome of the probe (ok, degraded, down)."
          type: string
        detail:
          description: Human-readable context for the outcome.
          type: string
      required:
      - detail
      - name
      - status
    VersionInfo:
      description: Build metadata baked into the running binary.
      example:
        version: v0.1.0
        commit: fdfb5ba9c1
        date: 2026-04-19T12:00:00Z
      properties:
        version:
          description: "Semver tag of the release, e.g. \"v0.1.0\"."
          type: string
        commit:
          description: Git commit SHA the binary was built from.
          type: string
        date:
          description: RFC 3339 timestamp of the build.
          format: date-time
          type: string
      required:
      - commit
      - date
      - version
    Problem:
      description: |
        RFC 9457 problem-details object. The optional `code` field is a
        plexsphere extension that carries the machine-readable error
        taxonomy (RFC 8628 device-flow codes, federation_kind_mismatch,
        etc.).
      example:
        type: https://plexsphere.dev/errors/not-found
        title: Not Found
        status: 404
        detail: No route matched the request.
        instance: /v1/unknown
      properties:
        type:
          description: URI reference that identifies the problem type.
          type: string
        title:
          description: "Short, human-readable summary of the problem."
          type: string
        status:
          description: HTTP status code generated for this occurrence.
          type: integer
        detail:
          description: Human-readable explanation specific to this occurrence.
          type: string
        instance:
          description: URI reference identifying the specific occurrence.
          type: string
        code:
          description: |
            Optional machine-readable error code. Device-flow errors use
            the RFC 8628 taxonomy (`authorization_pending`, `slow_down`,
            `access_denied`, `expired_token`, `invalid_grant`); service
            token mismatches use `federation_kind_mismatch`.

            Tenancy Domain CRUD
            adds the closed taxonomy below. Each code maps to exactly one
            repo / service sentinel and one HTTP status — see
            `docs/reference/platform/http.md#tenancy-domain-crud-px-0026`:

              * `domain_slug_conflict` — 409, CreateDomain duplicate slug.
              * `mesh_cidr_overlap` — 409, mesh_cidr collides with another Domain (Create / Patch).
              * `invalid_domain` — 400, aggregate invariant rejected the body.
              * `invalid_domain_id` — 400, path `{id}` was not a non-zero UUID.
              * `domain_not_found` — 404, the addressed Domain does not exist or is not visible.
              * `slug_immutable` — 400, `PatchDomain` body carried a `slug` field.
              * `empty_patch` — 400, `PatchDomain` body had no mutable fields set.
              * `invalid_reachability_policy` — 400, `reachability` partial fill (a non-zero policy must set every threshold).
              * `mesh_cidr_invalidates_subrange` — 422, mesh_cidr retarget would orphan an existing project sub-range.
              * `domain_not_empty` — 409, `DeleteDomain` blocked by remaining child aggregates (see `DomainChildCounts`).
              * `permission_denied` — 403, ReBAC denied the operation. Emitted via the dedicated `PermissionDenied` schema (Story 8 deviation note).
              * `unauthenticated` — 401, no resolved principal on the request.
              * `invalid_limit` — 400, `ListDomains` `limit` query parameter was outside `[1, 200]`.
              * `invalid_cursor` — 400, `ListDomains` opaque cursor was tampered or malformed (HMAC mismatch).
              * `cursor_binding_mismatch` — 403, `ListDomains` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay).
              * `invalid_body` — 400, request body was not a valid `DomainCreateRequest` / `DomainPatchRequest` JSON document.
              * `request_body_too_large` — 413, request body exceeded the 8 KiB tenancy ceiling.

            Tenancy Project CRUD
            adds the closed taxonomy below. Each code maps to exactly one
            repo / service sentinel and one HTTP status:

              * `project_slug_conflict` — 409, CreateProject duplicate (domain_id, slug).
              * `sub_range_overlap` — 409, sub_range_cidr overlaps a sibling Project's reservation.
              * `parent_domain_missing` — 409, FK violation on Create — the parent Domain does not exist.
              * `invalid_project` — 400, aggregate invariant rejected the body.
              * `invalid_project_id` — 400, path `{id}` was not a non-zero UUID.
              * `invalid_domain_filter` — 400, ListProjects `domain_id` query parameter was malformed.
              * `project_not_found` — 404, the addressed Project does not exist or is not visible.
              * `sub_range_invalidates_allocation` — 422, sub_range patch would invalidate an existing allocation (or contradicts itself with `release_sub_range`).
              * `project_not_empty` — 409, DeleteProject blocked by remaining child aggregates (see `ProjectChildCounts`).
              * `cursor_binding_mismatch` — 403, `ListProjects` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay).

            Tenancy Identity listing + Invitations
            adds the closed taxonomy below. Each code maps to exactly one
            repo / service sentinel and one HTTP status:

              * `invalid_kind` — 400, `kind` query parameter was not `user` or `service-identity`.
              * `invalid_principal_id` — 400, path `{principalId}` was not a non-zero UUID.
              * `identity_not_found` — 404, principal does not exist or is in a different Domain.
              * `invalid_status` — 400, `status` query parameter was not in {pending, accepted, revoked, expired, all}.
              * `invalid_invitation_id` — 400, path `{invitationId}` was not a non-zero UUID.
              * `invalid_ttl` — 400, `ttl_seconds` was outside [60, 604800].
              * `too_many_initial_tuples` — 422, `initial_tuples` exceeded the 32-entry cap.
              * `invitation_object_out_of_scope` — 422, an `initial_tuples[].object` was not `domain:<this-id>` / `project:<uuid>` / `group:<uuid>`.
              * `invalid_caveat_context` — 422, an `initial_tuples[].caveat_context` was not JSON-encodable losslessly.
              * `invitation_already_pending` — 409, a pending invitation already exists for `(domain_id, external_subject)`.
              * `invitation_already_accepted` — 409, target invitation has already been accepted (Revoke / Accept races).
              * `invitation_already_expired` — 409, target invitation has already been expired.
              * `invitation_not_found` — 404, invitation does not exist or is in a different Domain.
              * `cursor_binding_mismatch` — 403, `ListIdentities` / `ListInvitations` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay).

            CSRF defence-in-depth adds three 403 codes
            scoped to state-changing cookie-authenticated `/v1/*`
            requests. Bearer-authenticated requests and `GET` / `HEAD`
            requests are exempt. The codes are:

              * `csrf-token-mismatch` — 403, the `X-Plexsphere-CSRF`
                header is absent, empty, or does not byte-match the
                `plexsphere_csrf` cookie. The cookie is rotated on
                sign-in and on sign-out so a leaked token cannot
                outlive the session it was minted for.
              * `csrf-origin-mismatch` — 403, the request carried an
                `Origin` header that is not in the configured
                allowlist AND did not advertise
                `Sec-Fetch-Site: same-origin`.
              * `csrf-origin-not-configured` — 403, the deployment
                does not configure `PLEXSPHERE_CSRF_ALLOWED_ORIGINS`.
                A misconfigured production deployment surfaces this
                code on every cookie-authenticated mutation rather
                than silently bypassing the CSRF check.

            Cloud Inventory CRUD adds the closed taxonomy below. Each
            code maps to exactly one
            repo / service / validator sentinel and one HTTP status:

              * `cloud_slug_conflict` — 409, CreateCloud duplicate slug.
              * `cloud_external_id_conflict` — 409, CreateCloud duplicate `(provider, external_id)` pair.
              * `invalid_cloud` — 400, Cloud aggregate invariant rejected the body.
              * `invalid_cloud_id` — 400, path `{id}` was not a non-zero UUID.
              * `cloud_not_found` — 404, the addressed Cloud does not exist or is not visible.
              * `slug_immutable` — 400, `PatchCloud` (or `PatchDomain`) body carried a `slug` field. Shared with the tenancy taxonomy because the immutability semantics match.
              * `provider_immutable` — 400, `PatchCloud` body carried a `provider` field — provider is the validator-routing key and changing it would invalidate every previously-stored endpoint blob.
              * `unknown_provider` — 400, `provider` is not one of the supported closed-enum values (aws, azure).
              * `invalid_cloud_endpoint` — 400, per-provider validator rejected one or more fields in the `endpoint` JSONB blob.
              * `invalid_cloud_region_defaults` — 400, per-provider validator rejected one or more fields in the `region_defaults` JSONB blob.
              * `cloud_not_empty` — 409, `DeleteCloud` blocked by at least one persisted `CloudCredential` (see `CloudChildCounts`).
              * `clouds_not_provisioned` — 501, the composition root has not wired the Cloud Inventory dependency bundle yet.
              * `cursor_binding_mismatch` — 403, `ListClouds` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay). Mirrors the `ListNodes` `cursor_binding_mismatch` on `/v1/nodes`.

            The operator-facing Cloud Credentials read + revoke surface
            adds the closed taxonomy below. Each code maps to exactly
            one repo / service / read-service sentinel and one HTTP
            status:

              * `invalid_cloud_credential_id` — 400, path `{id}` on `/v1/cloud-credentials/{id}` was not a non-zero UUID.
              * `invalid_revoke_reason` — 400, `RevokeCloudCredential` body `reason` was empty or whitespace-only.
              * `cloud_credential_not_found` — 404, the addressed Cloud Credential does not exist.
              * `cloud_credentials_not_provisioned` — 501, the composition root has not wired the Cloud Credentials read + revoke dependency bundle yet.

            The Cloud Credentials surface REUSES the shared
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `invalid_body`, `request_body_too_large`, `unauthenticated`,
            and `internal` codes with the same semantics they carry on
            the Cloud Inventory surface above.

            The operator-facing OpenBao Credential Broker read +
            lifecycle surface adds the closed taxonomy below. Each code
            maps to exactly one repo / service / read-service sentinel
            and one HTTP status:

              * `invalid_project_id` — 400, path `{id}` on `/v1/projects/{id}/credentials` was not a non-zero UUID.
              * `invalid_credential_id` — 400, path `{id}` on `/v1/credentials/{id}` was not a non-zero UUID.
              * `invalid_revoke_reason` — 400, `RevokeCredential` body `reason` was empty or whitespace-only.
              * `invalid_rotate_material` — 400, `RotateCredential` body carried an empty payload, non-positive ttl, or otherwise malformed material.
              * `credential_not_found` — 404, the addressed credential does not exist.
              * `credential_cas_conflict` — 409, `RotateCredential` `expected_version` did not match the live broker-row version.
              * `credential_revoked` — 409, `RotateCredential` targeted an already-revoked credential.
              * `credentials_not_provisioned` — 501, the composition root has not wired the Credential Broker read + lifecycle dependency bundle yet.

            The Credential Broker surface REUSES the shared
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `invalid_body`, `request_body_too_large`, `unauthenticated`,
            and `internal` codes with the same semantics they carry on
            the Cloud Inventory surface above.

            The Credential Assignment request + decision surface adds
            the closed taxonomy below. Each code maps to exactly one
            repo / service / read-service sentinel and one HTTP status:

              * `invalid_credential_assignment_id` — 400, path `{id}` on `/v1/credential-assignments/{id}/...` was not a non-zero UUID.
              * `invalid_cloud_credential_id` — 400, `RequestCredentialAssignment` body `cloud_credential_id` was not a non-zero UUID. Reuses the same code string the Cloud Credentials path id carries.
              * `invalid_decision_reason` — 400, `RejectCredentialAssignment` or `RevokeCredentialAssignment` body `reason` was empty or whitespace-only.
              * `credential_assignment_not_found` — 404, the addressed Credential Assignment does not exist.
              * `duplicate_live_assignment` — 409, a live Credential Assignment already exists for the same (Project, Cloud Credential) pair.
              * `credential_not_assignable` — 422, the named Cloud Credential is not in an assignable lifecycle state.
              * `illegal_transition` — 409, the requested lifecycle transition is not legal from the assignment's current state.
              * `self_approval_denied` — 403, the caller may not approve a Credential Assignment they themselves requested.
              * `credential_assignments_not_provisioned` — 501, the composition root has not wired the Credential Assignment dependency bundle yet.

            The Credential Assignment surface REUSES the shared
            `invalid_project_id`, `invalid_limit`, `invalid_cursor`,
            `cursor_binding_mismatch`, `invalid_body`,
            `request_body_too_large`, `unauthenticated`, and `internal`
            codes with the same semantics they carry on the Cloud
            Inventory surface above.

            The Approval Workflow dual-control surface adds the closed
            taxonomy below. Each code maps to exactly one repo / service
            sentinel and one HTTP status:

              * `invalid_approval_id` — 400, path `{id}` on `/v1/approvals/{id}`, `.../approve`, `.../reject`, or `.../break-glass` was not a non-zero UUID.
              * `invalid_break_glass_reason` — 400, `BreakGlassApproval` body `reason` was shorter than the 16-character emergency-justification floor or whitespace-only.
              * `approval_not_found` — 404, the addressed Approval does not exist or is not visible.

            The Approval Workflow surface REUSES the
            `invalid_decision_reason` (`RejectApproval` body `reason` was
            empty or whitespace-only), `self_approval_denied` (the caller
            may not approve a proposal they themselves raised), and
            `illegal_transition` (the requested lifecycle transition is
            not legal from the proposal's current state) code strings with
            the same semantics they carry on the Credential Assignment
            surface above, plus the shared `invalid_limit`,
            `invalid_cursor`, `cursor_binding_mismatch`, `invalid_body`,
            `unauthenticated`, `permission_denied`, and `internal` codes
            with the same semantics they carry on the surfaces above.

            The read-only Blueprint Catalog surface adds the closed
            taxonomy below. Each code maps to exactly one repo /
            read-service sentinel and one HTTP status:

              * `invalid_blueprint_id` — 400, path `{id}` on `/v1/blueprints/{id}` was not a non-zero UUID.
              * `blueprint_not_found` — 404, the addressed Blueprint does not exist or is not visible.
              * `blueprints_not_provisioned` — 501, the composition root has not wired the Blueprint Catalog read dependency bundle yet.

            The Blueprint Catalog surface REUSES the shared
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `unauthenticated`, and `internal` codes with the same
            semantics they carry on the Cloud Inventory surface above.

            The Tenancy Resource surface adds the closed taxonomy
            below. Each code maps to exactly one repo / service
            sentinel and one HTTP status:

              * `invalid_resource_origin` — 400, `CreateResource` body `origin` was absent or not one of `adopted` / `provisioned`.
              * `invalid_resource_id` — 400, path `{id}` on `/v1/resources/{id}` was not a non-zero UUID.
              * `resource_not_found` — 404, the addressed Resource does not exist or is not visible.
              * `resources_not_provisioned` — 501, the composition root has not wired the Resource dependency bundle yet.

            The Tenancy Resource surface REUSES the shared
            `invalid_project_id`, `project_not_found`, `invalid_body`,
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `request_body_too_large`, `unauthenticated`, and `internal`
            codes with the same semantics they carry on the Cloud
            Inventory and Tenancy surfaces above.

            The Bridge Orchestrator surface adds the closed taxonomy
            below. Each code maps to exactly one repo / service / domain
            sentinel and one HTTP status:

              * `resource_not_bridge` — 409, the addressed Resource exists but is not of kind `bridge`; emitted by every mutating bridge operation before any persistence write.
              * `relay_port_out_of_range` — 400, a `listen_port` (relay, user-access provider) or `remote_port` (site-to-site tunnel) was outside the closed range `1..65535`.
              * `slug_conflict` — 409, a many-aggregate create or patch collided on `(resource_id, slug)` (user-access, ingress, site-to-site) or on `(resource_id, sni_host)` (ingress).
              * `target_node_not_in_domain` — 400, an ingress rule's `target_node_id` resolves to a Node outside the bridge Resource's owning Domain.
              * `allowed_subnet_empty` — 400, a site-to-site tunnel create or patch supplied an empty `allowed_subnets` list.
              * `secret_ref_malformed` — 400, an `auth_secret_ref` (user-access, site-to-site) did not match the opaque `secret:<domain>/<project>/<name>(:<version>)?` form.

            The Bridge Orchestrator surface REUSES the shared
            `invalid_project_id`, `project_not_found`,
            `invalid_resource_id`, `resource_not_found`, `invalid_body`,
            `request_body_too_large`, `permission_denied`,
            `unauthenticated`, and `internal` codes with the same
            semantics they carry on the Tenancy Resource surface above.
          type: string
        child_counts:
          allOf:
          - $ref: "#/components/schemas/DomainChildCounts"
          description: |
            Optional structured payload set EXCLUSIVELY by the
            `domain_not_empty` problem (`DELETE /v1/domains/{id}`
            blocked by remaining child aggregates). Other problem
            instances omit the field. The generated client should
            treat its presence as a strong signal the response code
            is `domain_not_empty`.
        project_child_counts:
          allOf:
          - $ref: "#/components/schemas/ProjectChildCounts"
          description: |
            Optional structured payload set EXCLUSIVELY by the
            `project_not_empty` problem (`DELETE /v1/projects/{id}`
            blocked by remaining child aggregates). Other problem
            instances omit the field. The generated client should
            treat its presence as a strong signal the response code
            is `project_not_empty`.
        cloud_child_counts:
          allOf:
          - $ref: "#/components/schemas/CloudChildCounts"
          description: |
            Optional structured payload set EXCLUSIVELY by the
            `cloud_not_empty` problem (`DELETE /v1/clouds/{id}`
            blocked by remaining child aggregates). Other problem
            instances omit the field. The generated client should
            treat its presence as a strong signal the response code
            is `cloud_not_empty`.
      required:
      - detail
      - instance
      - status
      - title
      - type
    PermissionDenied:
      description: |
        Specialised RFC 9457 problem-details body returned on 403 from
        the ReBAC authorizer. Extends `Problem` with
        a machine-readable denial reason, the traversed relation path,
        and the correlation id that pairs the response with the matching
        audit entry emitted by `internal/audit`.

        DECISION: the schema is declared as a standalone object rather
        than via `allOf` against `Problem`. kin-openapi's validator and
        oapi-codegen both accept `allOf`, but the downstream TypeScript
        client we generate treats `allOf` members as intersections that
        collide on optional fields — duplicating the Problem fields in
        place keeps the generated Go and TS shapes identical and avoids
        the collision.
      example:
        type: https://plexsphere.dev/errors/permission-denied
        title: Permission Denied
        status: 403
        detail: request rejected by authorization policy
        instance: /v1/admin/groups
        reason: insufficient_relation
        relation_path:
        - domain:acme#admin
        - group:ops#parent
        correlation_id: 01HXYZABCDEFGHJKMNPQRSTVWX
      properties:
        type:
          description: URI reference that identifies the problem type.
          type: string
        title:
          description: "Short, human-readable summary of the problem."
          type: string
        status:
          description: HTTP status code generated for this occurrence (always 403).
          type: integer
        detail:
          description: Human-readable explanation for this occurrence.
          type: string
        instance:
          description: URI reference identifying the specific occurrence.
          type: string
        code:
          description: |
            Optional machine-readable error code (shared with `Problem`).
          type: string
        reason:
          $ref: "#/components/schemas/PermissionDenied_reason"
        relation_path:
          description: |
            Ordered sequence of relations the authorizer traversed while
            evaluating the Check. Empty when the denial was decided
            before any relation lookup (typically `out_of_scope`).
          items:
            type: string
          type: array
        correlation_id:
          description: |
            Correlation id that pairs this denial with the matching
            audit entry emitted by `internal/audit`.
          type: string
      required:
      - correlation_id
      - detail
      - instance
      - reason
      - status
      - title
      - type
    SignInRequest:
      description: |
        Body for POST /v1/auth/sign-in. At least one of `domain_id` or
        `idp_binding_id` must be supplied; the router uses them to
        resolve the IdP binding against which to begin the flow
        .
      example:
        domain_id: 0192f2f6-b840-7000-a123-000000000001
        return_to: /dashboard
      properties:
        domain_id:
          description: Domain the user is signing into.
          format: uuid
          type: string
        idp_binding_id:
          description: Explicit IdP binding override within a Domain.
          format: uuid
          type: string
        return_to:
          description: |
            Post-sign-in redirect target. Must be an allow-listed
            relative path or absolute URL.
          type: string
        prompt:
          description: |
            Optional OIDC `prompt` parameter forwarded to the IdP
            (e.g. "login", "consent").
          type: string
    SignInResponse:
      description: |
        Response for POST /v1/auth/sign-in. `code_verifier_handle` is
        an opaque key the server uses to recover the PKCE verifier on
        the callback; the verifier itself never leaves the backend.
      example:
        authorization_url: authorization_url
        code_verifier_handle: code_verifier_handle
        state: state
        nonce: nonce
      properties:
        authorization_url:
          description: OIDC authorization URL the caller redirects to.
          type: string
        state:
          description: Opaque state value correlated on the callback.
          type: string
        code_verifier_handle:
          description: Opaque handle that resolves the PKCE verifier.
          type: string
        nonce:
          description: OIDC nonce passed into the ID token.
          type: string
      required:
      - authorization_url
      - code_verifier_handle
      - nonce
      - state
    DeviceCodeRequest:
      description: |
        Body for POST /v1/auth/device-code — initiates RFC 8628 device
        authorization against the resolved IdP binding.
      example:
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        idp_binding_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        client_id: client_id
      properties:
        domain_id:
          description: Domain the caller is authenticating against.
          format: uuid
          type: string
        idp_binding_id:
          description: IdP binding within the Domain.
          format: uuid
          type: string
        client_id:
          description: Optional OIDC client identifier override.
          type: string
      required:
      - domain_id
      - idp_binding_id
    DeviceCodeResponse:
      description: |
        Response for POST /v1/auth/device-code. Fields mirror RFC 8628
        §3.2.
      example:
        user_code: user_code
        device_code: device_code
        interval: 6
        verification_uri_complete: verification_uri_complete
        verification_uri: verification_uri
        expires_in: 0
      properties:
        device_code:
          description: Opaque code the client polls with.
          type: string
        user_code:
          description: Short code the end user types in a browser.
          type: string
        verification_uri:
          description: URL the end user visits to confirm the device.
          type: string
        verification_uri_complete:
          description: |
            URL with the user_code pre-filled; RFC 8628 recommends
            presenting this as a QR code.
          type: string
        expires_in:
          description: Lifetime of the device_code in seconds.
          type: integer
        interval:
          description: Minimum polling interval in seconds.
          type: integer
      required:
      - device_code
      - expires_in
      - interval
      - user_code
      - verification_uri
      - verification_uri_complete
    DeviceTokenRequest:
      description: Body for POST /v1/auth/device-token.
      example:
        device_code: device_code
        client_id: client_id
      properties:
        device_code:
          description: Device code returned by /v1/auth/device-code.
          type: string
        client_id:
          description: Optional OIDC client identifier override.
          type: string
      required:
      - device_code
    DeviceApproveRequest:
      description: |
        Body for POST /v1/auth/device/approve. The dashboard reads
        `user_code` from the URL the CLI printed
        (`?user_code=ABCD-EFGH`) and round-trips it back to the server
        verbatim — the server normalises by stripping the optional
        ASCII dash before comparing against the `user_code` produced by
        `POST /v1/auth/device-code`.
      example:
        user_code: user_code
      properties:
        user_code:
          description: |
            Short user-typed code from the device-code response. The
            base32 alphabet is uppercase A–Z and 2–7; an optional ASCII
            dash separating the two 4-character halves
            (e.g. `ABCD-EFGH` or `ABCDEFGH`) is accepted.
          pattern: "^[A-Z2-7]{4}-?[A-Z2-7]{4}$"
          type: string
      required:
      - user_code
    DeviceApproveResponse:
      description: |
        Response for POST /v1/auth/device/approve. The body is
        intentionally minimal — the polling client picks up the minted
        token via /v1/auth/device-token; this response just confirms
        the status flip so the dashboard can transition into a "you can
        close this tab" affordance.
      example:
        status: approved
      properties:
        status:
          $ref: "#/components/schemas/DeviceApproveResponse_status"
      required:
      - status
    ServiceTokenRequest:
      description: |
        Body for POST /v1/auth/service/token. Supports
        `client_credentials` and JWT-bearer grant types.
      example:
        grant_type: client_credentials
        scope: scope
        client_secret: client_secret
        client_assertion: client_assertion
        client_id: client_id
      properties:
        grant_type:
          $ref: "#/components/schemas/ServiceTokenRequest_grant_type"
        client_id:
          description: ServiceIdentity client identifier.
          type: string
        client_secret:
          description: |
            Client secret for the `client_credentials` grant. Rejected
            for the JWT-bearer grant.
          type: string
        client_assertion:
          description: |
            Signed JWT assertion for the JWT-bearer grant. Rejected for
            the `client_credentials` grant.
          type: string
        scope:
          description: Optional space-delimited OAuth2 scope list.
          type: string
      required:
      - grant_type
    ServiceTokenResponse:
      description: |
        Response for POST /v1/auth/service/token (and the success body
        of POST /v1/auth/device-token once the flow completes).
      example:
        access_token: access_token
        scope: scope
        token_type: token_type
        expires_in: 0
      properties:
        access_token:
          description: Access token suitable for Bearer-authenticated requests.
          type: string
        token_type:
          description: Always "Bearer" for plexsphere-issued tokens.
          type: string
        expires_in:
          description: Lifetime of the access token in seconds.
          type: integer
        scope:
          description: "Space-delimited scope string, when one was granted."
          type: string
      required:
      - access_token
      - expires_in
      - token_type
    APITokenIssueRequest:
      description: |
        Body for POST /v1/auth/tokens. `env_prefix` is the environment
        segment embedded in the psk-shaped plaintext; the aggregate
        accepts any lowercase ASCII letter run but the public API is
        restricted to the three plexsphere-supported environments
        .
      example:
        identity_ref: identity_ref
        env_prefix: dev
        ttl_seconds: 0
      properties:
        identity_ref:
          description: |
            Identifier of the user or ServiceIdentity the token binds
            to. Format is `user:<uuid>` or `service:<uuid>`.
          type: string
        env_prefix:
          $ref: "#/components/schemas/APITokenIssueRequest_env_prefix"
        ttl_seconds:
          description: |
            Optional TTL in seconds. If omitted, the server applies the
            deployment default.
          type: integer
      required:
      - env_prefix
      - identity_ref
    APITokenIssueResponse:
      description: |
        Response for POST /v1/auth/tokens. Plaintext is returned
        exactly once — it can never be retrieved again. A `Sunset` response header is set when this response
        retires a previous plaintext (i.e. when the call was a
        rotation); first issuances omit the header entirely.
      example:
        expires_at: 2000-01-23T04:56:07.000+00:00
        env_prefix: env_prefix
        plaintext: plaintext
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        id:
          description: Token identifier (UUIDv7).
          format: uuid
          type: string
        plaintext:
          description: The psk-shaped plaintext; returned exactly once.
          type: string
        env_prefix:
          description: Environment segment embedded in the plaintext.
          type: string
        expires_at:
          description: RFC 3339 expiry timestamp.
          format: date-time
          type: string
      required:
      - env_prefix
      - expires_at
      - id
      - plaintext
    APITokenSummary:
      description: |
        Plaintext-free summary entry for GET /v1/auth/tokens. Matches
        the persisted APIToken aggregate minus any secret material
        .
      example:
        last_used_at: 2000-01-23T04:56:07.000+00:00
        expires_at: 2000-01-23T04:56:07.000+00:00
        env_prefix: env_prefix
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        rotated_at: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: Token identifier (UUIDv7).
          format: uuid
          type: string
        env_prefix:
          description: Environment segment embedded in the plaintext.
          type: string
        last_used_at:
          description: "Most-recent authentication timestamp, if any."
          format: date-time
          type: string
        created_at:
          description: Issuance timestamp.
          format: date-time
          type: string
        expires_at:
          description: Expiry timestamp.
          format: date-time
          type: string
        rotated_at:
          description: Timestamp the token was most recently rotated.
          format: date-time
          type: string
      required:
      - created_at
      - env_prefix
      - expires_at
      - id
    APITokenRotateResponse:
      description: |
        Response for POST /v1/auth/tokens/{id}/rotate. The `Sunset`
        header names the retirement deadline of the rotated-from
        plaintext.
      example:
        expires_at: 2000-01-23T04:56:07.000+00:00
        env_prefix: env_prefix
        plaintext: plaintext
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        rotation_deadline: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: Token identifier (UUIDv7).
          format: uuid
          type: string
        plaintext:
          description: New psk-shaped plaintext; returned exactly once.
          type: string
        env_prefix:
          description: Environment segment embedded in the plaintext.
          type: string
        expires_at:
          description: Expiry timestamp of the new plaintext.
          format: date-time
          type: string
        rotation_deadline:
          description: |
            Retirement deadline of the rotated-from plaintext. Matches
            the value advertised in the `Sunset` response header.
          format: date-time
          type: string
      required:
      - env_prefix
      - expires_at
      - id
      - plaintext
      - rotation_deadline
    Whoami:
      description: Resolved principal metadata for the current request.
      example:
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        acr: acr
        subject: subject
        amr:
        - amr
        - amr
        principal_type: user
        email: email
      properties:
        principal_type:
          $ref: "#/components/schemas/Whoami_principal_type"
        subject:
          description: Principal identifier (UUIDv7 serialised as a string).
          type: string
        domain_id:
          description: Domain the principal belongs to.
          format: uuid
          type: string
        email:
          description: |
            Primary email of the principal as projected by the upstream
            IdP at sign-in. Omitted when the IdP did not supply an
            `email` claim or the principal is a ServiceIdentity. The
            dashboard's SignedInBadge renders it as the human-readable
            identity label.
          type: string
        acr:
          description: "Authentication Context Class Reference, if available."
          type: string
        amr:
          description: "Authentication Methods References (e.g. \"pwd\", \"mfa\")."
          items:
            type: string
          type: array
      required:
      - principal_type
      - subject
    IdPBindingRequest:
      description: |
        Body for POST /v1/admin/idp. Field set mirrors the
        `IdPBinding` aggregate.
      example:
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        required_acr:
        - required_acr
        - required_acr
        claim_mappings:
          key: claim_mappings
        required_amr:
        - required_amr
        - required_amr
        discovery_url: discovery_url
        jit_policy: allow
        client_secret_ref: client_secret_ref
        issuer: issuer
        client_id: client_id
      properties:
        domain_id:
          description: Owning Domain.
          format: uuid
          type: string
        issuer:
          description: OIDC issuer URL (absolute http/https).
          type: string
        client_id:
          description: OIDC client identifier.
          type: string
        client_secret_ref:
          description: |
            Opaque reference to the client secret held in the secret
            store — never the secret value itself.
          type: string
        discovery_url:
          description: OIDC discovery document URL (absolute http/https).
          type: string
        claim_mappings:
          additionalProperties:
            type: string
          description: |
            Mapping of plexsphere claim name → IdP claim name. An empty
            map is permitted.
        required_acr:
          description: Required OIDC ACR values.
          items:
            type: string
          type: array
        required_amr:
          description: Required OIDC AMR values.
          items:
            type: string
          type: array
        jit_policy:
          $ref: "#/components/schemas/IdPBindingRequest_jit_policy"
      required:
      - client_id
      - client_secret_ref
      - discovery_url
      - domain_id
      - issuer
      - jit_policy
    IdPBindingResponse:
      description: |
        Response echo of a persisted IdPBinding aggregate. The
        `client_secret_ref` field is included because it is an opaque
        reference, not the secret itself.
      example:
        required_acr:
        - required_acr
        - required_acr
        claim_mappings:
          key: claim_mappings
        created_at: 2000-01-23T04:56:07.000+00:00
        issuer: issuer
        client_id: client_id
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        updated_at: 2000-01-23T04:56:07.000+00:00
        required_amr:
        - required_amr
        - required_amr
        discovery_url: discovery_url
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        jit_policy: allow
        client_secret_ref: client_secret_ref
        status: active
      properties:
        id:
          description: Binding identifier (UUIDv7).
          format: uuid
          type: string
        domain_id:
          description: Owning Domain.
          format: uuid
          type: string
        issuer:
          description: OIDC issuer URL.
          type: string
        client_id:
          description: OIDC client identifier.
          type: string
