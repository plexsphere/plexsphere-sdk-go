            `(resource_id, slug)`; a collision surfaces as
            `409 slug_conflict`.
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          type: string
        sni_host:
          description: |
            TLS SNI host the rule terminates. Unique per
            `(resource_id, sni_host)`; a collision surfaces as
            `409 slug_conflict`.
