        last_active_at: 2000-01-23T04:56:07.000+00:00
        resource_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        status: ""
      properties:
        id:
          description: |
