        explode: true
        in: query
        name: object_type
        required: false
        schema:
          type: string
        style: form
      - description: Opaque object identifier within `object_type`.
        explode: true
        in: query
        name: object_id
        required: false
        schema:
          type: string
        style: form
      - description: |
