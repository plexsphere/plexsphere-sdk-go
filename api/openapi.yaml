        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB tenancy ceiling enforced
            by the handler.
        "422":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/invitation-object-out-of-scope
                title: Invitation Object Out of Scope
                status: 422
                detail: "initial_tuples[0].object must be domain:<this-id>, project:<uuid>,\
                  \ or group:<uuid>"
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1/invitations
                code: invitation_object_out_of_scope
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Body parsed but a structural invariant rejected it. Body
            is a `Problem` with `code` ∈
            { `too_many_initial_tuples`,
            `invitation_object_out_of_scope`,
            `invalid_caveat_context` }.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Stage a pending Invitation on a Domain.
      tags:
      - tenancy
