      - items
    CredentialAssignmentRequest:
      additionalProperties: false
      description: |
        Body for `POST /v1/projects/{id}/credential-assignments`. Names
        the Cloud Credential to bind to the Project.
      example:
        cloud_credential_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        cloud_credential_id:
          description: |
            Identifier of the Cloud Credential to bind. Must be a
            non-zero UUID — a malformed value is rejected with
            `400 invalid_cloud_credential_id`.
          format: uuid
          type: string
      required:
      - cloud_credential_id
    CredentialAssignmentDecisionRequest:
      additionalProperties: false
      description: |
        Body for `POST /v1/credential-assignments/{id}/reject` and
        `POST /v1/credential-assignments/{id}/revoke`. The `reason` is
        recorded on the lifecycle outbox event so the decision carries
        an approver- or operator-supplied audit string.
      example:
        reason: reason
      properties:
        reason:
          description: |
            Decision rationale. Non-empty — whitespace-only is
            rejected with `400 invalid_decision_reason`.
          maxLength: 1024
          minLength: 1
          type: string
      required:
      - reason
    ApprovalState:
      description: |
        Lifecycle state of an Approval. `proposed` is the opening state
        before the policy is evaluated; `pending-approval` means the
        Domain's `ApprovalPolicy` gated the proposal and it awaits an
        operator decision; `approved` is the terminal accept state
        (reached by an operator decision, the empty-policy short-circuit,
        or a break-glass override); `rejected` is the terminal state an
        operator decision declines into; `expired` is the terminal state
        the background sweeper drives an un-decided proposal into past
        its deadline. The state is a stored column advanced only by the
        application service's transition rules.
      enum:
      - proposed
      - pending-approval
      - approved
      - rejected
      - expired
      type: string
    Approval:
      description: |
        Metadata projection of an Approval. The shape is shared by
        `ListApprovals`, `GetApproval`, `ApproveApproval`,
        `RejectApproval`, and `BreakGlassApproval` so clients only need
        one binding.
      example:
        decided_at: 2000-01-23T04:56:07.000+00:00
        target_resource: target_resource
        decided_by_subject: decided_by_subject
        created_at: 2000-01-23T04:56:07.000+00:00
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        proposer_subject: proposer_subject
        expires_at: 2000-01-23T04:56:07.000+00:00
        caveat_context:
          key:
          - caveat_context
          - caveat_context
        payload:
          key: ""
        decision_reason: decision_reason
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        state: proposed
        action_kind: action_kind
      properties:
        id:
          description: Approval identifier (UUIDv7).
          format: uuid
          type: string
        domain_id:
          description: |
            Identifier of the owning Domain — the residency pivot the
            ReBAC gate authorises against.
          format: uuid
          type: string
        proposer_subject:
          description: |
            ReBAC subject string of the principal that raised the
            proposal. A caller may never approve a proposal whose
            `proposer_subject` is themselves.
          type: string
        action_kind:
          description: |
            Kind of action the proposal would perform once approved.
            Matched against the Domain `ApprovalPolicy` rules to decide
            whether the proposal is gated.
          type: string
        target_resource:
          description: |
            Resource the proposed action targets. Matched against the
            optional `target_resource` of a policy rule.
          type: string
        payload:
          additionalProperties: true
          description: |
            Raw JSON action payload applied verbatim once the proposal
            is approved. Opaque to the approval workflow — it carries
            the parameters of the action the proposer intends to run.
          type: object
        state:
          $ref: "#/components/schemas/ApprovalState"
        created_at:
          description: Aggregate creation timestamp (UTC).
          format: date-time
          type: string
        decided_at:
          description: |
            Timestamp the proposal reached a terminal state (UTC).
            `null` or omitted while the proposal is still `proposed` or
            `pending-approval`.
          format: date-time
          type: string
          nullable: true
        decided_by_subject:
          description: |
            ReBAC subject string of the principal that decided the
            proposal. `null` or omitted while undecided and for the
            unattended `expired` path.
          type: string
          nullable: true
        decision_reason:
          description: |
            Free-text rationale recorded with the decision. `null` or
            omitted while undecided and for the unattended `expired`
            path. For a break-glass override the rationale value is PII
            and is NOT surfaced here verbatim — only its field name is
            projected onto `caveat_context`.
          type: string
          nullable: true
        expires_at:
          description: |
            Deadline past which the background sweeper expires an
            un-decided proposal (UTC).
          format: date-time
          type: string
        caveat_context:
          additionalProperties:
            items:
              type: string
          description: |
            Names-only projection of the caveat field NAMES referenced
            on the decision's audit row — for a break-glass override
            this carries the `reason` field name. Values never cross
            this boundary: the map keys are caveat NAMES and the arrays
            are caveat-parameter NAMES, mirroring the Platform Audit Log
            invariant. `null` or omitted while the proposal carries no
            decision audit row.
          x-plexsphere-names-only: true
          nullable: true
      required:
      - action_kind
      - created_at
      - domain_id
      - expires_at
      - id
      - proposer_subject
      - state
      - target_resource
    ApprovalList:
      description: |
        Page of Approvals returned by `GET /v1/approvals`. The window is
        computed by the persistence layer in creation order; per-row
        visibility is layered on top so the `items` array is the subset
        the caller is authorised to see.
      example:
