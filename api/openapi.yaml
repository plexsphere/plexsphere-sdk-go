  /v1/projects/{project_id}/policies/{policy_id}/dry-run:
    post:
      description: |
        Evaluates a candidate selector + rule list against the
        Project's current state and returns the matched Nodes, the
        structural diff against the Policy's current head, the count
        of peer pairs whose verdict would flip, and any matched Nodes
        the caller cannot read. The handler gates on `policy#edit`.
        Evaluation is read-only — no rows are written, no outbox
        events are emitted, and no audit entry is appended for the
        evaluation itself.
      operationId: DryRunPolicy
      parameters:
      - $ref: "#/components/parameters/PolicyProjectID"
      - $ref: "#/components/parameters/PolicyID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyDryRunRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyDryRunResponse"
          description: Dry-run evaluation result.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Invalid body.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks `policy#edit`. Body is a `PermissionDenied`
            problem.
        "404":
          content:
