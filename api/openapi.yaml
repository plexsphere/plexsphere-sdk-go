    BridgeUserAccessProviderKind:
      description: |
        User-access provider technology: `netbird`, `tailscale`, or
        `wireguard`. Selects the agent-side driver that programs the
        provider on the addressed Node.
      enum:
      - netbird
      - tailscale
      - wireguard
      type: string
      x-enum-varnames:
      - BridgeUserAccessProviderKindNetbird
      - BridgeUserAccessProviderKindTailscale
      - BridgeUserAccessProviderKindWireguard
    BridgeSiteToSiteTunnelKind:
      description: |
        Site-to-site tunnel technology: `wireguard`, `ipsec`, or
        `openvpn`. Selects the agent-side driver that establishes the
        tunnel to the remote endpoint.
      enum:
      - wireguard
      - ipsec
      - openvpn
      type: string
      x-enum-varnames:
      - BridgeSiteToSiteTunnelKindWireguard
      - BridgeSiteToSiteTunnelKindIpsec
      - BridgeSiteToSiteTunnelKindOpenvpn
    BridgeSiteToSiteTunnelRoutingPolicy:
      description: |
        Traffic direction the tunnel carries: `bidirectional` routes both
        ways, `ingress_only` admits remote-initiated traffic, and
        `egress_only` admits locally-initiated traffic.
      enum:
      - bidirectional
      - ingress_only
      - egress_only
      type: string
      x-enum-varnames:
      - BridgeSiteToSiteTunnelRoutingPolicyBidirectional
      - BridgeSiteToSiteTunnelRoutingPolicyIngressOnly
      - BridgeSiteToSiteTunnelRoutingPolicyEgressOnly
    BridgeRelayConfigureRequest:
      description: |
        Full replacement of the per-Resource relay configuration. The
        relay is a singleton keyed on the Resource; this body replaces it
        wholesale (last-writer-wins). An identical-config PUT is an
        idempotent no-op.
      example:
        listen_port: 5249
        enabled: true
      properties:
        enabled:
          description: |
            Whether the relay is active. A disabled relay keeps its
            configuration but programs no listener on the Node.
          type: boolean
        listen_port:
          description: |
            UDP port the relay listens on. Outside `1..65535` the write
            is rejected with `400 relay_port_out_of_range`.
          maximum: 65535
          minimum: 1
          type: integer
      required:
      - enabled
      - listen_port
    BridgeRelayResponse:
      description: |
        Hydrated projection of the per-Resource relay singleton. Returned
        by `GetBridgeRelay` and `ConfigureBridgeRelay`.
      example:
        listen_port: 5249
        updated_at: 2000-01-23T04:56:07.000+00:00
        resource_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        created_at: 2000-01-23T04:56:07.000+00:00
        enabled: true
      properties:
        resource_id:
          description: Owning bridge Resource (UUIDv7) — the relay primary key.
          format: uuid
          type: string
        enabled:
          description: Whether the relay is active.
          type: boolean
        listen_port:
          description: UDP port the relay listens on.
          maximum: 65535
          minimum: 1
          type: integer
        created_at:
          description: Relay creation timestamp (UTC).
          format: date-time
          type: string
        updated_at:
          description: Last-modified timestamp (UTC).
          format: date-time
          type: string
      required:
      - created_at
      - enabled
      - listen_port
      - resource_id
      - updated_at
    BridgeUserAccessProviderCreateRequest:
      description: |
        Body for `CreateBridgeUserAccessProvider`. Creates one
        user-access provider keyed by `(resource_id, slug)` on the
        addressed bridge Resource.
      example:
        max_peers: 1
        auth_secret_ref: auth_secret_ref
        listen_port: 5249
        kind: netbird
        interface_name: interface_name
        routing_policy:
          key: ""
        slug: slug
      properties:
        slug:
          description: |
            Stable identity of the provider within its Resource. Unique
            per `(resource_id, slug)`; a collision surfaces as
            `409 slug_conflict`.
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          type: string
        kind:
          $ref: "#/components/schemas/BridgeUserAccessProviderKind"
        interface_name:
          description: Name of the network interface the provider programs on the
            Node.
          minLength: 1
          type: string
        listen_port:
          description: |
            UDP port the provider listens on. Outside `1..65535` the
            write is rejected with `400 relay_port_out_of_range`.
          maximum: 65535
          minimum: 1
          type: integer
        max_peers:
          description: Maximum number of peers the provider admits.
          minimum: 1
          type: integer
        auth_secret_ref:
          description: |
            Opaque reference to the provider's authentication material in
            the form `secret:<domain>/<project>/<name>(:<version>)?`. The
            platform stores the reference, never the material; a malformed
            reference surfaces as `400 secret_ref_malformed`.
          type: string
        routing_policy:
          additionalProperties: true
          description: |
            Free-form JSON routing-policy document, persisted as JSONB.
            The platform stores it opaquely; the agent-side driver
            interprets it.
          type: object
      required:
      - auth_secret_ref
      - interface_name
      - kind
      - listen_port
      - max_peers
      - routing_policy
      - slug
