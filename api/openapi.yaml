        `GetProject`, `ListProjects`, and `PatchProject` — every read
        surface returns the same wire bytes for the same Project so
        clients only need one binding.
      example:
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        updated_at: 2000-01-23T04:56:07.000+00:00
        name: name
        description: description
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        slug: slug
        sub_range_cidr: 10.42.4.0/22
      properties:
        id:
          description: Project identifier (UUIDv7).
          format: uuid
          type: string
        domain_id:
          description: Parent Domain identifier (UUIDv7).
          format: uuid
          type: string
        name:
          description: Human-readable Project name (trimmed at the aggregate).
          type: string
        slug:
          description: |
            Kebab-case URL handle. Stable for the lifetime of the
            Project — see the `tenancy` tag description for the
            immutability rationale.
          type: string
        description:
          description: |
            Optional free-form description. Empty string when the
            operator did not set one (the wire shape never carries
            `null` for this field).
          type: string
        sub_range_cidr:
          description: |
            Optional canonical RFC 4632 sub-range reservation inside
            the parent Domain's mesh_cidr. Cross-Project non-overlap
            within the parent Domain is enforced by the SQL GIST
            exclusion constraint on
            `plexsphere.project_mesh_ip_reservations`.
          example: 10.42.4.0/22
          type: string
          nullable: true
