                status: pending
                expires_at: 2026-05-03T10:00:00Z
                created_at: 2026-05-02T10:00:00Z
                initial_tuples:
                - relation: member
                  object: project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
              schema:
                $ref: "#/components/schemas/InvitationResponse"
          description: Invitation staged.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Aggregate or handler invariant rejected the body. Body is
            a `Problem` with `code` ∈ { `invalid_body`, `invalid_ttl`
            }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `manage` ReBAC relation on the addressed
            Domain. Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain not found. Surfaced only after the authorisation
            gate has passed.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/invitation-already-pending
                title: Invitation Already Pending
                status: 409
                detail: "a pending invitation already exists for this (domain, external_subject);\
                  \ existing id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c0"
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1/invitations
                code: invitation_already_pending
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            A pending invitation already exists for the
            `(domain_id, external_subject)` pair. Body is a `Problem`
            with `code: invitation_already_pending`; the existing
            invitation's id is carried in the Problem detail so the
