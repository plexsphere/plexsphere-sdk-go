  /v1/integrity-violations/{id}/acknowledge:
    post:
      description: |
        Acknowledges the integrity violation identified by `{id}`,
        moving it from `open` to `acknowledged` and recording the
        operator-supplied `reason` on the triage row. The handler runs
        the platform read gate before the transition.

        Acknowledgement is an elevated, audited action and MAY be gated
        behind a required OIDC ACR: a caller whose session does not
        satisfy the configured ACR is challenged with `401` carrying the
        `acr_values` it must re-authenticate with, and no state
        transition occurs. Acknowledgement is only legal from the `open`
        state — any other source state returns `409 illegal_transition`.
        A blank or whitespace-only `reason` is rejected with
        `400 invalid_acknowledge_reason`.
      operationId: AcknowledgeIntegrityViolation
      parameters:
      - $ref: "#/components/parameters/IntegrityViolationID"
      requestBody:
        content:
          application/json:
            example:
              reason: Confirmed planned binary upgrade rolled out by the platform
                on-call
            schema:
              $ref: "#/components/schemas/IntegrityViolationAcknowledgeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityViolationRow"
          description: |
            Integrity violation acknowledged. Body is the updated triage
            row with `status: acknowledged`.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_integrity_violation_id`, `invalid_body`,
            `invalid_acknowledge_reason` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Caller is not authenticated, or the caller's session does
            not satisfy the required ACR for this elevated action — the
            body carries the `acr_values` the caller must step up to.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to acknowledge integrity violations.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Integrity violation not found. Body is a `Problem` with
            `code: integrity_violation_not_found`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The violation is not in a state from which acknowledgement
            is legal. Body is a `Problem` with `code: illegal_transition`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Acknowledge an open integrity violation.
      tags:
      - integrity
  /v1/hooks:
    get:
      description: |
        Returns a cursor-paginated page of the Kubernetes hook custom
        resources the agents discovered in their clusters, optionally
        narrowed by owning Domain, Project, or whether the discovered
        image digest matches the declared one. The surface is strictly
        read-only — plexsphere records what the agent observed and never
        writes hook objects back. The handler runs the platform read
        gate before the persistence read, then layers a per-row
        visibility filter on the owning Domain so `items` is the subset
        the caller is authorised to see.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym; a cross-caller replay surfaces
        as `403 cursor_binding_mismatch`, and a tampered or malformed
        cursor surfaces as `400 invalid_cursor`. `limit` is clamped to
        `[1, 200]` rather than rejected.
      operationId: ListHooks
      parameters:
      - description: |
          Optional owning-Domain filter. When present, only hooks on
          the named Domain are returned.
        explode: true
        in: query
        name: domain_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: |
          Optional Project filter. When present, only hooks on Nodes
          in the named Project are returned.
        explode: true
        in: query
        name: project_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: |
          Optional drift filter. When `true`, only hooks whose
          discovered image digest matches the declared digest are
          returned; when `false`, only mismatches are returned.
        explode: true
        in: query
        name: image_digest_match
        required: false
        schema:
          type: boolean
        style: form
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed so a tampered
          cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it to
          the read service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
