        "503":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/ingest-buffer-unavailable
                title: Service Unavailable
                status: 503
                detail: the observability ingest buffer is unavailable; retry the
                  batch shortly.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/audit
                code: ingest_buffer_unavailable
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The ingest buffer could not accept the batch — the stream
            backend is unreachable or saturated. The Problem body's `code`
            field is `ingest_buffer_unavailable`, and the `Retry-After`
            response header carries the number of seconds the caller should
            wait before retrying.
          headers:
            Retry-After:
              description: |
                Seconds the caller should wait before retrying the batch.
              explode: false
              required: true
              schema:
                minimum: 0
                type: integer
              style: simple
      summary: Ingest a batch of normalised audit events for a Node.
      tags:
      - mesh
  /v1/nodes/{id}/reachability:
    get:
      description: |
        Returns the latest `Reachability` projection for the addressed
        Node — the per-Node state-machine the heartbeat handler
        advances on every accepted heartbeat. The projection is the authoritative health view the
        operator UI and reconciliation surface consume; it transitions
        `healthy` → `stale` after 90s without a heartbeat and `stale`
        → `unreachable` after 300s, with `changed_at` tracking the
        most recent transition.

        The endpoint reuses the `node-agent` ReBAC relation already
        guarding `GET /v1/nodes/{id}/state` and
        `GET /v1/nodes/{id}/events`, so any caller authorised to issue
        a reconciliation pull is also authorised to read the
        reachability projection. Unauthenticated callers receive 401;
        authenticated callers without the relation receive 403; an
        unknown Node id surfaces as 404 only after the authorisation
        gate passes so the endpoint cannot be used as a Node-id oracle
        .

        DEFERRED-WIRING POSTURE: until the production
        composition root supplies the ReachabilityRepo, RelationChecker,
        and NodeRepo ports the handler depends on, every request to
        this endpoint returns 501 with `code:
        reachability_not_provisioned` so log scrapers can alert on the
        deferred-wiring state. See docs/architecture/mesh-event-bus-roadmap.md for the
        deferred work tracking.
      operationId: GetNodeReachability
      parameters:
      - description: Node identifier (UUIDv7) — the reachability scope.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                state: healthy
                last_heartbeat_at: 2026-04-27T10:15:30Z
                changed_at: 2026-04-27T10:15:30Z
              schema:
                $ref: "#/components/schemas/Reachability"
          description: |
            Latest `Reachability` projection for the addressed Node.
            `last_heartbeat_at` is `null` until the first heartbeat is
            accepted; `changed_at` is always present and tracks the
            most recent state transition.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/insufficient-relation
                title: Forbidden
                status: 403
                detail: Caller lacks the node-agent relation on this Node.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/reachability
                code: insufficient_relation
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Caller lacks the `node-agent` ReBAC relation on the
            addressed Node and may not read the reachability projection.
            The Problem body's `code` field is `insufficient_relation`
            .
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/node-not-found
                title: Not Found
                status: 404
                detail: Node id not found.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/reachability
                code: node_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Node id not found. Surfaced only after the authorisation
            gate has passed so the endpoint cannot be used as a
            Node-id oracle. The Problem body's `code` field is
            `node_not_found`.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/reachability-not-provisioned
                title: Not Implemented
                status: 501
                detail: "GET /v1/nodes/{id}/reachability requires the production wiring\
                  \ of ReachabilityRepo, RelationChecker, and NodeRepo. One or more\
                  \ ports are not yet provisioned in this build (see docs/architecture/mesh-event-bus-roadmap.md)."
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/reachability
                code: reachability_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The reachability surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `reachability_not_provisioned` so log scrapers can alert
            on the deferred-wiring state. Resolves once
            ReachabilityRepo, RelationChecker, and NodeRepo are wired
            into the v1 handler dependency cone (see docs/architecture/mesh-event-bus-roadmap.md).
      summary: Read the reachability projection for a Node.
      tags:
      - mesh
  /v1/nodes/{id}/keys/rotate:
    post:
      description: |
        Asks the control plane to dispatch a `rotate_keys` command to
        the addressed Node so it generates a fresh Curve25519 keypair
        without re-enrolling from scratch. An operator calls this when
        a Node's mesh key is aged or possibly compromised. The
        handler:

          1. Authenticates the caller and rejects requests without a
             resolved Principal with 401.
          2. Checks the operator-action ReBAC relation `node-operate`
             on `node:<id>` BEFORE any existence check, so an
             unauthorised caller cannot probe Node existence via the
             404/403 timing differential. A caller lacking the
             relation receives 403 `insufficient_relation` and an
             audit row with outcome `insufficient_relation`.
          3. Records a pending `peer_key_rotation` row and appends
             exactly one `rotate_keys` outbox event in a single
             transaction. A second trigger against a Node that already
             has a pending rotation returns the existing rotation
             handle and appends no second event — the operation is
             idempotent.

        The 200 response carries the rotation handle: the
        `peer_key_rotation` row id, the live Peer id, and
        `already_pending` (true when the response reflects a
        pre-existing in-flight rotation rather than a fresh request).

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the RotationRequester and the ReBAC RelationChecker
        the handler depends on, every request to this endpoint returns
        501 with `code: node_keys_rotate_not_provisioned` so log
        scrapers can alert on the deferred-wiring state.
      operationId: PostNodeKeysRotate
      parameters:
      - description: Node identifier (UUIDv7) — the rotation scope.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                rotation_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4
                peer_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5
                already_pending: false
              schema:
                $ref: "#/components/schemas/RotationTriggerResponse"
          description: |
            Rotation request recorded. A pending `peer_key_rotation`
            row exists and a `rotate_keys` command has been dispatched
            (or was already in flight — see `already_pending`).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/insufficient-relation
                title: Forbidden
                status: 403
                detail: principal lacks the operator-action relation on the addressed
                  Node.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate
                reason: insufficient_relation
                correlation_id: rebac-1719500000000000000
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `node-operate` ReBAC relation on the
            addressed Node and may not trigger a key rotation. The
            PermissionDenied body's `reason` field is
            `insufficient_relation`. Surfaced before any existence
            check so the endpoint cannot be used as a Node-id oracle.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/node-not-found
                title: Not Found
                status: 404
                detail: node id does not match any Node in this Domain.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate
                code: node_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Node id does not match any Node in this Domain. Surfaced
            only after the authorisation gate has passed so the
            endpoint cannot be used as a Node-id oracle. The Problem
            body's `code` field is `node_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal server error. An authorization-check fault or a
            rotation-request persistence failure surfaces here.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/node-keys-rotate-not-provisioned
                title: Not Implemented
                status: 501
                detail: "POST /v1/nodes/{id}/keys/rotate requires the production wiring\
                  \ of RotationRequester and RelationChecker. One or more ports are\
                  \ not yet provisioned in this build."
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate
                code: node_keys_rotate_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The key-rotation trigger surface is not yet provisioned in
            this build. The Problem body's `code` field is
            `node_keys_rotate_not_provisioned` so log scrapers can
            alert on the deferred-wiring state. Resolves once the
            RotationRequester and the ReBAC RelationChecker are wired
            into the v1 handler dependency cone.
      summary: Trigger a mesh-key rotation for a Node.
      tags:
      - mesh
  /v1/nodes/{id}/keys/rotate/preview:
    get:
      description: |
        Returns a non-mutating dry-run of the fleet impact a manual
        mesh-key rotation against the addressed Node would have. Backs
        the Phase-2 dashboard "manual key-rotation with impact preview"
        view and the `plexctl key rotate --preview` CLI. The handler:

          1. Authenticates the caller and rejects requests without a
             resolved Principal with 401.
          2. Checks the same operator-action ReBAC relation
             `node-operate` on `node:<id>` that the mutating
             `POST /v1/nodes/{id}/keys/rotate` checks, BEFORE any
             existence check, so an unauthorised caller cannot probe
             Node existence via the 404/403 timing differential. A
             caller lacking the relation receives 403
             `insufficient_relation` and an audit row with outcome
             `insufficient_relation`.
          3. Resolves the per-Node read-side projection — the live
             Peer the rotation would target, every peer edge whose
             PSK would be re-issued, and the in-flight rotation row
             (if any). NO `peer_key_rotation` row is created, NO
             `rotate_keys` outbox event is appended, and NO audit row
             beyond the read-side ReBAC decision is emitted.

        The 200 response payload mirrors the mutating endpoint's view
        of the world one-for-one — `peer_id` matches what the live
        `POST` would return, `already_pending` flips on a pre-existing
        in-flight rotation the same way — so a renderer that consumes
        both surfaces can drive the dashboard confirmation dialog from
        a single mapping.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the read-side preview projection and the ReBAC
        RelationChecker the handler depends on, every request to this
        endpoint returns 501 with
        `code: node_keys_rotate_preview_not_provisioned` so log
        scrapers can alert on the deferred-wiring state.
      operationId: GetNodeKeysRotatePreview
      parameters:
      - description: Node identifier (UUIDv7) — the rotation scope.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
                peer_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5
                affected_peer_count: 2
                affected_edges:
                - peer_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a6
                  current_kid: did:web:plexsphere.dev#psk-2026-04
                  current_wrap_key_version: 7
                - peer_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a7
                  current_kid: did:web:plexsphere.dev#psk-2026-04
                  current_wrap_key_version: 7
                already_pending: false
                estimated_duration_seconds: 12
              schema:
                $ref: "#/components/schemas/RotationImpactPreview"
          description: |
            Impact preview for the requested rotation. Carries the
            target Peer, the affected-edge listing, the
            `already_pending` flag, and an estimated wall-clock
            duration so the renderer can size its progress indicator.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/insufficient-relation
                title: Forbidden
                status: 403
                detail: principal lacks the operator-action relation on the addressed
                  Node.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate/preview
                reason: insufficient_relation
                correlation_id: rebac-1719500000000000000
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `node-operate` ReBAC relation on the
            addressed Node and may not preview a key rotation. The
            PermissionDenied body's `reason` field is
            `insufficient_relation`. Surfaced before any existence
            check so the endpoint cannot be used as a Node-id oracle.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/node-not-found
                title: Not Found
                status: 404
                detail: node id does not match any Node in this Domain.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate/preview
                code: node_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Node id does not match any Node in this Domain. Surfaced
            only after the authorisation gate has passed so the
            endpoint cannot be used as a Node-id oracle. The Problem
            body's `code` field is `node_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal server error. A projection-read failure or an
            authorization-check fault surfaces here.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/node-keys-rotate-preview-not-provisioned
                title: Not Implemented
                status: 501
                detail: "GET /v1/nodes/{id}/keys/rotate/preview requires the production\
                  \ wiring of PreviewProjection and RelationChecker. One or more ports\
                  \ are not yet provisioned in this build."
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate/preview
                code: node_keys_rotate_preview_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The key-rotation impact-preview surface is not yet
            provisioned in this build. The Problem body's `code` field
            is `node_keys_rotate_preview_not_provisioned` so log
            scrapers can alert on the deferred-wiring state. Resolves
            once the preview projection and the ReBAC RelationChecker
            are wired into the v1 handler dependency cone.
      summary: Preview the fleet impact of rotating a Node's mesh key.
      tags:
      - mesh
  /v1/projects/{project_id}/bootstrap-tokens:
    get:
      description: |
        Returns BootstrapToken metadata for the supplied Project in
        deterministic order with cursor pagination. The plaintext is
        NEVER included in this response — only the hash-derived
        metadata view.
      operationId: ListBootstrapTokens
      parameters:
      - $ref: "#/components/parameters/BootstrapTokenProjectID"
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page
          .
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapTokenList"
          description: Page of BootstrapToken metadata.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Invalid query parameters.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to list BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            .
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Project not found.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List BootstrapTokens issued for a Project.
      tags:
      - bootstrap-tokens
    post:
      description: |
        Mints a fresh BootstrapToken scoped to the supplied Project
        . The aggregate enforces the issuance
        invariants (`kind` in `{node, bridge}`, `env_prefix` matches
        `^[a-z]+$`, TTL inside `[300, 86400]` seconds); violations
        surface as a 400 Problem from validation, not as a SQL CHECK
        failure.

        The response body is the **only** time the plaintext token is
        ever exposed. The persistence layer stores an Argon2id hash
        only, so once the response has been written the plaintext can
        no longer be retrieved through any API surface. Operators MUST capture the plaintext from
        this response and hand it to the redeeming Node/Bridge
        out-of-band; a lost plaintext requires re-issuing the token.
      operationId: IssueBootstrapToken
      parameters:
      - $ref: "#/components/parameters/BootstrapTokenProjectID"
      requestBody:
        content:
          application/json:
            example:
              kind: node
              env_prefix: prod
              ttl_seconds: 3600
            schema:
              $ref: "#/components/schemas/BootstrapTokenIssueRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              example:
                token_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                token: psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx
                issued_at: 2026-04-25T10:00:00Z
                expires_at: 2026-04-25T11:00:00Z
              schema:
                $ref: "#/components/schemas/BootstrapTokenIssueResponse"
          description: |
            BootstrapToken issued. The `token` field carries the
            plaintext exactly once; subsequent reads return only the
            metadata view.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid issue body (unknown `kind`, malformed `env_prefix`,
            TTL out of range).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to issue BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            carrying the ReBAC denial `reason`, traversed
            `relation_path`, and `correlation_id` that pairs with the
            audit entry.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Project not found.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Issue a BootstrapToken for a Project.
      tags:
      - bootstrap-tokens
  /v1/projects/{project_id}/bootstrap-tokens/{id}:
    delete:
      description: |
        Revokes the BootstrapToken identified by `{id}` so a future
        redemption attempt is rejected even if the plaintext is still
        in flight. Revocation is a
        terminal aggregate transition: a token that is already
        consumed or already revoked rejects the call with 409 so the
        operator can distinguish "I beat the redeemer" from "the
        redeemer beat me".
      operationId: RevokeBootstrapToken
      parameters:
      - $ref: "#/components/parameters/BootstrapTokenProjectID"
      - description: BootstrapToken identifier (UUIDv7).
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: BootstrapToken revoked.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to revoke BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            .
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: BootstrapToken or Project not found.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            BootstrapToken has already been consumed or revoked — the
            redemption window is closed and a fresh token must be
            issued.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Revoke a BootstrapToken.
      tags:
      - bootstrap-tokens
    get:
      description: |
        Returns metadata for the BootstrapToken identified by `{id}`
        within the target Project. The plaintext is NEVER returned —
        the persistence layer holds only an Argon2id hash, and the
        plaintext window closed when the issue response was written
        .
      operationId: GetBootstrapTokenMetadata
      parameters:
      - $ref: "#/components/parameters/BootstrapTokenProjectID"
      - description: BootstrapToken identifier (UUIDv7).
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapTokenMetadata"
          description: BootstrapToken metadata.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            .
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: BootstrapToken or Project not found.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch BootstrapToken metadata by identifier.
      tags:
      - bootstrap-tokens
  /v1/register:
    post:
      description: |
        Consumes a previously-issued BootstrapToken plaintext and
        provisions a complete Node identity inside the redeeming
        Domain. The handler:

          1. Validates the inbound public key (length 32 after base64
             decode, all-zero rejection) BEFORE any token consumption
             attempt so a malformed key cannot also waste a token
             .
          2. Runs the BootstrapToken plaintext through
             `bootstraptokens.Validator.Consume` for one-shot,
             project-scoped, kind-scoped enforcement.
          3. Allocates a mesh-IP from the Domain's pool — flat by
             default, drawn from the optional Project sub-range when
             one applies.
          4. Issues the per-Node Node Secret Key (NSK) plaintext +
             wrapped persistence form through the configured wrap-key
             adapter.
          5. Persists Node + IP-allocation + NSK + outbox event in
             one pgx transaction; a partial failure rolls back every
             step including the BootstrapToken consume.

        The endpoint is the unauthenticated bootstrap seam — the
        BootstrapToken plaintext IS the credential the redeeming
        substrate presents — so the caller does NOT pass an
        Authorization header here. The Spectral
        `plexsphere-write-once-post-must-be-issue-response` rule
        guards the `nsk` field's `x-plexsphere-once: true` marker so
        the plaintext is only ever returned by THIS one operation
        .
      operationId: PostRegister
      requestBody:
        content:
          application/json:
            example:
              project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
              resource_id: edge-router-01
              bootstrap_token: psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx
              nonce: f3f8c0b8-7a0a-8a0a-a0a0-a0a0a0a0a0a0
              public_key: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
          description: |
            BootstrapToken redeemed successfully. The redeeming Node
            is now bound to the named Project + Resource; the
            response carries the freshly-allocated mesh-IP, the
            per-Node NSK plaintext (returned exactly once — see the
            `x-plexsphere-once: true` marker on the `nsk` field), the
            Domain's signing public key + key id, the initial
            wireguard peer snapshot, and the Domain's mesh CIDR
            .
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Inbound `public_key` failed the structural validation gate
            — wrong byte length after base64 decode, all-zero
            degenerate value, or unparseable encoding. The
            BootstrapToken is NOT consumed when this branch fires;
            the operator can retry with a corrected key against the
            same plaintext.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Plaintext BootstrapToken failed the Validator precedence
            check. The `code` field on the `Problem` body carries
            the canonical denial reason: `kind_mismatch`,
            `project_mismatch`, `token_consumed`, `token_expired`,
            `token_revoked`, or `nonce_collision`. The schema is
            `Problem` (not `PermissionDenied`) because /v1/register
            is the unauthenticated bootstrap seam — denials surface
            from BootstrapToken validation, NOT from a ReBAC check
            .
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Project or Resource named in the RegisterRequest body
            could not be resolved. The BootstrapToken is NOT consumed
            when this branch fires — a missing Resource is an
            operator-actionable misconfiguration, not a replay
            invitation.
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            RegisterRequest body parsed but failed the application-
            boundary invariant checks (e.g. an empty
            `bootstrap_token`, a zero-valued `project_id` UUID, an
            empty `resource_id`). Distinct from 400 (which is
            reserved for `public_key` shape failures) so operators
            can disambiguate the two cleanly.
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Mesh-IP allocator could not place the Node: either the
            flat Domain pool or a strict-mode Project sub-range is
            exhausted, or the per-Domain advisory lock was contended
            past the configured wait budget. The Problem `code`
            field carries the canonical reason (`pool_exhausted`,
            `subrange_exhausted`, `allocator_contention`). The
            BootstrapToken is NOT consumed when this branch fires —
            pool exhaustion is an operator-actionable capacity event,
            not a replay invitation.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal server error. NSK issuance failures, outbox
            append failures, or any other infrastructure-side fault
            inside the registration tx surface here. The
            BootstrapToken is NOT consumed because the registration
            transaction rolls back atomically.
      summary: Redeem a BootstrapToken to enrol a Node into a Domain.
      tags:
      - bootstrap-tokens
  /v1/domains:
    get:
      description: |
        Returns a slug-ordered page of tenancy Domains the caller is
        authorised to see. Per-row
        visibility is layered on top of the page: rows the caller
        cannot `read` are filtered out so the response items are a
        subset of the persistence-level page.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListDomains
      parameters:
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                  name: Acme Production
                  slug: acme-prod
                  description: Acme Corp production tenancy boundary.
                  mesh_cidr: 10.42.0.0/16
                  reachability:
                    heartbeat_interval: 30s
                    stale_after: 90s
                    unreachable_after: 300s
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T10:00:00Z
                next_cursor: eyJzbHVnIjoiYWNtZS1wcm9kIn0.signed
              schema:
                $ref: "#/components/schemas/DomainList"
          description: Page of Domains.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to list Domains (body is a
            `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem`
            with `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List tenancy Domains.
      tags:
      - tenancy
    post:
      description: |
        Creates a new top-level tenancy Domain. The
        aggregate enforces every issuance invariant — non-empty Name,
        kebab-case Slug, canonical RFC 4632 mesh_cidr, and a complete
        ReachabilityPolicy (a fully-zero policy is replaced with the
        platform default; a partial policy is rejected). Cross-Domain
        mesh_cidr non-overlap is policed by the SQL GIST exclusion on
        `plexsphere.domains.mesh_cidr` and surfaces as
        `409 mesh_cidr_overlap`; a duplicate slug surfaces as
        `409 domain_slug_conflict`.

        On success the handler emits a `domain.create` audit row and
        appends a `DomainCreated` outbox event in the same transaction
        .
      operationId: CreateDomain
      requestBody:
        content:
          application/json:
            example:
              name: Acme Production
              slug: acme-prod
              description: Acme Corp production tenancy boundary.
              mesh_cidr: 10.42.0.0/16
              reachability:
                heartbeat_interval: 30s
                stale_after: 90s
                unreachable_after: 300s
            schema:
              $ref: "#/components/schemas/DomainCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              example:
                id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                name: Acme Production
                slug: acme-prod
                description: Acme Corp production tenancy boundary.
                mesh_cidr: 10.42.0.0/16
                reachability:
                  heartbeat_interval: 30s
                  stale_after: 90s
                  unreachable_after: 300s
                created_at: 2026-05-02T10:00:00Z
                updated_at: 2026-05-02T10:00:00Z
              schema:
                $ref: "#/components/schemas/DomainResponse"
          description: Domain created.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/invalid-domain
                title: Invalid Domain
                status: 400
                detail: 'Domain.Name must not be empty or whitespace-only '
                instance: /v1/domains
                code: invalid_domain
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Aggregate invariant rejected the body — empty Name,
            malformed Slug, malformed `mesh_cidr`, partial
            `reachability` policy, or otherwise. Body is a
            `Problem` with `code` ∈ { `invalid_domain`,
            `invalid_reachability_policy` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to create Domains. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, `relation_path`, and `correlation_id`.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/mesh-cidr-overlap
                title: Mesh CIDR Overlap
                status: 409
                detail: mesh_cidr 10.42.0.0/16 overlaps an existing Domain
                instance: /v1/domains
                code: mesh_cidr_overlap
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Conflict — the proposed Domain collides with a persisted
            Domain. Body is a `Problem` with `code` ∈
            { `domain_slug_conflict`, `mesh_cidr_overlap` }.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB tenancy ceiling enforced by
            the handler.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Create a tenancy Domain.
      tags:
      - tenancy
  /v1/domains/{id}:
    delete:
      description: |
        Deletes the Domain identified by `{id}`.
        The empty-aggregate guard runs inside the same transaction as
        the row delete; at least one persisted Project, Group,
        Identity, IdP binding, or Node forces `409 domain_not_empty`
        with the `DomainChildCounts` payload in the Problem detail so
        the operator knows which sub-aggregate to drain first. A
        concurrent INSERT racing the guard is caught by
        defense-in-depth — the foreign-key violation surfaces as the
        same `409` so the caller never observes a half-deleted Domain.
      operationId: DeleteDomain
      parameters:
      - $ref: "#/components/parameters/DomainID"
      responses:
        "204":
          description: Domain deleted.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to delete the addressed Domain.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain not found. Body is a `Problem` with
            `code: domain_not_found`.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/domain-not-empty
                title: Domain Not Empty
                status: 409
                detail: "Domain has 2 projects, 1 group, 5 identities, 0 idp_bindings,\
                  \ 3 nodes still attached"
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                code: domain_not_empty
                child_counts:
                  projects: 2
                  groups: 1
                  identities: 5
                  idp_bindings: 0
                  nodes: 3
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain still owns at least one child aggregate. Body is a
            `Problem` with `code: domain_not_empty` and the optional
            `child_counts` extension carrying the structured
            `DomainChildCounts` so the operator knows which sub-
            aggregate is still attached.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Delete a Domain.
      tags:
      - tenancy
    get:
      description: |
        Returns the Domain identified by `{id}`. The
        handler runs the `read` ReBAC check BEFORE the persistence
        read; an unauthorised caller therefore receives `403` without
        the existence side-channel a "load-then-check" flow would
        leak. A missing aggregate surfaces as `404 domain_not_found`.
      operationId: GetDomain
      parameters:
      - $ref: "#/components/parameters/DomainID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
          description: Domain found.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the addressed Domain.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/domain-not-found
                title: Domain Not Found
                status: 404
                detail: no Domain with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                code: domain_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain not found. Body is a `Problem` with
            `code: domain_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch a Domain by identifier.
      tags:
      - tenancy
    patch:
      description: |
        Patches the Domain identified by `{id}`.
        The body MUST set at least one of `name`, `description`,
        `mesh_cidr`, or `reachability` — an empty body surfaces as
        `400 empty_patch`.

        DECISION: `slug` is intentionally NOT a patchable field. The
        slug is the URL handle exported into cached dashboard links and
        outbox projections; allowing it to mutate would silently rot
        every cached reference. The handler rejects any body that
        carries a `slug` key (even with the same value) at decode time
        with `400 slug_immutable`. See the `tenancy` tag description
        for the full rationale.

        Retargeting `mesh_cidr` triggers two extra checks beyond the
        aggregate invariant: the SQL GIST exclusion still polices
        cross-Domain non-overlap (`409 mesh_cidr_overlap`), and the
        service-level containment guard refuses a retarget that would
        orphan an existing `project_mesh_ip_reservations.sub_range`
        (`422 mesh_cidr_invalidates_subrange`, with the offending
        `project_id` in the Problem detail).
      operationId: PatchDomain
      parameters:
      - $ref: "#/components/parameters/DomainID"
      requestBody:
        content:
          application/json:
            example:
              description: Acme Corp production — Q3 reorg.
              mesh_cidr: 10.43.0.0/16
            schema:
              $ref: "#/components/schemas/DomainPatchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
          description: Domain patched.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/slug-immutable
                title: Slug Immutable
                status: 400
                detail: Domain.Slug is immutable; remove the slug field from the patch
                  body
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                code: slug_immutable
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid body. Body is a `Problem` with `code` ∈
            { `invalid_domain`, `invalid_reachability_policy`,
            `slug_immutable`, `empty_patch` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the addressed Domain.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain not found. Body is a `Problem` with
            `code: domain_not_found`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            mesh_cidr retarget collides with another Domain's mesh
            pool. Body is a `Problem` with `code: mesh_cidr_overlap`
            .
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB tenancy ceiling
            .
        "422":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/mesh-cidr-invalidates-subrange
                title: Mesh CIDR Invalidates Sub-range
                status: 422
                detail: proposed mesh_cidr 10.43.0.0/24 invalidates project_id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa
                  sub_range 10.43.4.0/22
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                code: mesh_cidr_invalidates_subrange
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Mesh CIDR retarget would orphan an existing project
            sub-range. Body is a `Problem` with
            `code: mesh_cidr_invalidates_subrange` carrying the
            offending `project_id` in `detail`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Patch mutable fields on a Domain.
      tags:
      - tenancy
