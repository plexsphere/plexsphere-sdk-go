        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB management-fleet ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Register a management cluster into the fleet.
      tags:
      - management-fleet
  /v1/management-clusters/{id}:
