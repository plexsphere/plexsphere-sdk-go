        clause kind; sibling fields carry the clause payload. AND
        composition nests via `children` so a consumer can walk the
        tree without a second schema.
      properties:
        op:
          $ref: "#/components/schemas/LabelSelectorASTNode_op"
        key:
          description: |
            Label key the clause targets. Present for `eq`, `neq`,
            `in`, `exists`, `absent`. Absent for `and`.
          type: string
        value:
          description: Value literal for `eq` and `neq`.
          type: string
        values:
          description: Value set for `in`.
          items:
            type: string
          type: array
        children:
          description: AND children.
          items:
            $ref: "#/components/schemas/LabelSelectorASTNode"
          type: array
      required:
      - op
    LabelSelectorError:
      description: |
        Parse-time error report carrying the byte offset and a
        human-readable message so editor integrations can render
        inline squiggles.
      example:
        position: 0
        message: message
      properties:
        position:
          description: Byte offset of the offending token.
          minimum: 0
          type: integer
        message:
          description: Human-readable error detail.
          type: string
      required:
      - message
      - position
    LabelSelectorPreviewRequest:
      description: |
        Body for POST /v1/labels/selectors/preview. Carries the raw
        selector expression to parse.
      example:
        expression: expression
      properties:
        expression:
          description: |
            Raw label-selector expression (for example
            `env=prod, owner in (alice, bob)`).
          type: string
      required:
      - expression
    LabelSelectorPreviewResponse:
      description: |
        Response for POST /v1/labels/selectors/preview. Either `ast`
        is populated with the parsed AST or `errors` lists the parse
        failures — the arrays are mutually exclusive for a single
        call. HTTP status is always 200 on a well-formed body; the
        handler never raises on syntax failure.
      example:
        ast: ""
        errors:
        - position: 0
          message: message
        - position: 0
          message: message
      properties:
        ast:
          allOf:
          - $ref: "#/components/schemas/LabelSelectorASTNode"
          description: "Parsed AST root, when parsing succeeded."
        errors:
          description: "Parse errors, when parsing failed."
          items:
            $ref: "#/components/schemas/LabelSelectorError"
          type: array
    BootstrapTokenIssueRequest:
      description: |
        Body for POST /v1/projects/{project_id}/bootstrap-tokens.
        Field set mirrors the BootstrapToken aggregate's issuance
        invariants. The aggregate rejects
        unknown `kind` values, malformed `env_prefix`, and TTL values
        outside `[300, 86400]` seconds with a 400 Problem.

        DECISION: the `issued_by_user_id` field is intentionally absent.
        The handler binds the persisted `issued_by_user_id` to the
        authenticated principal id from the request context, NOT to a
        client-supplied value. Earlier revisions accepted the field
        from the request body, which let a privileged caller forge an
        arbitrary issuer attribution into the audit trail. Removing
        the field from the wire schema makes that spoof impossible at
        the schema-validation boundary.
      example:
        kind: node
        env_prefix: prod
        ttl_seconds: 3600
      properties:
        kind:
          $ref: "#/components/schemas/BootstrapTokenIssueRequest_kind"
        env_prefix:
          description: |
            Lowercase ASCII letter run encoded as the environment
            segment of the plaintext. Same regex enforced by the
            aggregate and the parser, so the surface and the storage
            layer agree on the allowed alphabet.
          maxLength: 32
          minLength: 1
          pattern: "^[a-z]+$"
          type: string
        ttl_seconds:
          description: |
            Lifetime of the BootstrapToken in seconds. Bounded by the
            aggregate's `[MinTTL=5m, MaxTTL=24h]` window so a forgotten
            token cannot become a long-lived bearer credential
            .
          maximum: 86400
          minimum: 300
          type: integer
      required:
      - env_prefix
      - kind
      - ttl_seconds
    BootstrapTokenIssueResponse:
      description: |
        Response body for POST /v1/projects/{project_id}/bootstrap-tokens.
        The plaintext `token` is returned exactly once — subsequent
        reads (GetBootstrapTokenMetadata, ListBootstrapTokens) NEVER
        include it because the persistence layer stores only the
        Argon2id hash. Operators MUST capture the plaintext from this
        response and hand it to the redeeming Node/Bridge out-of-band
        .
      example:
        token_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
        token: psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx
        issued_at: 2026-04-25T10:00:00Z
        expires_at: 2026-04-25T11:00:00Z
      properties:
        token_id:
          description: BootstrapToken identifier (UUIDv7).
          format: uuid
          type: string
        token:
          description: |
            Plaintext bearer string in the documented
            `psb_<env>_<projectId>_<kind>_<random>` format (matches
            `^psb_[a-z]+_[a-z2-7]+_(node|bridge)_[a-z2-7]{20,}$`).
            **Shown exactly once** — there is no API surface
            that ever returns the plaintext again. The Spectral rule policed by task 4.2 keys off
            the `x-plexsphere-once: true` extension on this property.
          type: string
          x-plexsphere-once: true
        issued_at:
          description: Issuance timestamp (UTC).
          format: date-time
          type: string
        expires_at:
          description: |
            Absolute expiry derived from `issued_at + ttl_seconds`. After
            this point the token is no longer redeemable.
          format: date-time
          type: string
      required:
      - expires_at
      - issued_at
      - token
      - token_id
    BootstrapTokenMetadata:
      description: |
        Hash-only metadata view of a persisted BootstrapToken aggregate
        . The plaintext is intentionally absent — it
        is only ever surfaced by `BootstrapTokenIssueResponse` and that
        window closes when the issue response is written. `consumed_at`
        and `revoked_at` are nullable because both transitions are
        terminal but optional.
      example:
        id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
        project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
        kind: node
        env_prefix: prod
        issued_at: 2026-04-25T10:00:00Z
        expires_at: 2026-04-25T11:00:00Z
        issued_by_user_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
      properties:
        id:
          description: BootstrapToken identifier (UUIDv7).
          format: uuid
          type: string
        project_id:
          description: Project the token is scoped to.
          format: uuid
          type: string
        kind:
          $ref: "#/components/schemas/BootstrapTokenMetadata_kind"
        env_prefix:
          description: |
            Environment segment encoded in the plaintext at issuance
            time.
          type: string
        issued_at:
          description: Issuance timestamp (UTC).
          format: date-time
          type: string
        expires_at:
          description: Absolute expiry timestamp (UTC).
          format: date-time
          type: string
        consumed_at:
          description: |
            Redemption timestamp, or null when the token has not yet
            been redeemed. A non-null value is terminal — a consumed
            token cannot be redeemed again.
          format: date-time
          type: string
          nullable: true
        revoked_at:
          description: |
            Revocation timestamp, or null when the token is still
            live. A non-null value is terminal — a revoked token
            rejects redemption regardless of expiry.
          format: date-time
          type: string
          nullable: true
        issued_by_user_id:
          description: |
            User who issued the token.
          format: uuid
          type: string
      required:
      - env_prefix
      - expires_at
      - id
      - issued_at
      - issued_by_user_id
      - kind
      - project_id
    BootstrapTokenList:
      description: |
        Page of BootstrapToken metadata returned by GET
        /v1/projects/{project_id}/bootstrap-tokens.
      example:
        next_cursor: next_cursor
        items:
        - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
          project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
          kind: node
          env_prefix: prod
          issued_at: 2026-04-25T10:00:00Z
          expires_at: 2026-04-25T11:00:00Z
          issued_by_user_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
        - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
          project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
          kind: node
          env_prefix: prod
          issued_at: 2026-04-25T10:00:00Z
          expires_at: 2026-04-25T11:00:00Z
          issued_by_user_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
      properties:
        items:
          description: BootstrapToken metadata in the current page.
          items:
            $ref: "#/components/schemas/BootstrapTokenMetadata"
          type: array
        next_cursor:
          description: |
            Continuation token for the next page. Null or omitted
            when the iteration has reached end-of-stream.
          type: string
          nullable: true
      required:
      - items
    RegisterRequest:
      description: |
        Body for POST /v1/register. Carries every
        field a freshly-installed plexd agent submits at registration
        time: the tenant scope (`project_id` + `resource_id`), the
        one-shot BootstrapToken plaintext, a replay-protection
        nonce, and the agent's WireGuard X25519 public key.

        Field order in the wire shape mirrors the
        `internal/identity/nodes/registration.RegisterCommand`
        value-object the handler builds before invoking the
        application service. The handler validates `public_key`
        BEFORE attempting any BootstrapToken consumption so a
        malformed key cannot also waste a token.
      example:
        project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
        resource_id: edge-router-01
        bootstrap_token: psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx
        nonce: f3f8c0b8-7a0a-8a0a-a0a0-a0a0a0a0a0a0
        public_key: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      properties:
        project_id:
          description: |
            Project the redeeming substrate is enrolling into. Must
            match the `project_id` segment of the plaintext
            `bootstrap_token`; a mismatch surfaces as 403 with
            `reason=project_mismatch`.
          format: uuid
          type: string
        resource_id:
          description: |
            Human-readable Resource handle (e.g. `edge-router-01`)
            the registering Node binds to. The handler resolves this
            against the Resource aggregate; an unknown handle
            surfaces as 404 with `code=resource_not_found`.
          minLength: 1
          type: string
        bootstrap_token:
          description: |
            Plaintext BootstrapToken in the documented
            `psb_<env>_<projectId>_<kind>_<random>` format (matches
            `^psb_[a-z]+_[a-z2-7]+_(node|bridge)_[a-z2-7]{20,}$`)
            . The Validator parses the prefix to
            discover the env + project-id + kind triple before
            running the candidate scan.
          minLength: 1
          type: string
        nonce:
          description: |
            Request-side replay-protection nonce. The persistence
            layer holds a partial UNIQUE on (project_id,
            consumed_nonce); a duplicate surfaces as 403 with
            `reason=nonce_collision`.
          minLength: 1
          type: string
        public_key:
          description: |
            32-byte X25519 (WireGuard) public key, base64-encoded
            with standard padding. RFC 7748 §5 fixes the curve to a
            32-byte little-endian point encoding so any other byte
            length surfaces as 400 with `code=public_key_invalid`;
            the all-zero degenerate value (a known small-order
            point) is also rejected with the same code. The fixed length-44 base64 canonical form is
            the standard `RawStdEncoding`-with-padding result for a
            32-byte payload.
          maxLength: 44
          minLength: 44
          pattern: "^[A-Za-z0-9+/]{43}=$"
          type: string
        requested_resource_id:
          description: |
            Optional override the operator can supply when the
            substrate's own naming differs from the platform handle
            (e.g. the Node identifies itself as `node-12` while the
            platform Resource is `edge-router-01`). Empty or omitted
            means "no override; use `resource_id` verbatim"
            .
          type: string
          nullable: true
      required:
      - bootstrap_token
      - nonce
      - project_id
      - public_key
      - resource_id
    RegisterResponse:
      description: |
        Response body for POST /v1/register. Bundles every artifact plexd needs to finish its
        bootstrap: the freshly-allocated `node_id` + `mesh_ip`, the
        Domain's signing public key + key id (for SSE event
        verification), the per-Node NSK plaintext (returned EXACTLY
        ONCE — see the `x-plexsphere-once: true` marker on the
        `nsk` field), the initial wireguard peer snapshot for table
        programming, and the Domain's mesh CIDR for routing-table
        programming.

        Operators MUST capture the `nsk` plaintext from this
        response and persist it locally on the registering Node —
        no API surface ever returns it again. The Spectral
        `plexsphere-write-once-post-must-be-issue-response` rule
        polices the `x-plexsphere-once: true` marker so the
        plaintext cannot accidentally appear on any other operation
        .
      example:
        node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a3
        mesh_ip: 100.64.0.1
        signing_public_key: MCowBQYDK2VwAyEA0123456789abcdefghijklmnopqrstuvwxyz0123=
        signing_key_id: did:web:plexsphere.dev#key-2026-04
        nsk: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
        peer_snapshot: []
        domain_mesh_cidr: 100.64.0.0/10
      properties:
        node_id:
          description: |
            Freshly-allocated Node aggregate id (UUIDv7). Echoed in
            the response so plexd records its own identity.
          format: uuid
          type: string
        mesh_ip:
          description: |
            Allocator-assigned mesh address inside the Domain's mesh
            CIDR. Canonical `netip.Addr` string form (`100.64.0.1`,
            never zero-padded).
          minLength: 1
          type: string
        signing_public_key:
          description: |
            Domain's active signing public key, base64-encoded.
            Plexd pins this and uses it to verify signed SSE events
            delivered.
          minLength: 1
          type: string
        signing_key_id:
          description: |
            Identifier (kid) the Domain's active signing key is
            indexed under (e.g. a DID-URL fragment). Carried so
            plexd can rotate-aware verify SSE events whose header
            references a non-current kid during a rotation grace
            window.
          minLength: 1
          type: string
        nsk:
          description: |
            Per-Node Node Secret Key plaintext (32 bytes, base64-
            encoded). **Shown exactly once** — there is no API
            surface that ever returns the plaintext again because
            the persistence layer stores only the wrapped form.
            Operators MUST capture it from this response and pin it
            on the registering Node out-of-band.
            The Spectral rule polices this guarantee against any
            future schema that would leak the marker outside this
            single response.
          minLength: 1
          type: string
          x-plexsphere-once: true
        peer_snapshot:
          description: |
            Initial wireguard peer set the registering Node needs
            to bring its table up. Empty for the first Node
            enrolled into a Domain. Subsequent
            membership churn is delivered through the SSE
            stream rather than re-issued here.
          items:
            $ref: "#/components/schemas/RegisterPeer"
          type: array
        domain_mesh_cidr:
          description: |
            Domain's mesh CIDR (e.g. `100.64.0.0/10`). Carried so
            plexd can program its routing table without a follow-up
            Domain lookup.
          minLength: 1
          type: string
      required:
      - domain_mesh_cidr
      - mesh_ip
      - node_id
      - nsk
      - peer_snapshot
      - signing_key_id
      - signing_public_key
    RegisterPeer:
      description: |
        Minimal projection of an existing Domain member that the
        freshly-registered Node needs in order to bring its
        WireGuard table up. The shape is deliberately narrow:
        anything else (labels, resource handle, audit metadata)
        belongs on later state-pull responses, not on the bootstrap
        payload.
      properties:
        node_id:
          description: |
            Peer's Node identifier. Plexd's reconcile loop keys
            peers by id.
          format: uuid
          type: string
        mesh_ip:
          description: |
            Peer's allocator-assigned mesh address. Plexd programs
            the wireguard endpoint from this field.
          minLength: 1
          type: string
        public_key:
          description: |
            Peer's WireGuard public key, base64-encoded with
            standard padding.
          maxLength: 44
          minLength: 44
          pattern: "^[A-Za-z0-9+/]{43}=$"
          type: string
        fallback_endpoint:
          description: |
            Canonical bridge `host:port` that plexd programs as a
            NAT-traversal relay when direct peer-to-peer connectivity
            is unavailable. Empty or absent means no bridge is
            currently assigned for this peer. Format:
            `<inet-or-hostname>:<port>`.
          type: string
      required:
      - mesh_ip
      - node_id
      - public_key
    NodeStateSnapshot:
      description: |
        Canonical reconciliation-pull envelope for a single Node
        . The four wire blocks — `peers`,
        `policy`, `bridge`, `state`, and `reports` — are always
        present so plexd's reconcile loop can diff by field presence
        rather than absence; later stories (policy fan-out, bridge orchestrator, node-state reports) populate
        the currently-empty blocks without changing the wire shape.
        Empty `peers` is `[]` (never `null`); the other blocks may
        be `null` until their owning story lands.
      example:
        reports: ""
        peers:
        - public_key: public_key
          mesh_ip: mesh_ip
          node_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          fallback_endpoint: fallback_endpoint
        - public_key: public_key
          mesh_ip: mesh_ip
          node_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          fallback_endpoint: fallback_endpoint
        reachability: ""
        bridge: ""
        state: ""
        policy: ""
      properties:
        peers:
          description: |
            Peer set the addressed Node should program into its
            WireGuard table. One entry per other Node in the
            addressed Node's Domain — the addressed Node itself is
            excluded so plexd does not program a self-peer
            . Ordered by `node_id` ascending so
            two consecutive pulls against the same ledger snapshot
            are byte-equal.
          items:
            $ref: "#/components/schemas/NodeStatePeer"
          type: array
        reachability:
          allOf:
          - $ref: "#/components/schemas/Reachability"
          description: |
            Latest `Reachability` projection for the addressed Node,
            carried inside the reconciliation-pull payload so plexd
            sees the same health view that
            `GET /v1/nodes/{id}/reachability` exposes without an
            additional round-trip.
        policy:
          allOf:
          - $ref: "#/components/schemas/NodeStatePolicy"
          description: |
            Policy block — present-but-empty placeholder
            populates the wire shape. May be `null` until then; the
            field itself is always present so plexd's reconcile loop
            can diff by field presence.
          nullable: true
        bridge:
          allOf:
          - $ref: "#/components/schemas/NodeStateBridge"
          description: |
            Bridge orchestrator block — present-but-empty placeholder
             populates the wire shape. May be `null` until
            then; the field itself is always present.
          nullable: true
        state:
          allOf:
          - $ref: "#/components/schemas/NodeStateReports"
          description: |
            Node-state block for the addressed Node: its node-state
            entries fanned into the `metadata`, `data`, and `reports`
            buckets of `NodeStateReports`. Populated after a successful
            reconciliation pull — each bucket is `[]` (never `null`) when
            the Node carries no entry of that kind. The field is always
            present so plexd's reconcile loop can diff by field presence;
            it is `null` only when the snapshot carries no node-state
            projection at all.
          nullable: true
        reports:
          allOf:
          - $ref: "#/components/schemas/NodeStateReports"
          description: |
            Forward-compatibility mirror of `state`: the controller
            points it at the same `NodeStateReports` value so the
            convergence with the SSE event taxonomy stays explicit and a
            future split between live state and rolled-up reports lands
            without an OpenAPI break. Always equals `state` today. The
            field is always present and is `null` only when `state` is.
          nullable: true
      required:
      - bridge
      - peers
      - policy
      - reachability
      - reports
      - state
    NodeStatePeer:
      description: |
        Minimal projection of a Domain peer that the addressed Node
        needs in order to program its WireGuard table. The shape is
        deliberately narrow and mirrors `RegisterPeer` so the
        reconciliation pull and the registration bootstrap converge
        on the same wire contract.
      example:
        public_key: public_key
        mesh_ip: mesh_ip
        node_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        fallback_endpoint: fallback_endpoint
      properties:
        node_id:
          description: |
            Peer's Node identifier. Plexd's reconcile loop keys
            peers by id.
          format: uuid
          type: string
        mesh_ip:
          description: |
            Peer's allocator-assigned mesh address. Plexd programs
            the WireGuard endpoint from this field.
          minLength: 1
          type: string
        public_key:
          description: |
            Peer's WireGuard public key, base64-encoded with
            standard padding.
          maxLength: 44
          minLength: 44
          pattern: "^[A-Za-z0-9+/]{43}=$"
          type: string
        fallback_endpoint:
          description: |
            Canonical bridge `host:port` that plexd programs as a
            NAT-traversal relay when direct peer-to-peer connectivity
            is unavailable. Empty or absent means no bridge is
            currently assigned for this peer. Format:
            `<inet-or-hostname>:<port>`.
          type: string
      required:
      - mesh_ip
      - node_id
      - public_key
    NodeStatePolicy:
      description: |
        Per-Node compiled policy fan-out block. Carries the merged
        rule list the controller projected for the addressed Node,
        the base64-encoded SHA-256 fingerprint that plexd uses to
        short-circuit reconcile when the locally-applied ruleset
        already matches, and the revision identifier of the
        policy-id-ascending first matched Policy. The block is
        `null` on the `NodeStateSnapshot` envelope when no compiled
        ruleset row exists for the addressed Node (the per-Node
        selector did not match any active Policy revision).

        Multi-policy semantics: the controller persists one
        `plexsphere.policy_compiled_ruleset` row per (Node, Policy)
        tuple. When a Node matches multiple Policies, the snapshot
        composer merges those rows by sorting on `policy_id` and
        concatenating each row's `rule_payload` bytes in ascending
        order. `rules` decodes the merged byte stream into the
        canonical wire shape; `fingerprint` is
        `sha256.Sum256(payload_0 || payload_1 || ...)` over the
        same byte stream; `revision_id` is drawn from the
        policy-id-ascending first row so a single uuid remains on
        the wire. Plexd treats the fingerprint as an opaque
        comparison key — it is stable for a given (Node, set of
        matched Policy revisions, rule_payload byte streams) tuple
        and changes whenever any contributing row changes.
      properties:
        revision_id:
          description: |
            Identifier of the Policy revision the merged ruleset
            anchors on — drawn from the policy-id-ascending first
            row when the addressed Node matches multiple Policies.
            A Node matching a single Policy carries that Policy's
            revision id directly.
          format: uuid
          type: string
        fingerprint:
          description: |
            SHA-256 digest over the merged `rule_payload` byte
            stream the controller persisted in
            `plexsphere.policy_compiled_ruleset`. Exactly 32 bytes
            once decoded; on the wire the field is base64-encoded
            with standard padding (44 ASCII characters). For a
            Node matching a single Policy the digest equals
            `sha256.Sum256(rule_payload)`; for a Node matching
            multiple Policies it equals `sha256.Sum256(payload_0
            || payload_1 || ...)` with `payload_i` ordered by
            ascending `policy_id`. The digest is an opaque
            comparison key — plexd compares it byte-for-byte
            against its locally-applied ruleset's stored digest
            and does not re-derive it from the `rules` array.
          format: byte
          maxLength: 44
          minLength: 44
          type: string
        rules:
          description: |
            Canonical, deterministically-sorted L3/L4 rule list the
            addressed Node MUST program. For multi-policy matches
            the array is the per-Policy concatenation of each
            row's canonical rule list in policy-id-ascending order.
            Empty array is a legitimate state — it means the Node
            matches at least one Policy's selector pair but no
            Policy contributed any rules (or every rule was
            filtered out).
          items:
            $ref: "#/components/schemas/NodeStateCompiledRule"
          type: array
      required:
      - fingerprint
      - revision_id
      - rules
    NodeStateCompiledRule:
      description: |
        Single canonicalised L3/L4 rule the controller projected
        for the addressed Node. The five-tuple
        `(source_cidr, destination_cidr, protocol, ports, action)`
        mirrors `PolicyRule` so plexd's reconcile loop can reuse
        the same rule programmer regardless of whether the rule
        came from the operator-facing Policy aggregate or the
        compiled fan-out. `ports` MUST be omitted for `icmp` and
        `any` and MUST be populated for `tcp` and `udp` — the
        protocol/port coherence check is enforced at the policy
        aggregate boundary, so a compiled rule that reaches the
        wire is guaranteed coherent.
      properties:
        action:
          $ref: "#/components/schemas/PolicyAction"
        protocol:
          $ref: "#/components/schemas/PolicyProtocol"
        source_cidr:
          description: |
            IPv4 or IPv6 prefix in CIDR notation (e.g.
            `10.0.0.0/8`, `2001:db8::/32`). Source and destination
            agree on address family by aggregate-boundary
            invariant.
          type: string
        destination_cidr:
          description: |
            IPv4 or IPv6 prefix in CIDR notation. Address family
            matches `source_cidr`.
          type: string
        ports:
          $ref: "#/components/schemas/PolicyPortRange"
      required:
      - action
      - destination_cidr
      - protocol
      - source_cidr
    PolicyUpdatedPayload:
      description: |
        Wire payload carried by a `policy_updated` SSE envelope. The
        controller emits one envelope per per-(Node, Policy)
        compiled-ruleset row whenever the compile arm persists a new
        revision, and one empty-rules envelope per previously-
        addressed Node when a Policy is deleted. The payload fields
        mirror the `NodeStatePolicy` block plexd consumes on the
        reconciliation-pull path so the same rule programmer applies
        the wire delta and the snapshot delta without branching.

        The `fingerprint` field is the base64-encoded SHA-256 digest
        over the canonical `rule_payload` byte stream the controller
        persisted; plexd compares it byte-for-byte against the
        locally-applied ruleset's digest and short-circuits reconcile
        when the two match. Empty `rules` is a legitimate state — a
        policy-deletion fan-out emits `rules: []` and the canonical
        empty-ruleset fingerprint so a consumer observing only the
        wire stream converges to the same projection as a consumer
        that re-reads the snapshot column.
      properties:
        node_id:
          description: |
            Addressed Node the compiled-ruleset projection targets.
            Equals the `{id}` path parameter of the SSE subscription
            the envelope is delivered on.
          format: uuid
          type: string
        policy_id:
          description: |
            Identifier of the Policy aggregate the compiled-ruleset
            row was projected from. Two Policies addressing the same
            Node produce two envelopes carrying distinct `policy_id`
            values; the consumer merges them by sorting on
            `policy_id` ascending.
          format: uuid
          type: string
        revision_id:
          description: |
            Identifier of the Policy revision the compiled ruleset
            anchors on. Equals the head revision id at compile time;
            re-emission for the same revision is idempotent under the
            publisher's deduplication window.
          format: uuid
          type: string
        fingerprint:
          description: |
            SHA-256 digest over the canonical `rule_payload` byte
            stream the controller persisted. Exactly 32 bytes once
            decoded; on the wire the field is base64-encoded with
            standard padding (44 ASCII characters). The digest is an
            opaque comparison key — plexd compares it byte-for-byte
            against its locally-applied ruleset's stored digest and
            does not re-derive it from the `rules` array.
          format: byte
          maxLength: 44
          minLength: 44
          type: string
        rules:
          description: |
            Canonical, deterministically-sorted L3/L4 rule list the
            addressed Node MUST program for the named Policy. An
            empty array is a legitimate state — it means the Node
            no longer matches the Policy (e.g. the Policy was
            deleted or its selector no longer captures the Node).
          items:
            $ref: "#/components/schemas/NodeStateCompiledRule"
          type: array
      required:
      - fingerprint
      - node_id
      - policy_id
      - revision_id
      - rules
    BridgeConfigUpdatedPayload:
      description: |
        Wire payload carried by a `bridge_config_updated` SSE envelope.
        The controller emits one envelope per (Node, bridge Resource)
        delivered-config projection whenever the bridge orchestrator
        persists a new effective configuration, and one empty-config
        envelope per previously-addressed Node when a bridge Resource is
        deleted. The payload mirrors the `NodeStateBridge` block plexd
        consumes on the reconciliation-pull path so the same reconcile
        loop applies the wire delta and the snapshot delta without
        branching.
      properties:
        node_id:
          description: |
            Addressed Node the delivered-config projection targets.
            Equals the `{id}` path parameter of the SSE subscription
            the envelope is delivered on.
          format: uuid
          type: string
        bridge_resource_id:
          description: |
            Identifier of the bridge Resource aggregate the
            delivered-config projection was derived from. Two bridge
            Resources addressing the same Node produce two envelopes
            carrying distinct `bridge_resource_id` values; the consumer
            merges them by sorting on `bridge_resource_id` ascending.
          format: uuid
          type: string
        effective_config:
          allOf:
          - $ref: "#/components/schemas/NodeStateBridge"
          description: |
            The per-Node bridge-orchestrator delivered-config block the
            addressed Node MUST program for the named bridge Resource.
            Each child block is present-but-nullable so plexd's reconcile
            loop can diff by field presence; an all-null block is a
            legitimate state — it means the Node no longer matches the
            bridge Resource (e.g. the Resource was deleted or its
            selector no longer captures the Node).
      required:
      - bridge_resource_id
      - effective_config
      - node_id
    NodeStateBridge:
      description: |
        Per-Node bridge-orchestrator delivered-config block. Carries the
        relay configuration, the user-access providers, the public
        ingress rules, and the site-to-site tunnels the addressed Node
        must program. Each child block is present-but-nullable so plexd's
        reconcile loop can diff by field presence.
      properties:
        relay:
          allOf:
          - $ref: "#/components/schemas/NodeStateBridgeRelay"
          description: |
            Relay configuration the Node must program. `null` when no
            relay is configured on the owning bridge Resource.
          nullable: true
        user_access:
          allOf:
          - $ref: "#/components/schemas/NodeStateBridgeUserAccess"
          description: |
            User-access providers the Node must program. `null` when the
            owning bridge Resource defines none.
          nullable: true
        ingress:
          allOf:
          - $ref: "#/components/schemas/NodeStateBridgeIngress"
          description: |
            Public-ingress rules the Node must program. `null` when the
            owning bridge Resource defines none.
          nullable: true
        site_to_site:
          allOf:
          - $ref: "#/components/schemas/NodeStateBridgeSiteToSite"
          description: |
            Site-to-site tunnels the Node must program. `null` when the
            owning bridge Resource defines none.
          nullable: true
    NodeStateBridgeRelay:
      description: |
        Per-Node projection of the bridge relay configuration paired with
        the per-peer fallback-endpoint assignments the Node must program.
      properties:
        enabled:
          description: Whether the relay is active.
          type: boolean
        listen_port:
          description: UDP port the relay listens on.
          maximum: 65535
          minimum: 1
          type: integer
        assignments:
          description: |
            Per-peer relay fallback-endpoint assignments, ordered
            deterministically by `peer_node_id` so two consecutive pulls
            against the same ledger snapshot are byte-equal. An empty
            array is a legitimate state.
          items:
            $ref: "#/components/schemas/NodeStateBridgeRelayAssignment"
          type: array
      required:
      - assignments
      - enabled
      - listen_port
    NodeStateBridgeRelayAssignment:
      description: |
        One per-peer relay fallback assignment: the peer the Node may
        relay for and the fallback endpoint that peer dials. Population
        lands with the effective-config story; an empty `assignments`
        list is the interim state.
      properties:
        peer_node_id:
          description: Peer Node the relay fallback applies to.
          format: uuid
          type: string
        fallback_endpoint:
          description: Host the peer dials when direct connectivity is unavailable.
          type: string
        fallback_endpoint_port:
          description: Port on the fallback endpoint the peer dials.
          maximum: 65535
          minimum: 1
          type: integer
      required:
      - fallback_endpoint
      - fallback_endpoint_port
      - peer_node_id
    NodeStateBridgeUserAccess:
      description: |
        Per-Node projection of the bridge user-access providers the Node
        must program. Reuses the `BridgeUserAccessProviderResponse` wire
        shape so the delivered config matches the management-surface
        bytes for the same provider.
      properties:
        providers:
          description: User-access providers ordered by slug ascending.
          items:
            $ref: "#/components/schemas/BridgeUserAccessProviderResponse"
          type: array
      required:
      - providers
    NodeStateBridgeIngress:
      description: |
        Per-Node projection of the bridge public-ingress rules the Node
        must program. Reuses the `BridgeIngressRuleResponse` wire shape so
        the delivered config matches the management-surface bytes for the
        same rule.
      properties:
        rules:
          description: Public-ingress rules ordered by slug ascending.
          items:
            $ref: "#/components/schemas/BridgeIngressRuleResponse"
          type: array
      required:
      - rules
    NodeStateBridgeSiteToSite:
      description: |
        Per-Node projection of the bridge site-to-site tunnels the Node
        must program. Reuses the `BridgeSiteToSiteTunnelResponse` wire
        shape so the delivered config matches the management-surface
        bytes for the same tunnel.
      properties:
        tunnels:
          description: Site-to-site tunnels ordered by slug ascending.
          items:
            $ref: "#/components/schemas/BridgeSiteToSiteTunnelResponse"
          type: array
      required:
      - tunnels
    NodeStateReports:
      description: |
        Per-Node node-state block carried on the `NodeStateSnapshot`
        envelope. The addressed Node's node-state entries are fanned
        into three buckets by kind: operator-visible, platform-owned
        `metadata`; platform-owned `data`; and upstream,
        workload-authored `reports`. Each bucket is a required array of
        `StateEntry` and is `[]` (never `null`) when the Node carries no
        entry of that kind, so plexd's reconcile loop can diff by field
        presence. Entries within a bucket are ordered by `key` ascending
        so two consecutive pulls against the same ledger snapshot are
        byte-equal.
      properties:
        metadata:
          description: |
            Operator-visible, platform-owned metadata entries for the
            addressed Node, ordered by `key` ascending.
          items:
            $ref: "#/components/schemas/StateEntry"
          type: array
        data:
          description: |
            Platform-owned operational data entries for the addressed
            Node, ordered by `key` ascending.
          items:
            $ref: "#/components/schemas/StateEntry"
          type: array
        reports:
          description: |
            Upstream, workload-authored report entries for the addressed
            Node, ordered by `key` ascending.
          items:
            $ref: "#/components/schemas/StateEntry"
          type: array
      required:
      - data
      - metadata
      - reports
    StateEntry:
      description: |
        A single node-state entry within a `NodeStateReports` bucket.
        The triple (`key`, `value`, `workload_tag`) is the minimum plexd
        needs to correlate a reported entry with the workload that
        produced it.
      properties:
        key:
          description: The entry's stable identity within its bucket.
          maxLength: 128
          minLength: 1
          type: string
        value:
          description: "The entry's reported value, carried opaquely."
          type: string
        workload_tag:
          description: |
            Tag of the workload that produced the entry. Absent or empty
            when the entry is not attributed to a workload.
          type: string
      required:
      - key
      - value
    NodeStateReportRequest:
      description: |
        Body for `PUT /v1/nodes/{id}/state/reports/{key}`. Carries the
        upstream, workload-authored report value the addressed Node is
        recording for the addressed key.
      example:
        workload_tag: workload_tag
        value: value
      properties:
        value:
          description: |
            The report value to store for the addressed key. Capped at
            4096 bytes; an over-size value is rejected with 400.
          maxLength: 4096
          type: string
        workload_tag:
          description: |
            Optional tag of the workload producing the report. Stored
            verbatim and echoed back on the next reconciliation pull.
          type: string
      required:
      - value
    NodeStateReportResponse:
      description: |
        Result of an accepted `PUT /v1/nodes/{id}/state/reports/{key}`.
        Echoes the stored key and the server wall-clock time at which the
        report write was accepted.
      example:
        accepted_at: 2000-01-23T04:56:07.000+00:00
        key: key
      properties:
        accepted_at:
          description: |
            Server wall-clock time at which the report write was
            accepted and durably recorded.
          format: date-time
          type: string
        key:
          description: The report key that was written.
          type: string
      required:
      - accepted_at
      - key
    HeartbeatRequest:
      description: |
        Body for POST /v1/nodes/{id}/heartbeat. Carries the per-Node liveness signal plexd
        emits at a 30s cadence: the client wall-clock (for skew
        detection), the SHA-256 of the running plexd binary (for
        tamper-evidence and rollout tracking), the human-readable
        plexd version string, and a free-form NAT summary that the
        controller correlates with the per-Domain bridge view in
        later stories.
      example:
        binary_checksum: binary_checksum
        client_now: 2000-01-23T04:56:07.000+00:00
        binary_version: binary_version
        nat_summary:
          key: ""
      properties:
        client_now:
          description: |
            Client wall-clock timestamp at the moment the heartbeat
            was assembled. The handler rejects the request with 400
            `clock_skew` if the value drifts more than 60 seconds
            from server now.
          format: date-time
          type: string
        binary_checksum:
          description: |
            SHA-256 digest of the running plexd binary. The wire form
            is the 32-byte raw digest encoded as either lowercase hex
            (64 characters) or base64 with standard padding (44
            characters); the handler decodes both forms and rejects
            anything else with 400 `binary_checksum_empty`.
          format: byte
          maxLength: 64
          minLength: 32
          type: string
        binary_version:
          description: |
            Human-readable plexd version string (e.g.
            `plexd-v0.4.2-ge5f3a1c`). Non-empty per the application-
            boundary invariants — the handler rejects an empty value
            with 400 `binary_version_empty`.
          minLength: 1
          type: string
        nat_summary:
          additionalProperties: true
          description: |
            Free-form NAT discovery summary produced by plexd. Empty
            object is permitted — later stories define the
            schema once the per-Domain bridge orchestrator lands
            .
          type: object
      required:
      - binary_checksum
      - binary_version
      - client_now
      - nat_summary
    HeartbeatResponse:
      description: |
        Body for POST /v1/nodes/{id}/heartbeat success responses
        . Carries the server-side commit
        timestamp and two reconciliation hints. both flags
        default to `false`; later stories flip them when the
        controller wants the caller to issue a fresh reconciliation
        pull or rotate its NSK.
      example:
        reconcile: true
        rotate_keys: true
        accepted_at: 2000-01-23T04:56:07.000+00:00
      properties:
        accepted_at:
          description: |
            Server-side timestamp at which the heartbeat fact was
            committed. Distinct from `client_now` so the caller can
            estimate one-way latency and clock-skew.
          format: date-time
          type: string
        reconcile:
          description: |
            When `true`, the controller is asking the caller to issue
            a fresh `GET /v1/nodes/{id}/state` reconciliation pull
            because the snapshot the caller is operating against has
            drifted. Defaults to `false` — later stories flip
            this flag when the controller observes a divergence
            .
          type: boolean
        rotate_keys:
          description: |
            When `true`, a mesh-key rotation is pending for the
            heartbeating Node: the caller MUST generate a fresh
            Curve25519 keypair and complete the rotation via
            `POST /v1/keys/rotate`. This flag is load-bearing — it is
            the heartbeat-channel half of the two-channel rotation
            dispatch (the SSE `rotate_keys` event is the other half),
            so a Node that reconnected rather than holding a live SSE
            stream still learns it must rotate within one heartbeat
            interval. `false` when no `peer_key_rotation` row is
            pending for the Node.
          type: boolean
      required:
      - accepted_at
      - reconcile
      - rotate_keys
    EndpointRequest:
      description: |
        Body for PUT /v1/nodes/{id}/endpoint. Carries a single NAT-
        observed transport endpoint the plexd agent saw the local
        Node arrive on, plus the agent's classification of the NAT
        traversal posture and the wall-clock at which the observation
        was made.
      example:
        endpoint: endpoint
        reported_at: 2000-01-23T04:56:07.000+00:00
        nat_type: full_cone
      properties:
        endpoint:
          description: |
            Canonical `host:port` wire form of the observed transport
            endpoint. The host is an IPv4 dotted quad or an IPv6
            address bracketed per RFC 5952 (`[2001:db8::1]:51820`);
            the port is in the RFC 6056 ephemeral range 1..65535.
            Loopback, link-local, and unspecified addresses are
            refused with 400 `endpoint_unparseable`.
          minLength: 1
          type: string
        nat_type:
          $ref: "#/components/schemas/EndpointRequest_nat_type"
        reported_at:
          description: |
            Agent wall-clock at the moment the observation was made.
            The handler rejects the request with 400
            `endpoint_clock_skew` if the value drifts more than 60
            seconds from server now.
          format: date-time
          type: string
      required:
      - endpoint
      - nat_type
      - reported_at
    EndpointResponse:
      description: |
        Body for PUT /v1/nodes/{id}/endpoint success responses. Carries
        the server-side commit timestamp and the freshness deadline
        the agent must beat before the per-Domain sweeper tombstones
        the endpoint.
      example:
        accepted_at: 2000-01-23T04:56:07.000+00:00
        stale_after: 2000-01-23T04:56:07.000+00:00
      properties:
        accepted_at:
          description: |
            Server-side timestamp at which the endpoint observation
            was committed. Distinct from `reported_at` so the caller
            can estimate one-way latency and clock-skew.
          format: date-time
          type: string
        stale_after:
          description: |
            Server-side deadline by which the agent must submit a
            fresh observation before the per-Domain endpoint sweeper
            stamps the endpoint as stale and emits a tombstone event.
            Equal to `accepted_at` plus the per-Domain endpoint TTL
            (defaults to 5 minutes).
          format: date-time
          type: string
      required:
      - accepted_at
      - stale_after
    CapabilityManifestRequest:
      description: |
        Body for PUT /v1/nodes/{id}/capabilities. Carries the per-Node
        capability manifest snapshot plexd reports on agent boot and
        whenever the running binary, host-key, or declared hooks
        change: the agent binary semver, the SHA-256 of the running
        binary (for tamper-evidence and rollout tracking), the
        optional SSH host-key fingerprint (for the downstream integrity
        correlator), and the optional list of hooks the agent
        advertises. The handler canonicalises the envelope through the
        `tenancy.NewCapabilityManifest` value-object constructor; every
        invariant is enforced at the aggregate boundary before the
        recorder ever touches Postgres.
      example:
        binary_checksum: binary_checksum
        declared_hooks:
        - name: name
          checksum: checksum
        - name: name
          checksum: checksum
        - name: name
          checksum: checksum
        - name: name
          checksum: checksum
        - name: name
          checksum: checksum
        ssh_host_key_fingerprint: ssh_host_key_fingerprint
        binary_version: binary_version
        plexd_hooks:
        - image_digest: image_digest
          name: name
          sandbox: true
          timeout_seconds: 0
          parameters:
            key: parameters
        - image_digest: image_digest
          name: name
          sandbox: true
          timeout_seconds: 0
          parameters:
            key: parameters
        - image_digest: image_digest
          name: name
          sandbox: true
          timeout_seconds: 0
          parameters:
            key: parameters
        - image_digest: image_digest
          name: name
          sandbox: true
          timeout_seconds: 0
          parameters:
            key: parameters
        - image_digest: image_digest
          name: name
          sandbox: true
          timeout_seconds: 0
          parameters:
            key: parameters
      properties:
        binary_version:
          description: |
            Human-readable plexd agent version string (e.g.
            `plexd-v0.4.2-ge5f3a1c`). Non-empty after trimming
            whitespace — the handler rejects an empty value with 400
            `binary_version_empty`.
          minLength: 1
          type: string
        binary_checksum:
          description: |
            SHA-256 digest of the running plexd binary, 32 bytes
            base64-encoded with standard padding. Anything that does
            not decode to exactly 32 bytes is rejected with 400
            `binary_checksum_invalid`.
          format: byte
          type: string
        ssh_host_key_fingerprint:
          description: |
            Optional OpenSSH SHA-256 host-key fingerprint of the
            running agent, rendered as `SHA256:<base64>`. Empty or
            absent values are accepted; a non-empty value that does
            not match the canonical form is rejected with 400
            `ssh_host_key_fingerprint_invalid`. Downstream integrity
            correlators branch on `host_key_changed` in the response
            to detect a host-key rotation between snapshots.
          type: string
          nullable: true
        declared_hooks:
          description: |
            Optional list of hook declarations the agent advertises.
            Each entry pairs a hook name with the SHA-256 digest of
            the hook payload so the integrity correlator can detect a
            hook-content change without re-fetching the payload. The
            manifest invariants reject duplicate names (400
            `declared_hook_duplicate`), more than 128 entries (400
            `declared_hooks_too_many`), and any per-entry violation
            (400 `declared_hook_invalid`).
          items:
            $ref: "#/components/schemas/DeclaredHook"
          maxItems: 128
          type: array
        plexd_hooks:
          description: |
            Optional list of Kubernetes PlexdHook custom resources the
            agent discovered in its cluster and advertises read-only.
            Distinct from `declared_hooks`: each entry carries an OCI
            image digest, a free-form parameter map, an execution
            timeout, and a sandbox flag rather than a payload checksum.
            Discovery is read-only — plexsphere records what plexd
            observed and never writes PlexdHook objects back. The
            manifest invariants reject duplicate names (422
            `plexd_hook_duplicate`), more than 128 entries (422
            `plexd_hooks_too_many`), and any per-entry violation (422
            `plexd_hook_invalid`).
          items:
            $ref: "#/components/schemas/PlexdHook"
          maxItems: 128
          type: array
      required:
      - binary_checksum
      - binary_version
    DeclaredHook:
      description: |
        Single hook declaration inside a CapabilityManifestRequest's
        `declared_hooks` list. The pair (name, checksum) lets the
        integrity correlator detect a hook-content change without
        re-fetching the hook payload.
      example:
        name: name
        checksum: checksum
      properties:
        name:
          description: |
            Hook identifier (e.g. `post-install`). Non-empty after
            trimming whitespace; a violation surfaces as 400
            `declared_hook_invalid`.
          minLength: 1
          type: string
        checksum:
          description: |
            SHA-256 digest of the hook payload, 32 bytes base64-encoded
            with standard padding. Anything that does not decode to
            exactly 32 bytes surfaces as 400 `declared_hook_invalid`.
          format: byte
          type: string
      required:
      - checksum
      - name
    PlexdHook:
      description: |
        Single discovered Kubernetes PlexdHook custom resource inside a
        CapabilityManifestRequest's `plexd_hooks` list. Distinct from
        `DeclaredHook` (the declared script hook): a PlexdHook carries an
        OCI image digest, a free-form parameter map, an execution
        timeout, and a sandbox flag rather than a payload checksum.
        Discovery is read-only on the plexsphere side — the manifest
        only records what plexd observed in the customer cluster;
        plexsphere never writes PlexdHook objects back nor resolves the
        digest against a registry. Per-entry invariants surface as 422
        `plexd_hook_invalid`.
      example:
        image_digest: image_digest
        name: name
        sandbox: true
        timeout_seconds: 0
        parameters:
          key: parameters
      properties:
        name:
          description: |
            PlexdHook resource name (e.g. `nightly-backup`). Non-empty
            after trimming whitespace; a violation surfaces as 422
            `plexd_hook_invalid`.
          minLength: 1
          type: string
        image_digest:
          description: |
            OCI image digest of the hook image in canonical
            `sha256:<64 lowercase hex>` form. Format-only validation —
            plexsphere performs no registry lookup. Anything that does
            not match surfaces as 422 `plexd_hook_invalid`.
          type: string
        parameters:
          additionalProperties:
            type: string
          description: |
            Optional free-form string-to-string parameter map copied
            verbatim from the discovered PlexdHook spec.
        timeout_seconds:
          description: |
            Optional execution timeout in whole seconds. Non-negative; a
            negative value surfaces as 422 `plexd_hook_invalid`. The
            domain owns this as a duration — the `_seconds` suffix is the
            wire encoding only.
          format: int64
          minimum: 0
          type: integer
        sandbox:
          description: |
            Optional flag indicating the discovered hook requests
            sandboxed execution. Absent is treated as `false`.
          type: boolean
      required:
      - image_digest
      - name
    CapabilityManifestResponse:
      description: |
        Body for PUT /v1/nodes/{id}/capabilities success responses.
        Carries the server-side commit timestamp and the diff against
        the prior persisted snapshot: `fields_changed` enumerates the
        manifest fields that transitioned (sorted alphabetically so
        the wire response is byte-stable across runs), and
        `host_key_changed` is broken out as its own boolean because
        SSH host-key transitions are security-load-bearing and
        downstream consumers branch on the flag without parsing
        `fields_changed`. An idempotent PUT (no diff) emits an empty
        `fields_changed` array and `host_key_changed: false`.
      example:
        fields_changed:
        - fields_changed
        - fields_changed
        host_key_changed: true
        accepted_at: 2000-01-23T04:56:07.000+00:00
      properties:
        accepted_at:
          description: |
            Server-side timestamp at which the capability manifest
            snapshot was committed.
          format: date-time
          type: string
        fields_changed:
          description: |
            Alphabetically-sorted list of manifest fields that
            transitioned versus the prior persisted snapshot. Possible
            entries: `binary_version`, `binary_checksum`,
            `ssh_host_key_fingerprint`, `declared_hooks`, `plexd_hooks`.
            Empty on an idempotent no-op PUT.
          items:
            type: string
          type: array
        host_key_changed:
          description: |
            `true` when the SSH host-key fingerprint transitioned
            versus the prior persisted snapshot (including a transition
            into or out of the unset state). Always present so
            downstream security correlators can branch on the flag
            without parsing `fields_changed`.
          type: boolean
      required:
      - accepted_at
      - fields_changed
      - host_key_changed
    IntegrityViolationsRequest:
      description: |
        Body for POST /v1/nodes/{id}/integrity-violations. Carries a
        batch of integrity-violation reports plexd detected on the
        local Node and is pushing upstream for persistence and alert
        emission. The handler canonicalises every entry through the
        `tenancy.NewIntegrityViolation` value-object constructor and
        the batch through the Node aggregate's
        `RecordIntegrityViolations` method before any database write.
      example:
        violations:
        - expected_fingerprint: expected_fingerprint
          expected_checksum: expected_checksum
          detected_by: startup_scan
          kind: binary_checksum
          artifact_id: artifact_id
          observed_checksum: observed_checksum
          observed_fingerprint: observed_fingerprint
        - expected_fingerprint: expected_fingerprint
          expected_checksum: expected_checksum
          detected_by: startup_scan
          kind: binary_checksum
          artifact_id: artifact_id
          observed_checksum: observed_checksum
          observed_fingerprint: observed_fingerprint
        - expected_fingerprint: expected_fingerprint
          expected_checksum: expected_checksum
          detected_by: startup_scan
          kind: binary_checksum
          artifact_id: artifact_id
          observed_checksum: observed_checksum
          observed_fingerprint: observed_fingerprint
        - expected_fingerprint: expected_fingerprint
          expected_checksum: expected_checksum
          detected_by: startup_scan
          kind: binary_checksum
          artifact_id: artifact_id
          observed_checksum: observed_checksum
          observed_fingerprint: observed_fingerprint
        - expected_fingerprint: expected_fingerprint
          expected_checksum: expected_checksum
          detected_by: startup_scan
          kind: binary_checksum
          artifact_id: artifact_id
          observed_checksum: observed_checksum
          observed_fingerprint: observed_fingerprint
      properties:
        violations:
          description: |
            The per-violation reports the agent observed. Empty or
            larger-than-128 batches are rejected with 400
            `integrity_violations_empty` or
            `integrity_violations_too_many` respectively.
          items:
            $ref: "#/components/schemas/IntegrityViolationRequest"
          maxItems: 128
          minItems: 1
          type: array
      required:
      - violations
    IntegrityViolationRequest:
      description: |
        Single integrity-violation report inside an
        `IntegrityViolationsRequest`. The `kind` field discriminates
        between the three artifact classes the agent monitors. For
        `binary_checksum` and `hook_checksum` the entry carries the
        observed and (optionally) expected 32-byte SHA-256 digests; for
        `ssh_host_key` it carries the observed and (optionally)
        expected `SHA256:<base64>` fingerprints. Cross-kind column
        leakage (a `binary_checksum` carrying a fingerprint, or an
        `ssh_host_key` carrying a checksum) is rejected with 400
        `integrity_violation_kind_mismatch`.
      example:
        expected_fingerprint: expected_fingerprint
        expected_checksum: expected_checksum
        detected_by: startup_scan
        kind: binary_checksum
        artifact_id: artifact_id
        observed_checksum: observed_checksum
        observed_fingerprint: observed_fingerprint
      properties:
        kind:
          $ref: "#/components/schemas/IntegrityViolationRequest_kind"
        detected_by:
          $ref: "#/components/schemas/IntegrityViolationRequest_detected_by"
        artifact_id:
          description: |
            Stable identifier of the affected artifact (hook name,
            binary path label, or host-key file label). Non-empty
            after trimming whitespace; a violation surfaces as 400
            `integrity_violation_artifact_id_empty`.
          minLength: 1
          type: string
        observed_checksum:
          description: |
            SHA-256 digest the agent observed for the artifact, 32
            bytes base64-encoded with standard padding. REQUIRED for
            the `binary_checksum` and `hook_checksum` kinds; MUST be
            empty or absent for the `ssh_host_key` kind. Anything that
            does not decode to exactly 32 bytes (when expected) is
            rejected with 400
            `integrity_violation_checksum_invalid`. A non-empty value
            on an `ssh_host_key` entry surfaces as 400
            `integrity_violation_kind_mismatch`.
          format: byte
          type: string
          nullable: true
        expected_checksum:
          description: |
            Optional SHA-256 digest the agent expected for the
            artifact, 32 bytes base64-encoded. Accepted only for the
            `binary_checksum` and `hook_checksum` kinds. When present,
            anything that does not decode to exactly 32 bytes is
            rejected with 400
            `integrity_violation_checksum_invalid`.
          format: byte
          type: string
          nullable: true
        observed_fingerprint:
          description: |
            OpenSSH SHA-256 host-key fingerprint the agent observed,
            rendered as `SHA256:<base64>`. REQUIRED for the
            `ssh_host_key` kind; MUST be empty or absent for the
            checksum kinds. A non-empty value on a checksum kind
            surfaces as 400 `integrity_violation_kind_mismatch`; a
            value that does not match the canonical form surfaces as
            400 `integrity_violation_host_key_fingerprint_invalid`.
          pattern: "^SHA256:[A-Za-z0-9+/]+={0,2}$"
          type: string
          nullable: true
        expected_fingerprint:
          description: |
            Optional OpenSSH SHA-256 host-key fingerprint the agent
            expected, rendered as `SHA256:<base64>`. Accepted only for
            the `ssh_host_key` kind. A value that does not match the
            canonical form is rejected with 400
            `integrity_violation_host_key_fingerprint_invalid`.
          pattern: "^SHA256:[A-Za-z0-9+/]+={0,2}$"
          type: string
          nullable: true
      required:
      - artifact_id
      - detected_by
      - kind
    IntegrityViolationsResponse:
      description: |
        Body for POST /v1/nodes/{id}/integrity-violations success
        responses. Carries the server-side commit timestamp and the
        echoed count of persisted violations so the agent can
        reconcile the batch with its local replay-queue.
      example:
        violation_count: 11
        accepted_at: 2000-01-23T04:56:07.000+00:00
      properties:
        accepted_at:
          description: |
            Server-side timestamp at which the integrity-violations
            batch was committed.
          format: date-time
          type: string
        violation_count:
          description: |
            Number of `IntegrityViolation` rows persisted by this
            request. Matches the `violations` array length on input.
          maximum: 128
          minimum: 1
          type: integer
      required:
      - accepted_at
      - violation_count
    MetricSample:
      description: |
        A single metric sample in a `POST /v1/nodes/{id}/metrics` batch.
        The batch body is a JSON array of `MetricSample` objects. Each
        sample is tagged server-side with the originating Node's Domain
        and Project — the wire body never carries an identity subject or
        email — so dashboards and alerts scope through the platform label
        model rather than through caller-supplied identity. `group`,
        `name`, `value`, and `timestamp` are required; `labels` is an
        optional dimension map.
      example:
        group: node_resources
        name: cpu_seconds_total
        value: 12345.6
        labels:
          cpu: "0"
          mode: user
        timestamp: 2026-04-27T10:15:30Z
      properties:
        group:
          $ref: "#/components/schemas/MetricSample_group"
        name:
          description: |
            The metric name within its group (e.g. `cpu_seconds_total`).
            Required and non-empty.
          type: string
        value:
          description: |
            The numeric sample value. Required.
          type: number
        labels:
          additionalProperties:
            type: string
          description: |
            Optional dimension map carried with the sample. Keys and
            values are caller-supplied label dimensions; the platform adds
            the Domain, Project, and Node tags itself and never reads an
            identity subject or email from this map.
        timestamp:
          description: |
            RFC 3339 timestamp at which the sample was observed on the
            Node. Required.
          format: date-time
          type: string
      required:
      - group
      - name
      - timestamp
      - value
    LogLine:
      description: |
        A single structured log line in a `POST /v1/nodes/{id}/logs`
        batch. The batch body is newline-delimited JSON
        (`application/x-ndjson`), one `LogLine` object per line. Like every
        ingest record the line is tagged server-side with the originating
        Node's Domain and Project and routed to Grafana Loki; the platform
        never reads an identity subject or email off the line. `severity`,
        `message`, and `timestamp` are required; `unit` and `hostname` are
        optional.
      example:
        severity: info
        unit: plexd.service
        hostname: edge-node-7
        message: tunnel established to peer edge-node-3
        timestamp: 2026-04-27T10:15:30Z
      properties:
        severity:
          $ref: "#/components/schemas/LogLine_severity"
        unit:
          description: |
            Optional originating unit (the systemd unit or file-glob source)
            the line was collected from.
          type: string
        hostname:
          description: |
            Optional hostname the line was emitted on.
          type: string
        message:
          description: |
            The log message body. Required and non-empty. PII that a line
            inadvertently carries is the customer's ingest-side
            responsibility; an optional per-Domain redaction filter can be
            enabled at ingest.
          type: string
        timestamp:
          description: |
            RFC 3339 timestamp at which the line was emitted. Required.
          format: date-time
          type: string
      required:
      - message
      - severity
      - timestamp
    AuditEvent:
      description: |
        A single normalised audit event in a `POST /v1/nodes/{id}/audit`
        batch. The batch body is newline-delimited JSON
        (`application/x-ndjson`), one `AuditEvent` object per line. The
        closed `source` set mirrors the audit sources the README pins
        (Linux auditd via AF_AUDIT Netlink, or Kubernetes audit-log
        tailing). Events are tagged server-side with the originating Node's
        Domain and Project and routed to Grafana Loki with a separate
        retention class; the wire body never carries an identity subject or
        email. `source`, `action`, `outcome`, and `timestamp` are required.
      example:
        source: auditd
        action: execve
        outcome: success
        timestamp: 2026-04-27T10:15:30Z
      properties:
        source:
          $ref: "#/components/schemas/AuditEvent_source"
        action:
          description: |
            The audited action (e.g. the syscall name or Kubernetes verb).
            Required and non-empty.
          type: string
        outcome:
          description: |
            The outcome of the audited action (e.g. `success` / `failure`).
            Required and non-empty.
          type: string
        timestamp:
          description: |
            RFC 3339 timestamp at which the event occurred. Required.
          format: date-time
          type: string
      required:
      - action
      - outcome
      - source
      - timestamp
    IngestReceipt:
      description: |
        Body for the `202 Accepted` response of the three observability
        ingest operations (`POST /v1/nodes/{id}/metrics`, `.../logs`, and
        `.../audit`). Carries the server-side acceptance timestamp and the
        echoed count of records buffered, so the agent can reconcile the
        batch with its local replay queue. Mirrors the shape of
        `IntegrityViolationsResponse`.
      example:
        accepted_at: 2026-04-27T10:15:30.123Z
        records: 42
      properties:
        accepted_at:
          description: |
            Server-side timestamp at which the batch was accepted and
            handed to the ingest buffer.
          format: date-time
          type: string
        records:
          description: |
            Number of records accepted from the batch. Matches the number
            of array elements (metrics) or non-blank NDJSON lines (logs /
            audit) on input.
          minimum: 1
          type: integer
      required:
      - accepted_at
      - records
    KeysRotateRequest:
      description: |
        Body for POST /v1/keys/rotate. Carries the single artifact a
        rotating plexd Node submits to complete a mesh-key rotation:
        the freshly-generated Curve25519 public key.
      example:
        new_public_key: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      properties:
        new_public_key:
          description: |
            The Node's freshly-generated Curve25519 (WireGuard) public
            key, 32 bytes, base64-encoded with standard padding. RFC
            7748 §5 fixes the curve to a 32-byte little-endian point
            encoding, so any other decoded length is rejected with 422
            `keys_rotate_public_key_invalid`; the all-zero degenerate
            value (a known small-order point) is rejected with the
            same code. A key byte-identical to the Node's current
            public key is rejected with 422
            `keys_rotate_public_key_unchanged`.
          format: byte
          type: string
      required:
      - new_public_key
    KeysRotateResponse:
      description: |
        Body for POST /v1/keys/rotate success responses. Carries the
        receipt of the completed rotation: the `peer_key_rotation` row
        id and the `(kid, wrap_key_version)` reference of the
        re-issued pairwise PSK.

        The response deliberately carries NO PSK plaintext and NO
        ciphertext — only the `(kid, wrap_key_version)` reference. The
        rotating Node already holds its NSK and resolves the PSK
        wrapping locally; the control plane never re-emits secret
        material on this surface.
      example:
        rotation_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4
        kid: did:web:plexsphere.dev#psk-2026-04
        wrap_key_version: 7
      properties:
        rotation_id:
          description: |
            Identifier of the `peer_key_rotation` row this submission
            flipped from `pending` to `completed`. The Node records it
            so a later audit query can correlate the rotation back to
            the re-issued PSK row.
          format: uuid
          type: string
        kid:
          description: |
            Key id of the freshly-wrapped pairwise PSK the rotation
            re-issued. Paired with `wrap_key_version` it is the
            reference plexd uses to resolve the PSK without the
            control plane re-transmitting secret material.
          minLength: 1
          type: string
        wrap_key_version:
          description: |
            Version of the active wrap key under which the re-issued
            PSK was wrapped. Paired with `kid` it pins the exact
            wrapping epoch.
          type: integer
      required:
      - kid
      - rotation_id
      - wrap_key_version
    RotationImpactEdge:
      description: |
        Single peer edge whose pairwise PSK would be re-issued by a
        mesh-key rotation against the previewed Node. Carries the
        peer Node identifier together with the `(kid,
        wrap_key_version)` reference of the PSK currently in force —
        the same reference the mutating
        `POST /v1/keys/rotate` would replace.
      example:
        peer_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a6
        current_kid: did:web:plexsphere.dev#psk-2026-04
        current_wrap_key_version: 7
      properties:
        peer_node_id:
          description: |
            Peer at the other end of the affected edge — joins back
            to the per-Node read surfaces for drill-down.
          format: uuid
          type: string
        current_kid:
          description: |
            Key id of the PSK currently in force on this edge. Mirrors
            the `kid` field on `KeysRotateResponse` so a renderer can
            display "before / after" the dry-run with a single
            mapping.
          minLength: 1
          type: string
        current_wrap_key_version:
          description: |
            Version of the active wrap key under which the in-force
            PSK is wrapped. Paired with `current_kid` it pins the
            exact wrapping epoch the rotation would supersede.
          type: integer
      required:
      - current_kid
      - current_wrap_key_version
      - peer_node_id
    RotationImpactPreview:
      description: |
        Body for GET /v1/nodes/{id}/keys/rotate/preview success
        responses. Carries a non-mutating dry-run of the fleet impact
        a mesh-key rotation against the addressed Node would have:
        the live Peer the rotation would target, the listing of peer
        edges whose PSK would be re-issued, whether a rotation is
        already in flight, and an estimated wall-clock duration so
        the dashboard confirmation dialog can size its progress
        indicator.

        The response carries NO PSK plaintext and NO ciphertext, and
        the handler appends NO `peer_key_rotation` row, NO
        `rotate_keys` outbox event, and NO audit row beyond the read-
        side ReBAC decision — calling this surface twice in a row is
        guaranteed to be a no-op against the persistence layer.
      example:
        node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
        peer_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5
        affected_peer_count: 2
        affected_edges:
        - peer_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a6
          current_kid: did:web:plexsphere.dev#psk-2026-04
          current_wrap_key_version: 7
        - peer_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a7
          current_kid: did:web:plexsphere.dev#psk-2026-04
          current_wrap_key_version: 7
        already_pending: false
        estimated_duration_seconds: 12
      properties:
        node_id:
          description: |
            The Node whose rotation is being previewed. Echoes the
            path parameter so a renderer can sanity-check the
            response against the request URL.
          format: uuid
          type: string
        peer_id:
          description: |
            Identifier of the live Peer the rotation would target.
            Mirrors `RotationTriggerResponse.peer_id` so the preview
            and the mutating trigger share a single mapping.
          format: uuid
          type: string
        affected_peer_count:
          description: |
            Number of peers whose pairwise PSK would be re-issued by
            the rotation. Equal to the length of `affected_edges`;
            duplicated as a top-level scalar so a renderer can show
            the count without expanding the edge listing.
          minimum: 0
          type: integer
        affected_edges:
          description: |
            Explicit listing of peer edges that would receive a fresh
            pairwise PSK. Order is stable but unspecified — renderers
            MUST NOT rely on the listing order for layout.
          items:
            $ref: "#/components/schemas/RotationImpactEdge"
          type: array
        already_pending:
          description: |
            True when a `peer_key_rotation` row is already pending for
            the addressed Node — i.e. a live
            `POST /v1/nodes/{id}/keys/rotate` would surface the same
            flag and append no second event. Operators switch on this
            flag to distinguish a fresh trigger from an idempotent
            no-op before confirming the rotation.
          type: boolean
        estimated_duration_seconds:
          description: |
            Estimated wall-clock seconds the rotation will take,
            based on the current SSE fan-out and the affected peer
            count. Capacity planning hint — not a guarantee.
          minimum: 0
          type: integer
      required:
      - affected_edges
      - affected_peer_count
      - already_pending
      - estimated_duration_seconds
      - node_id
      - peer_id
    RotationTriggerResponse:
      description: |
        Body for POST /v1/nodes/{id}/keys/rotate success responses.
        Carries the rotation handle an operator uses to track a
        triggered mesh-key rotation: the `peer_key_rotation` row id,
        the live Peer the rotation targets, and whether the response
        reflects a pre-existing in-flight rotation.
      example:
        rotation_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4
        peer_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5
        already_pending: false
      properties:
        rotation_id:
          description: |
            Identifier of the `peer_key_rotation` row the request
            recorded — freshly inserted, or the in-flight row when
            `already_pending` is true.
          format: uuid
          type: string
        peer_id:
          description: |
            Identifier of the live Peer whose mesh key the rotation
            targets.
          format: uuid
          type: string
        already_pending:
          description: |
            True when the response reflects a pre-existing pending
            rotation — an idempotent re-request that surfaced the
            in-flight row — rather than a freshly recorded request.
            Operators switch on this flag to distinguish a newly
            dispatched `rotate_keys` command from an idempotent no-op.
          type: boolean
      required:
      - already_pending
      - peer_id
      - rotation_id
    MeshEdge:
      description: |
        Single directed edge in the per-Domain mesh-topology
        projection. Mirrors a SSE peer-delta row one-for-one — a
        renderer that consumes the live stream and a renderer that
        polls `GET /v1/domains/{domainId}/mesh/topology` converge on
        byte-identical state.
      example:
        source_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
        target_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
        mode: direct
        status: healthy
      properties:
        source_node_id:
          description: |
            Node from which the WireGuard handshake originates. Pinned
            against the live Peer aggregate so a stale read never
            returns an edge for a retired Node.
          format: uuid
          type: string
        target_node_id:
          description: |
            Peer Node the handshake terminates against. Same liveness
            guarantee as `source_node_id`.
          format: uuid
          type: string
        mode:
          $ref: "#/components/schemas/MeshEdge_mode"
        relay_node_id:
          description: |
            Bridge Node currently serving as the relay fallback for
            this edge. Always populated when `mode` is `relayed`;
            always `null` when `mode` is `direct`.
          format: uuid
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/MeshEdge_status"
      required:
      - mode
      - relay_node_id
      - source_node_id
      - status
      - target_node_id
    MeshTopology:
      description: |
        Envelope returned by `GET /v1/domains/{domainId}/mesh/topology`.
        Carries a snapshot of every anchored Node in the Domain and
        the directed edges between them, captured at `generated_at`.
        The snapshot is a coherent read of the SSE peer-delta
        projection — partial pages are never emitted; a renderer can
        replace the entire view on each pull.
      example:
        domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
        generated_at: 2026-05-25T10:00:00Z
        nodes:
        - node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
          mesh_ip: 10.42.0.11
          reachability: healthy
        - node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
          mesh_ip: 10.42.0.12
          reachability: healthy
        edges:
        - source_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
          target_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
          mode: direct
          status: healthy
      properties:
        domain_id:
          description: |
            The Domain the topology describes. Echoes the path
            parameter so a renderer can sanity-check the response
            against the request URL.
          format: uuid
          type: string
        generated_at:
          description: |
            Server-side timestamp at which the snapshot was assembled.
            Renderers display it alongside the topology so an operator
            can spot a stale view.
          format: date-time
          type: string
        nodes:
          description: |
            Every anchored Peer Node in the Domain at `generated_at`.
            Order is stable but unspecified — renderers MUST NOT rely
            on the listing order for layout.
          items:
            $ref: "#/components/schemas/MeshTopologyNode"
          type: array
        edges:
          description: |
            Every directed mesh edge between two Nodes in `nodes` at
            `generated_at`. Edges are directional; a fully meshed pair
            of Nodes produces two entries.
          items:
            $ref: "#/components/schemas/MeshEdge"
          type: array
      required:
      - domain_id
      - edges
      - generated_at
      - nodes
    MeshTopologyNode:
      description: |
        Minimal Node projection embedded in the `nodes` array of
        `MeshTopology`. Carries only the fields the mesh-map view
        needs — a richer Node view lives on the per-Node read
        surfaces (`GET /v1/nodes/{id}/...`).
      example:
        node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
        mesh_ip: 10.42.0.11
        reachability: healthy
      properties:
        node_id:
          description: |
            Node identifier (UUIDv7). Joins back to the per-Node read
            surfaces for drill-down.
          format: uuid
          type: string
        mesh_ip:
          description: |
            The Node's allocator-assigned mesh address — IPv4 or IPv6
            depending on the Domain's mesh CIDR family.
          type: string
        reachability:
          $ref: "#/components/schemas/MeshTopologyNode_reachability"
      required:
      - mesh_ip
      - node_id
      - reachability
    Reachability:
      description: |
        Per-Node reachability projection driven by the heartbeat
        handler. The state-machine
        transitions `healthy` → `stale` after 90 seconds without an
        accepted heartbeat and `stale` → `unreachable` after 300
        seconds. `last_heartbeat_at` is `null` until the first
        heartbeat is accepted; `changed_at` is always present and
        tracks the most recent state transition.
      example:
        changed_at: 2000-01-23T04:56:07.000+00:00
        state: healthy
        last_heartbeat_at: 2000-01-23T04:56:07.000+00:00
      properties:
        state:
          $ref: "#/components/schemas/Reachability_state"
        last_heartbeat_at:
          description: |
            Server-side timestamp of the most recently accepted
            heartbeat, or `null` until the first heartbeat is
            accepted.
          format: date-time
          type: string
          nullable: true
        changed_at:
          description: |
            Server-side timestamp of the most recent transition into
            the current `state`. Always present — for a Node that has
            never sent a heartbeat this is the timestamp at which the
            reachability row was first materialised.
          format: date-time
          type: string
      required:
      - changed_at
      - state
    AuditReason:
      description: |
        Frozen ReBAC decision-reason taxonomy attached to every audit
        chain row. The value set
        mirrors `internal/audit.Reason.String` exactly: any new
        reason is a breaking change and MUST be appended to this enum
        in lockstep with the Go side. The `unknown` sentinel is the
        renderer fallback for an out-of-range ordinal — its presence
        on the wire is itself an audit anomaly worth alerting on.
      enum:
      - granted
      - out_of_scope
      - insufficient_relation
      - caveat_violation
      - unknown
      type: string
    AuditSubject:
      description: |
        Subject-side projection on an audit row. `pseudonym` is the per-Domain HMAC of the subject
        identity — the chain-input form, never plaintext. The
        `identity_id_ref` is a pointer to the live Identity row when
        one is still resolvable; it is `null` after the right-to-
        erasure workflow has purged the `audit_subject_pii` mapping
        for the subject.
      example:
        identity_id_ref: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        pseudonym: pseudonym
      properties:
        pseudonym:
          description: |
            Per-Domain pseudonym of the subject (32 bytes, lowercase
            hex). Stable for the lifetime of the chain and never
            reversible to plaintext from the chain alone.
          pattern: "^[0-9a-f]{64}$"
          type: string
        identity_id_ref:
          description: |
            Live Identity id the pseudonym maps to, or `null` if the
            mapping has been erased. Cleared by `EraseIdentityFromAudit`
            .
          format: uuid
          type: string
          nullable: true
      required:
      - pseudonym
    AuditObject:
      description: |
        Object-side projection on an audit row — the SpiceDB tuple
        object the ReBAC check addressed.
      example:
        id: id
        type: type
      properties:
        type:
          description: "SpiceDB object type (e.g. `domain`, `node`, `resource`)."
          type: string
        id:
          description: Opaque object identifier within `type`.
          type: string
      required:
      - id
      - type
    AuditDecision:
      description: |
        Decision-side projection on an audit row. `result` is the
        rendered Reason; `caveat_context` lists the caveat field
        NAMES referenced by the check — values never cross this
        boundary. The `x-plexsphere-names-only`
        marker on `caveat_context` flags the names-only invariant for
        review tooling and is policed by the
        `plexsphere-audit-caveat-names-only` Spectral rule.
      example:
        result: null
        caveat_context:
          key:
          - caveat_context
          - caveat_context
      properties:
        result:
          $ref: "#/components/schemas/AuditReason"
        caveat_context:
          additionalProperties:
            items:
              type: string
          description: |
            Map from caveat NAME to the array of caveat-parameter
            NAMES referenced by the check. Values are never present
            on the wire — is structural: the only string
            content here is identifiers. `internal/audit.Entry` and
            `internal/audit.AppendInput` enforce the same discipline
            structurally on the Go side.
          x-plexsphere-names-only: true
      required:
      - caveat_context
      - result
    AuditRequestContext:
      description: |
        Inbound request context recorded alongside the decision. Both
        fields are optional because the audit row may be emitted from
        a code path with no live HTTP request (e.g. a background
        reconciler). The IP is the network-level client IP after
        proxy unwrapping and is recorded for incident triage; the
        user agent is recorded verbatim and is not parsed.
      example:
        ip: ip
        user_agent: user_agent
      properties:
        ip:
          description: Client IP after proxy unwrapping (IPv4 or IPv6 textual form).
          type: string
        user_agent:
          description: Verbatim `User-Agent` header value.
          type: string
    AuditEntry:
      description: |
        Single audit chain row exposed on the read surface. Mirrors the `internal/audit.Entry`
        aggregate plus the per-row provenance (`entry_hash`,
        `prev_hash`) the verifier consumes. `archive_etag`
        and `archived_at` are populated once the object-store mirror
        worker has uploaded the row to the per-Domain bucket; both are `null` on rows still in flight from the
        append path.
      example:
        reason: granted
        request_context:
          ip: ip
          user_agent: user_agent
        decision:
          result: null
          caveat_context:
            key:
            - caveat_context
            - caveat_context
        archived_at: 2000-01-23T04:56:07.000+00:00
        subject:
          identity_id_ref: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          pseudonym: pseudonym
        prev_hash: prev_hash
        archive_etag: archive_etag
        entry_hash: entry_hash
        relation: relation
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        occurred_at: 2000-01-23T04:56:07.000+00:00
        correlation_id: correlation_id
        seq: 1
        object:
          id: id
          type: type
      properties:
        seq:
          description: |
            Per-Domain monotonic sequence number assigned at append
            time.
          format: int64
          minimum: 1
          type: integer
        domain_id:
          description: Owning Domain.
          format: uuid
          type: string
        occurred_at:
          description: |
            Server-side timestamp the decision was reached (RFC 3339,
            UTC).
          format: date-time
          type: string
        reason:
          $ref: "#/components/schemas/AuditReason"
        subject:
          $ref: "#/components/schemas/AuditSubject"
        relation:
          description: SpiceDB relation label that was checked.
          type: string
        object:
          $ref: "#/components/schemas/AuditObject"
        decision:
          $ref: "#/components/schemas/AuditDecision"
        correlation_id:
          description: |
            Inbound request correlation id propagated from the
            transport layer.
          type: string
        request_context:
          $ref: "#/components/schemas/AuditRequestContext"
        entry_hash:
          description: |
            `sha256(prev_hash || sha256(canonical_bytes))` for this
            row, lowercase hex.
          pattern: "^[0-9a-f]{64}$"
          type: string
        prev_hash:
          description: |
            `entry_hash` of the preceding row, or 64 zero hex
            characters on the genesis row (`seq=1`).
          pattern: "^[0-9a-f]{64}$"
          type: string
        archive_etag:
          description: |
            Object-store ETag of the per-Domain mirror copy, or `null`
            until the drain worker has uploaded the row.
          type: string
          nullable: true
        archived_at:
          description: |
            Server-side timestamp the mirror upload completed, or
            `null` while the row is still in flight.
          format: date-time
          type: string
          nullable: true
      required:
      - correlation_id
      - decision
      - domain_id
      - entry_hash
      - object
      - occurred_at
      - prev_hash
      - reason
      - relation
      - request_context
      - seq
      - subject
    AuditEntryList:
      description: |
        Cursor-paginated page returned by `ListAuditEntries`. The
        `next_cursor` field is the value to pass back as the `cursor`
        query parameter on the next call; it is `null` (or absent)
        when the page is short — that is the end-of-stream signal
        callers stop on.
      example:
        entries:
        - reason: granted
          request_context:
            ip: ip
            user_agent: user_agent
          decision:
            result: null
            caveat_context:
              key:
              - caveat_context
              - caveat_context
          archived_at: 2000-01-23T04:56:07.000+00:00
          subject:
            identity_id_ref: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            pseudonym: pseudonym
          prev_hash: prev_hash
          archive_etag: archive_etag
          entry_hash: entry_hash
          relation: relation
          domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          occurred_at: 2000-01-23T04:56:07.000+00:00
          correlation_id: correlation_id
          seq: 1
          object:
            id: id
            type: type
        - reason: granted
          request_context:
            ip: ip
            user_agent: user_agent
          decision:
            result: null
            caveat_context:
              key:
              - caveat_context
              - caveat_context
          archived_at: 2000-01-23T04:56:07.000+00:00
          subject:
            identity_id_ref: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            pseudonym: pseudonym
          prev_hash: prev_hash
          archive_etag: archive_etag
          entry_hash: entry_hash
          relation: relation
          domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          occurred_at: 2000-01-23T04:56:07.000+00:00
          correlation_id: correlation_id
          seq: 1
          object:
            id: id
            type: type
        next_cursor: next_cursor
      properties:
        entries:
          description: Audit rows in ascending `seq` order.
          items:
            $ref: "#/components/schemas/AuditEntry"
          type: array
        next_cursor:
          description: |
            Opaque, HMAC-signed cursor scoped to the addressed Domain.
            Replaying a cursor minted for a different Domain surfaces
            as 400 with `code: cursor_invalid`.
          type: string
          nullable: true
      required:
      - entries
    AuditEntryProof:
      description: |
        Single audit row plus the canonical-bytes proof needed to
        recompute its hash off-line. The verifier
        recomputes `sha256(prev_hash || sha256(canonical_bytes))` and
        compares the result against `entry_hash` row by row.
      example:
        entry:
          reason: granted
          request_context:
            ip: ip
            user_agent: user_agent
          decision:
            result: null
            caveat_context:
              key:
              - caveat_context
              - caveat_context
          archived_at: 2000-01-23T04:56:07.000+00:00
          subject:
            identity_id_ref: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            pseudonym: pseudonym
          prev_hash: prev_hash
          archive_etag: archive_etag
          entry_hash: entry_hash
          relation: relation
          domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          occurred_at: 2000-01-23T04:56:07.000+00:00
          correlation_id: correlation_id
          seq: 1
          object:
            id: id
            type: type
        proof:
          prev_hash: prev_hash
          entry_hash: entry_hash
          canonical_bytes: canonical_bytes
      properties:
        entry:
          $ref: "#/components/schemas/AuditEntry"
        proof:
          $ref: "#/components/schemas/AuditEntryProof_proof"
      required:
      - entry
      - proof
    AuditChainVerifyRequest:
      description: |
        Bounds for the verify run. Omit both fields to verify the
        full chain anchored at the genesis row.
      example:
        to_seq: 1
        from_seq: 1
      properties:
        from_seq:
          description: |
            Inclusive lower bound on `seq`. Defaults to `1` when
            absent — i.e. the genesis row.
          format: int64
          minimum: 1
          type: integer
        to_seq:
          description: |
            Inclusive upper bound on `seq`. Defaults to the current
            chain head when absent.
          format: int64
          minimum: 1
          type: integer
    AuditChainVerifyResult:
      description: |
        Outcome of a verify run. DIVERGENCE IS NOT
        AN ERROR — a tampered chain surfaces here as `ok: false` with
        the offending `divergent_seq` and the expected/observed
        hashes pinned. The handler MUST NEVER return a 5xx for
        tampering; the 5xx channel is reserved for infrastructure
        faults the verifier cannot reason about.
      example:
        observed_hash: observed_hash
        expected_hash: expected_hash
        divergent_seq: 0
        ok: true
        segment_to: 1
        segment_from: 1
      properties:
        ok:
          description: |
            `true` when every row in the inspected segment hashes
            correctly and chains to its predecessor; `false` when the
            verifier observed a divergence at `divergent_seq`.
          type: boolean
        divergent_seq:
          description: |
            Seq of the first row whose recomputed hash did not match
            the stored value, or whose `prev_hash` did not match the
            previous row's `entry_hash`. `null` on a clean run.
          format: int64
          type: integer
          nullable: true
        expected_hash:
          description: |
            Hash the verifier computed for `divergent_seq`, lowercase
            hex. `null` on a clean run.
          pattern: "^[0-9a-f]{64}$"
          type: string
          nullable: true
        observed_hash:
          description: |
            Hash actually stored at `divergent_seq`, lowercase hex.
            `null` on a clean run.
          pattern: "^[0-9a-f]{64}$"
          type: string
          nullable: true
        segment_from:
          description: Inclusive lower bound the verifier actually walked.
          format: int64
          minimum: 1
          type: integer
        segment_to:
          description: Inclusive upper bound the verifier actually walked.
          format: int64
          minimum: 1
          type: integer
      required:
      - ok
      - segment_from
      - segment_to
    AuditEraseIdentityRequest:
      description: |
        Inbound right-to-erasure request. The
        endpoint is idempotent on `subject_pseudonym` — replaying the
        request after a successful erasure is safe.
      example:
        identity_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        identity_id:
          description: |
            Identity whose `audit_subject_pii` mapping must be purged
            from the addressed Domain. The pseudonym is derived
            server-side from `(domain_id, identity_id)` and the
            per-Domain pepper; clients never compute it themselves
            .
          format: uuid
          type: string
      required:
      - identity_id
    AuditEraseIdentityResponse:
      description: |
        Idempotent erasure-recorded response. `subject_pseudonym` is
        returned so operators can correlate the self-audit
        `audit.erase-identity` entry without re-deriving it.
      example:
        erased_at: 2000-01-23T04:56:07.000+00:00
        subject_pseudonym: subject_pseudonym
      properties:
        subject_pseudonym:
          description: |
            Per-Domain pseudonym derived from `identity_id` (32 bytes,
            lowercase hex).
          pattern: "^[0-9a-f]{64}$"
          type: string
        erased_at:
          description: |
            Server-side timestamp the erasure was recorded. Reflects
            the time the self-audit `audit.erase-identity` entry was
            appended, not the wall-clock time of the original
            `audit_subject_pii` row's birth.
          format: date-time
          type: string
      required:
      - erased_at
      - subject_pseudonym
    DomainReachabilityPolicy:
      description: |
        Per-Domain heartbeat policy carried on Domain create / patch
        bodies and the Domain response. The three thresholds are linked: the
        aggregate rejects a partial fill (`invalid_reachability_policy`,
        400) and replaces a fully-zero policy with the platform default.

        DECISION: durations are encoded as Go-style strings ("30s",
        "5m") rather than seconds-int. The policy is operator-facing
        config — every other duration in the platform is rendered as a
        Go-style string in dashboards and CLI output, and the parser at
        the aggregate boundary already accepts the same syntax. The
        seconds-int alternative was rejected because it forced the
        dashboard to render a unit-less integer that operators would
        misread on first glance.
      example:
        unreachable_after: 300s
        heartbeat_interval: 30s
        stale_after: 90s
      properties:
        heartbeat_interval:
          description: |
            Cadence agents must honour. Floor 10s, ceiling 1h. Encoded
            as a Go duration string (e.g. `30s`, `1m`).
          example: 30s
          type: string
        stale_after:
          description: |
            Grace window before a Node is declared stale. Must be at
            least `3 × heartbeat_interval` and at most 1h.
          example: 90s
          type: string
        unreachable_after:
          description: |
            Grace window before a Node is declared unreachable. Must
            be at least `2 × stale_after` and at most 1h.
          example: 300s
          type: string
      required:
      - heartbeat_interval
      - stale_after
      - unreachable_after
    DomainResponse:
      description: |
        Hydrated projection of a tenancy Domain aggregate. The shape is shared by `CreateDomain`,
        `GetDomain`, `ListDomains`, and `PatchDomain` — every read
        surface returns the same wire bytes for the same Domain so
        clients only need one binding.
      example:
        mesh_cidr: 10.42.0.0/16
        updated_at: 2000-01-23T04:56:07.000+00:00
        name: name
        description: description
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        reachability:
          unreachable_after: 300s
          heartbeat_interval: 30s
          stale_after: 90s
        region: region
        slug: slug
      properties:
        id:
          description: Domain identifier (UUIDv7).
          format: uuid
          type: string
        name:
          description: Human-readable Domain name (trimmed at the aggregate).
          type: string
        slug:
          description: |
            Kebab-case URL handle. Stable for the lifetime of the
            Domain — see the `tenancy` tag description for the
            immutability rationale.
          type: string
        description:
          description: |
            Optional free-form description. Empty string when the
            operator did not set one (the wire shape never carries
            `null` for this field).
          type: string
        region:
          description: |
            The region the Domain is pinned to. Unlike `description`,
            this field is OMITTED from the wire entirely when the
            Domain is unpinned — it is never carried as an empty
            string, so an absent key means "no region".
          maxLength: 64
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          type: string
        mesh_cidr:
          description: |
            Canonical RFC 4632 mesh-IP pool the Domain owns. Cross-
            Domain non-overlap is enforced by the SQL GIST exclusion
            constraint.
          example: 10.42.0.0/16
          type: string
        reachability:
          $ref: "#/components/schemas/DomainReachabilityPolicy"
        created_at:
          description: Aggregate creation timestamp (UTC).
          format: date-time
          type: string
        updated_at:
          description: |
            Last-modified timestamp (UTC). Bumped by every mutator —
            `Rename`, `ChangeDescription`, `RetargetMeshCIDR`, and
            `ChangeReachabilityPolicy`.
          format: date-time
          type: string
      required:
      - created_at
      - id
      - mesh_cidr
      - name
      - reachability
      - slug
      - updated_at
    DomainCreateRequest:
      description: |
        Body for `POST /v1/domains`. Field set
        mirrors the Domain aggregate's `NewDomain` invariants. The
        handler authorises the call against the platform-level
        `manage` relation BEFORE invoking the service so an
        unauthorised caller never produces a `DomainCreated` outbox
        row.
      example:
        mesh_cidr: 10.42.0.0/16
        name: name
        description: description
        reachability:
          unreachable_after: 300s
          heartbeat_interval: 30s
          stale_after: 90s
        region: region
        slug: slug
      properties:
        name:
          description: Human-readable Domain name. Whitespace-only is rejected.
          maxLength: 255
          minLength: 1
          type: string
        slug:
          description: |
            Kebab-case URL handle. The aggregate's `ParseSlug` enforces
            the same regex; surfacing the pattern here lets the
            generated client validate before the round-trip.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          type: string
        description:
          description: |
            Optional free-form description. Whitespace-only strings are
            rejected by the aggregate (the operator most likely fat-
            fingered the field instead of meaning to clear it).
          maxLength: 1024
          type: string
        region:
          description: |
            Optional region the Domain is pinned to at creation;
            absent or empty means the Domain is left unpinned. The
            aggregate's `ParseRegion` enforces the same regex, so
            surfacing the pattern here lets the generated client
            validate before the round-trip.
          maxLength: 64
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          type: string
        mesh_cidr:
          description: |
            Canonical RFC 4632 mesh-IP pool. Cross-Domain non-overlap
            is enforced by the SQL GIST exclusion constraint and
            surfaces as `409 mesh_cidr_overlap`.
          example: 10.42.0.0/16
          type: string
        reachability:
          $ref: "#/components/schemas/DomainReachabilityPolicy"
      required:
      - mesh_cidr
      - name
      - slug
    DomainPatchRequest:
      additionalProperties: false
      description: |
        Body for `PATCH /v1/domains/{id}`. All
        properties are optional — but the body MUST set at least one
        of `name`, `description`, `region`, `mesh_cidr`, or
        `reachability`. An empty body is rejected at the handler with
        `400 empty_patch`.

        x-domain-slug-immutable: The `slug` is intentionally absent
        from this schema. The handler rejects any request body that
        carries a `slug` key (even with the same value) at decode time
        with `400 slug_immutable`. See the `tenancy` tag description
        and the DECISION block on `tenancy.Domain` for the rationale.
      example:
        mesh_cidr: 10.43.0.0/16
        name: name
        description: description
        reachability:
          unreachable_after: 300s
          heartbeat_interval: 30s
          stale_after: 90s
        region: region
      properties:
        name:
          description: |
            New human-readable Domain name. The aggregate's `Rename`
            mutator validates the same constraints as `NewDomain`.
          maxLength: 255
          minLength: 1
          type: string
        description:
          description: |
            New free-form description. The empty string clears the
            description; a whitespace-only string is rejected so an
            operator typo cannot silently wipe the field.
          maxLength: 1024
          type: string
        region:
          description: |
            Re-pin the Domain to a region. The aggregate's
            `ParseRegion` enforces the same regex. Unlike the immutable
            `slug`, the region is freely re-pinnable through this
            mutator.
          maxLength: 64
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          type: string
        mesh_cidr:
          description: |
            New canonical RFC 4632 mesh-IP pool. Triggers the cross-
            Domain GIST exclusion check (`409 mesh_cidr_overlap`) and
            the service-level containment guard against
            `project_mesh_ip_reservations.sub_range`
            (`422 mesh_cidr_invalidates_subrange`).
          example: 10.43.0.0/16
          type: string
        reachability:
          $ref: "#/components/schemas/DomainReachabilityPolicy"
    DomainList:
      description: |
        Page of Domains returned by `GET /v1/domains`. The window is computed by the persistence layer in
        slug order; per-row visibility is layered on top so the
        `items` array is the subset the caller is authorised to see.
      example:
        next_cursor: next_cursor
        empty_reason: no_rebac_membership
        items:
        - mesh_cidr: 10.42.0.0/16
          updated_at: 2000-01-23T04:56:07.000+00:00
          name: name
          description: description
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          reachability:
            unreachable_after: 300s
            heartbeat_interval: 30s
            stale_after: 90s
          region: region
          slug: slug
        - mesh_cidr: 10.42.0.0/16
          updated_at: 2000-01-23T04:56:07.000+00:00
          name: name
          description: description
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          reachability:
            unreachable_after: 300s
            heartbeat_interval: 30s
            stale_after: 90s
          region: region
          slug: slug
      properties:
        items:
          description: Domains in the current page.
          items:
            $ref: "#/components/schemas/DomainResponse"
          type: array
        next_cursor:
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
          type: string
          nullable: true
        empty_reason:
          $ref: "#/components/schemas/DomainList_empty_reason"
      required:
      - items
    DomainChildCounts:
      description: |
