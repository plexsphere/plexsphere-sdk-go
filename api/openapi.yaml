          project_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          cloud_credential_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          state: requested
          materialised: true
      properties:
        items:
          description: Credential Assignments in the current page.
          items:
