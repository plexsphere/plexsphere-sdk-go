          format: date-time
          type: string
          nullable: true
        created_at:
          description: Aggregate creation timestamp (UTC).
          format: date-time
          type: string
        updated_at:
          description: |
            Last-modified timestamp (UTC). Bumped by every lifecycle
            mutator — rotate, revoke, expire.
          format: date-time
          type: string
