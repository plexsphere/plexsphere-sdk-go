        the moment a `DeleteDomain` call ran. Returned in the Problem
        detail of a `409 domain_not_empty` response so the operator
        knows exactly which sub-aggregate is blocking the delete
        .
      properties:
        projects:
          description: Number of `Project` aggregates still attached.
          minimum: 0
          type: integer
        groups:
          description: Number of `Group` aggregates still attached.
          minimum: 0
          type: integer
        identities:
          description: |
            Number of identities (users + service identities) still
            attached.
          minimum: 0
          type: integer
        idp_bindings:
          description: Number of `IdPBinding` rows still attached.
          minimum: 0
          type: integer
        nodes:
          description: Number of `Node` aggregates still attached.
          minimum: 0
          type: integer
      required:
      - groups
      - identities
      - idp_bindings
      - nodes
      - projects
