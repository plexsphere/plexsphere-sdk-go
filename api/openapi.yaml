        name: status
        required: false
        schema:
          $ref: "#/components/schemas/IntegrityViolationStatus"
        style: form
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed so a tampered
          cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
