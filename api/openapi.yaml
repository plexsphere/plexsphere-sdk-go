  /v1/projects/{project_id}/executions:dispatch:
    post:
      description: |
        Dispatches a named action — a built-in shipped with the Node
        agent or a user-declared hook — to a target set inside the
        owning Project. The handler runs the dispatch ReBAC check on the
        Project BEFORE any persistence write, resolves the target cohort
        (either a single `node_id` or the Nodes matching an opaque label
        `selector`), gates the dispatch on capability availability and
        hook integrity, then mints one Execution that fans out to one
        per-Node invocation. Each invocation carries a unique callback
        URL under `/v1/nodes/{id}/executions/{exec_id}` the Node reports
        progress back to.

        The request body supplies the `action` name, the action `type`
        (`builtin` or `hook`), an opaque `parameters` JSON document, and
        an optional `timeout_seconds`. The target is EXACTLY ONE of a
        single `node_id` or an opaque label `selector` — supplying both,
        or neither, is rejected.
      operationId: DispatchExecution
      parameters:
      - $ref: "#/components/parameters/ExecutionProjectID"
      requestBody:
        content:
          application/json:
            example:
              action: restart-agent
              type: builtin
              parameters: {}
              timeout_seconds: 300
              selector: "role=worker,region=eu-west"
            schema:
              $ref: "#/components/schemas/DispatchExecutionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              example:
                id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f1
                project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1
                domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                action: restart-agent
                type: builtin
                status: pending
                created_at: 2026-05-02T10:00:00Z
                updated_at: 2026-05-02T10:00:00Z
                targets:
                - node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
                  status: pending
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T10:00:00Z
              schema:
                $ref: "#/components/schemas/Execution"
          description: |
            Execution dispatched. Body is the metadata-only Execution
            projection with one target per resolved Node.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid request — typically a malformed body, a malformed
            label selector (`code: malformed_selector`), an action the
            target has not declared (`code: action_not_declared`), or a
            target specification that is not exactly one of `node_id` or
            `selector`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to dispatch actions in the owning
            Project. Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The owning Project does not exist or is not visible. Body is a
            `Problem` with `code: project_not_found`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The dispatch targets a hook that failed its trust-on-first-use
            integrity check — the Node's declared hook digest drifted from the
            pinned known-good baseline, or no baseline has ever been catalogued
            for it (the gate fails closed). Body is a `Problem` with
            `code: hook_integrity_violation`.
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The dispatch could not be admitted because the resolved target
            cohort is empty. Body is a `Problem` with
            `code: selector_empty_cohort` — the label selector matched no
            Node, or every matched Node was dropped by the per-node domain /
            ReBAC / capability filter.
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The dispatch could not be admitted because admitting one more
            Execution would breach the per-Domain live-execution cap. Body is
            a `Problem` with `code: capacity_exceeded` and a `detail` naming
            the per-Domain live-executions dimension.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/actions-dispatch-not-provisioned
                title: Not Implemented
                status: 501
                detail: "POST /v1/projects/{project_id}/executions:dispatch requires\
                  \ the production wiring of the dispatch service. One or more ports\
                  \ are not yet provisioned in this build."
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1/executions:dispatch
                code: actions_dispatch_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The action-dispatch surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `actions_dispatch_not_provisioned` so log scrapers can alert
            on the deferred-wiring state. Resolves once the dispatch
            service and its target-resolution ports are wired into the v1
            handler dependency cone.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Dispatch an action to a single Node or a label-selected cohort.
      tags:
      - actions
