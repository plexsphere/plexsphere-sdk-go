  /v1/projects/{project_id}/resources/{resource_id}/bridge/relay:
    get:
      description: |
        Returns the relay configuration for the addressed bridge Resource.
        The relay is a per-Resource singleton keyed on `resource_id`. The
        handler runs the `observe` ReBAC check on the addressed Resource
        (`resource:<resource_id>`) BEFORE the persistence read.
      operationId: GetBridgeRelay
      parameters:
      - $ref: "#/components/parameters/ResourceProjectID"
      - $ref: "#/components/parameters/BridgeResourceID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeRelayResponse"
          description: Relay configuration found.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to observe the addressed Resource.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The addressed Resource was not found. Body is a `Problem`
            with `code: resource_not_found`. The bridge handler never
            resolves a parent Project, so `project_not_found` is not
            emitted on this surface.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch the bridge relay configuration.
      tags:
      - bridge
    put:
      description: |
        Replaces the relay configuration for the addressed bridge
        Resource. The relay is a per-Resource singleton; this PUT is a
        full-replace last-writer-wins write with no optimistic-concurrency
        precondition. An identical-config PUT short-circuits as an
        idempotent no-op. The handler runs the `manage` ReBAC check on the
        addressed Resource BEFORE any persistence write and refuses a
        non-bridge Resource with `409 resource_not_bridge`.
      operationId: ConfigureBridgeRelay
      parameters:
      - $ref: "#/components/parameters/ResourceProjectID"
      - $ref: "#/components/parameters/BridgeResourceID"
      requestBody:
        content:
          application/json:
            example:
              enabled: true
              listen_port: 51820
            schema:
              $ref: "#/components/schemas/BridgeRelayConfigureRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeRelayResponse"
          description: Relay configured.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/relay-port-out-of-range
                title: Relay Port Out Of Range
                status: 400
                detail: listen_port must be in the range 1..65535
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d2/bridge/relay
                code: relay_port_out_of_range
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Body rejected. Body is a `Problem` with `code` ∈
            { `relay_port_out_of_range`, `invalid_body` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the addressed Resource.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The addressed Resource was not found. Body is a `Problem`
            with `code: resource_not_found`. The bridge handler never
            resolves a parent Project, so `project_not_found` is not
            emitted on this surface.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/resource-not-bridge
                title: Resource Not Bridge
                status: 409
                detail: the addressed Resource is not of kind bridge
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d2/bridge/relay
                code: resource_not_bridge
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Body is a `Problem` with `code` ∈ { `resource_not_bridge`
            (the addressed Resource is not kind `bridge`),
            `bridge_port_conflict` (the relay `listen_port` is already
            bound by a sibling user-access provider or ingress rule within
            the bridge — refused by the cross-aggregate validator before
            persistence) }.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the bridge body ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Configure the bridge relay (last-writer-wins replace).
      tags:
      - bridge
