      parameters:
      - $ref: "#/components/parameters/ApprovalID"
      requestBody:
        content:
          application/json:
            example:
              reason: Production incident INC-4815 requires immediate rotation
            schema:
              $ref: "#/components/schemas/BreakGlassRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
          description: |
            Approval forced to approved via the emergency override. Body
