          Principal discriminator. DECISION: `kind` is REQUIRED
          because the underlying `group_memberships` table uses XOR
          columns (`principal_user_id` / `principal_service_identity_id`
          / `principal_group_id`) and the repo needs the discriminator
          to target the correct column — there is no
          `principal_id`-only index.
        explode: true
        in: query
        name: kind
        required: true
        schema:
          $ref: "#/components/schemas/DeleteAdminGroupMember_kind_parameter"
        style: form
      responses:
        "204":
          description: Membership deleted.
        "400":
