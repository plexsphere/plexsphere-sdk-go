        style: form
      - description: Inclusive lower bound on `occurred_at` (RFC 3339).
        explode: true
        in: query
        name: from
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Inclusive upper bound on `occurred_at` (RFC 3339).
        explode: true
        in: query
        name: to
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Filter by inbound request correlation id.
        explode: true
        in: query
        name: correlation_id
        required: false
        schema:
