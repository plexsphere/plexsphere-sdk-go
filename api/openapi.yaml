      - description: "SpiceDB object type to filter on (e.g. `domain`, `node`)."
        explode: true
        in: query
        name: object_type
        required: false
        schema:
          type: string
        style: form
      - description: Opaque object identifier within `object_type`.
        explode: true
        in: query
        name: object_id
        required: false
        schema:
          type: string
        style: form
      - description: |
          Filter by ReBAC decision reason.
        explode: true
        in: query
        name: reason
        required: false
        schema:
          $ref: "#/components/schemas/AuditReason"
        style: form
      - description: Inclusive lower bound on `occurred_at` (RFC 3339).
        explode: true
        in: query
        name: from
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Inclusive upper bound on `occurred_at` (RFC 3339).
        explode: true
        in: query
        name: to
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Filter by inbound request correlation id.
        explode: true
        in: query
        name: correlation_id
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryList"
          description: |
            Page of audit entries for the addressed Domain.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameter — typically a malformed cursor
            (`code: cursor_invalid`), a non-hex `subject`, or a `to`
            earlier than `from`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
