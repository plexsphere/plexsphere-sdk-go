      tags:
      - admin
  /v1/admin/tokens:
    get:
      description: |
        Returns API-token summaries for the principal addressed by
        `identity_ref` (e.g. `user:<uuid>` or `service:<uuid>`).
        Plaintext is never included. Gated on the `manage` relation
        against the owner's Domain so the same authz check governs
        both reads and mutations.
      operationId: GetAdminTokens
      parameters:
      - description: |
          Owner reference in the canonical `user:<uuid>` or
          `service:<uuid>` form mirroring `APITokenIssueRequest`.
        explode: true
        in: query
        name: identity_ref
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/APITokenSummary"
                type: array
          description: List of token summaries for the addressed owner.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: "Invalid `identity_ref` (missing, wrong shape, bad UUID)."
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read tokens in the addressed
            owner's Domain. Body is a `PermissionDenied` problem.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List API tokens for any owner (admin).
      tags:
      - admin
    post:
      description: |
        Admin-scope issuance of a psk-shaped API token bound to the
        supplied `identity_ref` — the caller does NOT need to own the
        target identity. Gated on the `manage` relation against the
        target principal's owning Domain; rejection surfaces as
        `PermissionDenied`. Mirrors `PostAuthTokens` but bypasses the
        self-only check; plaintext is returned exactly once.
      operationId: PostAdminTokens
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APITokenIssueRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokenIssueResponse"
          description: Token issued; plaintext is included exactly once.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: "Invalid body (bad env_prefix, missing identity_ref)."
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage tokens in the target
            principal's Domain. Body is a `PermissionDenied` RFC 9457
            problem carrying the ReBAC denial `reason`, traversed
            `relation_path`, and the `correlation_id` that pairs the
            response with the audit entry emitted by `internal/audit`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Issue an API token on behalf of any principal (admin).
      tags:
      - admin
  /v1/admin/tokens/{id}:
    delete:
      description: |
        Immediately revokes the token identified by `id`, regardless of
        ownership. Gated on the `manage` relation against the owning
        principal's Domain; rejection surfaces as `PermissionDenied`.
      operationId: DeleteAdminTokenByID
      parameters:
      - description: Token identifier (UUIDv7).
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Token revoked.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to revoke the token. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, traversed `relation_path`, and the
            `correlation_id`.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Token not found.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Revoke any API token (admin).
      tags:
      - admin
  /v1/admin/tokens/{id}/rotate:
    post:
      description: |
        Issues a replacement plaintext for the named token regardless
        of ownership and retires the previous plaintext with an RFC
        8594 `Sunset` header. Gated on the `manage` relation against
        the owning principal's Domain.
      operationId: PostAdminTokenRotate
      parameters:
      - description: Token identifier (UUIDv7).
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokenRotateResponse"
          description: Token rotated; plaintext is returned exactly once.
          headers:
            Sunset:
              description: RFC 8594 sunset timestamp for the retired plaintext.
              explode: false
              required: true
              schema:
                format: http-date
                type: string
              style: simple
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to rotate the token. Body is a
            `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Token not found.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Rotate any API token (admin).
      tags:
      - admin
  /v1/label-definitions:
    get:
      description: |
        Returns Label Definitions in deterministic order with cursor
        pagination. The scope discriminator names the scope the listing
        targets — platform, a specific Domain, or a specific Project
        .
      operationId: ListLabelDefinitions
      parameters:
      - description: |
          Scope selector. Accepts the literal `platform`, or
          `domain:<uuid>`, or `project:<uuid>`. DECISION: scope is a
          single string rather than a pair of query params because the
          three forms are mutually exclusive and the SpiceDB
          scope-object derivation treats them as a single coordinate
          .
        explode: true
        in: query
        name: scope
        required: true
        schema:
          pattern: "^(platform|domain:[0-9a-fA-F-]{36}|project:[0-9a-fA-F-]{36})$"
          type: string
        style: form
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page
          .
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelDefinitionListResponse"
          description: Page of Label Definitions.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Invalid query parameters.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read Definitions in this scope.
            Body is a `PermissionDenied` problem carrying the ReBAC
            denial `reason` (e.g. `insufficient_relation`), the
            traversed `relation_path`, and the `correlation_id`
            .
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List Label Definitions in a scope.
      tags:
      - labels
    post:
      description: |
        Creates a new Label Definition at Platform, Domain, or Project
        scope. The services layer performs the `manage` ReBAC check on
        the scope-object and emits exactly one audit entry on the
        outcome.
      operationId: CreateLabelDefinition
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabelDefinitionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelDefinition"
          description: Label Definition created.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Invalid body or scope mismatch.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to create Label Definitions in the
            requested scope. Body is a `PermissionDenied` problem
            carrying the ReBAC denial `reason`, `relation_path`, and
            `correlation_id`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Conflict — a Label Definition with the same
            `(scope_id, local_key)` already exists.
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Aggregate invariant violated (reserved key, invalid value
            schema, …).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Create a Label Definition at a specific scope.
      tags:
      - labels
  /v1/label-definitions/{id}:
    delete:
      description: |
        Deletes the Label Definition identified by `{id}` subject to its
        `on_delete` policy (block / cascade / orphan). A `block` policy
        with outstanding Assignments returns 409 `assignments-exist`
        .
      operationId: DeleteLabelDefinition
      parameters:
      - description: Label Definition identifier (UUIDv7).
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Label Definition deleted.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to delete the Definition. Body is
            a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Label Definition not found.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Block policy refused the delete because Assignments still
            reference the Definition.
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Aggregate invariant refused the delete (e.g. system-seed
            definition).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Delete a Label Definition.
      tags:
      - labels
    get:
      description: |
        Returns the Label Definition identified by `{id}`
        .

        The handler deliberately omits a ReBAC `Check` call. Visibility
        is enforced at the repo layer: Definitions the caller cannot
        see return `ErrDefinitionNotVisible` which surfaces as 404, so
        this endpoint never emits 403.
      operationId: GetLabelDefinition
      parameters:
      - description: Label Definition identifier (UUIDv7).
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
