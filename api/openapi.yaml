      example:
        updated_at: 2000-01-23T04:56:07.000+00:00
        project_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        cloud_credential_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        state: requested
        materialised: true
      properties:
        id:
          description: Credential Assignment identifier (UUIDv7).
          format: uuid
          type: string
        project_id:
          description: |
            Identifier of the owning Project — the residency pivot the
            ReBAC gate authorises against.
          format: uuid
          type: string
        cloud_credential_id:
          description: |
            Identifier of the Cloud Credential bound to the Project by
            this assignment.
          format: uuid
          type: string
        state:
          $ref: "#/components/schemas/CredentialAssignmentState"
        materialised:
          description: |
            Whether the assignment's binding is currently live. `true`
            only while the assignment is in the `approved` state;
            `false` for `requested`, `rejected`, and `revoked`.
          type: boolean
        created_at:
          description: Aggregate creation timestamp (UTC).
          format: date-time
          type: string
        updated_at:
          description: |
            Last-modified timestamp (UTC). Bumped by every lifecycle
            transition — approve, reject, revoke.
          format: date-time
          type: string
      required:
      - cloud_credential_id
      - created_at
      - id
      - materialised
      - project_id
      - state
      - updated_at
    CredentialAssignmentList:
      description: |
        Page of Credential Assignments returned by
