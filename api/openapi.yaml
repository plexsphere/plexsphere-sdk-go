          description: Page of discovered hooks.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or malformed
            cursor, an out-of-range `limit`, or a malformed filter.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the discovered-hook catalog
            (body is a `PermissionDenied` problem) OR the pagination
            cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay (body
