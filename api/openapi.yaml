        detected_at: 2000-01-23T04:56:07.000+00:00
        kind: binary
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        artifact_id: artifact_id
        acknowledged_by_subject: acknowledged_by_subject
        acknowledge_reason: acknowledge_reason
        acknowledged_at: 2000-01-23T04:56:07.000+00:00
        node_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        status: open
      properties:
        id:
          description: Integrity-violation identifier (UUIDv7).
          format: uuid
          type: string
        node_id:
          description: Node that reported the violation (UUIDv7).
          format: uuid
          type: string
        domain_id:
          description: |
            Owning Domain (UUIDv7) — the residency pivot the per-row
            visibility filter authorises against.
          format: uuid
          type: string
        kind:
          $ref: "#/components/schemas/IntegrityViolationKind"
        status:
          $ref: "#/components/schemas/IntegrityViolationStatus"
        artifact_id:
          description: |
            Stable identifier of the affected artifact (hook name,
            binary path label, or host-key file label).
          type: string
        detected_at:
          description: Timestamp the agent detected the violation (UTC).
          format: date-time
          type: string
        acknowledged_at:
          description: |
            Timestamp an operator acknowledged the violation (UTC).
            `null` or omitted while the violation is still `open`.
          format: date-time
          type: string
          nullable: true
        acknowledged_by_subject:
          description: |
            Subject string of the operator that acknowledged the
            violation. `null` or omitted while the violation is still
            `open`.
          type: string
          nullable: true
        acknowledge_reason:
          description: |
            Free-text rationale recorded with the acknowledgement.
            `null` or omitted while the violation is still `open`.
          type: string
          nullable: true
