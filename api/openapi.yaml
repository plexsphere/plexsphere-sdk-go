  /v1/domains/{domainId}/audit/entries/{seq}:
    get:
      description: |
        Returns the audit entry at `seq` on the addressed Domain's
        chain, together with the forensic proof needed to recompute
        and verify the entry's hash off-line. The proof carries `prev_hash`, `entry_hash`, and
        the canonical bytes the chain hashed — `sha256(prev_hash ||
        sha256(canonical_bytes))` is the computed `entry_hash`, and
        comparing it against the stored value pins divergence at the
        offending row.

        Cross-Domain reads are not allowed: a `seq` that exists on a
        DIFFERENT Domain's chain surfaces as 404 with the same shape
        as a truly-unknown `seq` so the endpoint cannot be used as a
        cross-Domain enumeration oracle. The
        404-after-403 ordering matches the ListAuditEntries gate.

        UNAUTHORISED READS COLLAPSE ONTO 404. Unlike ListAuditEntries
        and VerifyAuditChain, this surface deliberately maps a
        missing `auditor` relation to 404 (not 403) so the response
        is byte-indistinguishable from "row does not exist on this
        Domain". The seq id is per-Domain monotonic from 1 — a 403
        would otherwise leak chain length and let an attacker probe
        for the existence of arbitrary rows across Domains. The
        same probe-oracle defence applies on cross-tenant reads
        .
      operationId: GetAuditEntry
      parameters:
      - $ref: "#/components/parameters/AuditDomainID"
      - description: |
          Per-Domain monotonic sequence number assigned at append
          time. Sequences start at 1 (the genesis row) and never
          reset.
        explode: false
        in: path
        name: seq
        required: true
        schema:
          format: int64
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryProof"
          description: |
            Audit entry plus the canonical-bytes proof needed to
            recompute its hash.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid `seq` path parameter (e.g. `seq < 1`) or other
            client-side input fault.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            No entry at this `(domainId, seq)`. Returned for unknown
            sequences, for sequences that exist on a DIFFERENT
            Domain's chain (cross-Domain enumeration oracle defence),
            AND for callers who lack the `auditor` ReBAC relation on
            the addressed Domain — the unauthorised-read leg
            deliberately collapses onto 404 so the response is
            byte-indistinguishable from "row does not exist". See the
            operation description for the full probe-oracle rationale
            .
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or canonical-encode crash on the read path
            .
        "501":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Audit chain store / authorizer not yet provisioned in
            this build. Body is a Problem with
            `code: audit_not_provisioned`.
      summary: Read a single audit entry with its hash-chain proof.
      tags:
      - audit
  /v1/domains/{domainId}/audit/verify:
    post:
      description: |
        Recomputes `sha256(prev_hash || sha256(canonical_bytes))` for
        every row in the requested segment and reports the first
        divergence, if any. Omit both `from_seq`
        and `to_seq` to verify the full chain anchored at the genesis
        row (`seq=1`, `prev_hash` = 32 zero bytes); supply one or both
        to verify a bounded segment without paging the entire chain
        into memory.

        DIVERGENCE IS NOT AN ERROR. A tampered chain surfaces as
        `200 { ok: false, divergent_seq, expected_hash, observed_hash }`
        — the handler MUST NEVER return a 5xx for tampering. The 5xx
        channel is reserved for infrastructure faults (database
        unreachable, decode error on a malformed row); divergence is
        a finding the handler hands the operator alongside `200`. This
        distinction matters because divergence triggers an incident
        playbook while a 5xx triggers an oncall page.
      operationId: VerifyAuditChain
      parameters:
      - $ref: "#/components/parameters/AuditDomainID"
      requestBody:
        content:
          application/json:
            example:
              from_seq: 1
              to_seq: 1000
            schema:
              $ref: "#/components/schemas/AuditChainVerifyRequest"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditChainVerifyResult"
          description: |
            Verifier completed. Inspect `ok` to decide whether the
            chain is healthy. On `ok: false`, `divergent_seq`,
            `expected_hash`, and `observed_hash` pin the offending
            row.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid verify request (e.g. `to_seq` < `from_seq`,
            negative seq).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `auditor` ReBAC relation on the addressed
            Domain.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain id not found. Surfaced only after the authorisation
            gate has passed.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or canonical-encode crash on the verifier path.
            DIVERGENCE IS NOT A 5xx — see the operation description
            .
        "501":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Audit chain store / authorizer not yet provisioned in
            this build. Body is a Problem with
            `code: audit_not_provisioned`.
      summary: Verify the per-Domain hash chain or a segment of it.
      tags:
      - audit
  /v1/domains/{domainId}/audit/erase-identity:
    post:
      description: |
        Right-to-erasure entry point. Drops the `audit_subject_pii`
        row for the per-Domain pseudonym derived from `identity_id`,
        then appends an `audit.erase-identity` self-audit entry to
        the same chain so the erasure event is itself auditable
        . The hash chain remains verifiable: rows
        reference the pseudonym, and the pseudonym is preserved —
        only the plaintext mapping is removed.

        The endpoint is IDEMPOTENT on `subject_pseudonym`. A second
        call after a successful erasure is a no-op on the
        `audit_subject_pii` table (the row is already gone) and may
        emit a second self-audit entry; callers MAY safely retry
        after a partial network failure. The 202 status reflects the
        idempotent contract: a successful erasure has been recorded,
        even if the underlying PII row was already absent.
      operationId: EraseIdentityFromAudit
      parameters:
      - $ref: "#/components/parameters/AuditDomainID"
      requestBody:
        content:
          application/json:
            example:
              identity_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
            schema:
              $ref: "#/components/schemas/AuditEraseIdentityRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              example:
                subject_pseudonym: 9f2c7c0d2a3a4b8d1e6c8a7f5b3d2e1c0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d
                erased_at: 2026-04-28T10:00:00Z
              schema:
                $ref: "#/components/schemas/AuditEraseIdentityResponse"
          description: |
            Erasure recorded (idempotent on `subject_pseudonym`). The
            response carries the per-Domain pseudonym derived from
            `identity_id` so operators can correlate the self-audit
            entry without re-deriving it.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid erase request (malformed `identity_id`,
            empty body).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `auditor` ReBAC relation on the addressed
            Domain.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain id not found. Surfaced only after the authorisation
            gate has passed.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or pseudonym derivation failure on the response
            leg.
        "501":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Audit erase service / authorizer / pepper resolver not
            yet provisioned in this build. Body is a Problem with
            `code: audit_not_provisioned`.
      summary: Erase an identity's PII mapping from the per-Domain audit log.
      tags:
      - audit
  /v1/domains/{domainId}/mesh/topology:
    get:
      description: |
        Returns the read-side projection of the mesh fabric that backs
        the dashboard mesh-map view and the `plexctl mesh topology`
        CLI: every live Peer Node anchored to the Domain together with
        the directed edges between them. The handler:

          1. Authenticates the caller and rejects requests without a
             resolved Principal with 401.
          2. Checks the `domain-view` ReBAC relation on the addressed
             Domain BEFORE any existence check so the endpoint cannot
             be used as a Domain-id oracle.
          3. Resolves the per-Domain peer graph from the SSE peer-
             delta projection — `nodes` carries each anchored Node's
             mesh-IP and reachability, `edges` carries each pairwise
             relationship with its `mode` (`direct` or `relayed`), the
             handshake age, and the bridge Node currently serving as
             the relay fallback when one is assigned.

        The payload mirrors the SSE peer-graph events one-for-one so a
        renderer that consumes the live stream and a renderer that
        polls this pull converge on byte-identical state.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the mesh-topology projection and the ReBAC
        RelationChecker the handler depends on, every request to this
        endpoint returns 501 with
        `code: mesh_topology_not_provisioned` so log scrapers can
        alert on the deferred-wiring state.
      operationId: GetDomainMeshTopology
      parameters:
      - description: Domain identifier (UUIDv7) — the topology scope.
        explode: false
        in: path
        name: domainId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0
                generated_at: 2026-05-25T10:00:00Z
                nodes:
                - node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                  mesh_ip: 10.42.0.11
                  reachability: healthy
                - node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
                  mesh_ip: 10.42.0.12
                  reachability: healthy
                edges:
                - source_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1
                  target_node_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2
                  mode: direct
                  relay_node_id: null
                  status: healthy
              schema:
                $ref: "#/components/schemas/MeshTopology"
          description: |
            Mesh topology snapshot for the addressed Domain.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks the `domain-view` ReBAC relation on the
            addressed Domain. Surfaced before any existence check so
            the endpoint cannot be used as a Domain-id oracle.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Domain id does not match any Domain. Surfaced only after
            the authorisation gate has passed so the endpoint cannot
            be used as a Domain-id oracle. The Problem body's `code`
            field is `domain_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Internal server error. A projection-read failure or an
            authorization-check fault surfaces here.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/mesh-topology-not-provisioned
                title: Not Implemented
                status: 501
                detail: "GET /v1/domains/{domainId}/mesh/topology requires the production\
                  \ wiring of TopologyProjection and RelationChecker. One or more\
                  \ ports are not yet provisioned in this build."
                instance: /v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/mesh/topology
                code: mesh_topology_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The mesh-topology read surface is not yet provisioned in
            this build. The Problem body's `code` field is
            `mesh_topology_not_provisioned` so log scrapers can alert
            on the deferred-wiring state. Resolves once the topology
            projection and the ReBAC RelationChecker are wired into
            the v1 handler dependency cone.
      summary: Return the mesh topology for a Domain.
      tags:
      - mesh
  /v1/platform/audit/entries:
