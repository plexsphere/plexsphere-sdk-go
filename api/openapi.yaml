            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Evaluate a candidate Policy revision without persisting.
      tags:
      - policy
  /v1/projects/{project_id}/policies/{policy_id}/diff:
    get:
      description: |
        Returns the structural difference between the rule lists of
        the two named revisions after canonicalisation, so a
        reorder-only edit produces empty arrays. Both `from_revision`
        and `to_revision` MUST belong to the addressed Policy; an
        out-of-Policy identifier surfaces as `404
        revision_not_visible`. The handler gates on `policy#read`.
      operationId: DiffPolicyRevisions
      parameters:
      - $ref: "#/components/parameters/PolicyProjectID"
      - $ref: "#/components/parameters/PolicyID"
      - description: Identifier of the source revision.
        explode: true
        in: query
        name: from_revision
        required: true
        schema:
          format: uuid
          type: string
        style: form
      - description: Identifier of the target revision.
        explode: true
        in: query
        name: to_revision
        required: true
        schema:
          format: uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyDiff"
          description: Diff between the two revisions.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters (missing or malformed
            `from_revision` / `to_revision`).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller lacks `policy#read`. Body is a `PermissionDenied`
            problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Policy not visible or one of the revisions does not belong
            to this Policy.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Compute the diff between two Policy revisions.
      tags:
      - policy
  /v1/projects/{project_id}/capabilities:
    get:
      description: |
        Returns a cursor-paginated page of per-Node capability rows in
        the named Project. Each row pairs a Node's reported agent binary
        with a checksum status — `match` when the reported checksum
        equals a known-good artifact, `drift` when it differs, and
        `unknown` when no known-good artifact is on record. The handler
        runs the platform read gate before the persistence read, then
        layers a per-row visibility filter on the Domain owning each
        Node so `items` is the subset the caller is authorised to see.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym; a cross-caller replay surfaces
        as `403 cursor_binding_mismatch`, and a tampered or malformed
        cursor surfaces as `400 invalid_cursor`. `limit` is clamped to
        `[1, 200]` rather than rejected.
      operationId: ListCapabilities
      parameters:
      - description: |
          Owning Project (UUIDv7). The capability inventory is scoped
          to Nodes in this Project.
        explode: false
        in: path
        name: project_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: |
          Optional Node filter. When present, only the capability row
          for the named Node is returned.
        explode: true
        in: query
        name: node_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: |
          Optional checksum-status filter. When present, only rows in
          the named status are returned.
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/CapabilityStatus"
        style: form
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed so a tampered
          cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
