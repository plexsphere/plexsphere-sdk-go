            URL-safe identifier unique within `domain_id`
            .
          type: string
        display_name:
          description: Human-friendly Group name.
          type: string
        source:
          $ref: "#/components/schemas/GroupResponse_source"
        idp_binding_id:
          description: |
            IdP binding the Group is reconciled from. Present only
            when `source=idp`.
          format: uuid
          type: string
        idp_claim_value:
          description: |
            Verbatim IdP claim value. Present only when `source=idp`
