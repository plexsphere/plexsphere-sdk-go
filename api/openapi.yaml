  /v1/credentials/{id}/revoke:
    post:
      description: |
        Revokes the credential identified by `{id}`. The handler reads
        the row to resolve the parent Project, runs the `manage` ReBAC
        check on that Project, then delegates to the Credential Broker
        Custodian which stamps `revoked_at` and appends a
        `CredentialRevoked` outbox event in a single transaction.

        Revocation is idempotent: revoking an already-revoked
        credential returns `200` with the unchanged metadata rather
        than an error. The response carries the metadata-only
        projection showing the populated `revoked_at`.
      operationId: RevokeCredential
      parameters:
      - $ref: "#/components/parameters/CredentialID"
      requestBody:
        content:
          application/json:
            example:
              reason: rotated out of band by the platform on-call
            schema:
              $ref: "#/components/schemas/CredentialRevokeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialResponse"
          description: |
            Credential revoked (or already revoked — the call is
            idempotent). Body is the metadata-only projection with
            `revoked_at` populated.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_credential_id`, `invalid_body`,
            `invalid_revoke_reason` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the parent Project.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Credential not found. Body is a `Problem` with
            `code: credential_not_found`.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB credentials ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Revoke a credential.
      tags:
      - provisioning-credentials
  /v1/credentials/{id}/rotate:
    post:
      description: |
        Rotates the credential identified by `{id}`. The handler reads
        the row to resolve the parent Project, runs the `manage` ReBAC
        check on that Project, then delegates to the Credential Broker
        Custodian which writes the new secret material into OpenBao
        KV-v2 under a compare-and-swap guard, bumps the broker-row
        version, and appends a `CredentialRotated` outbox event in a
        single transaction.

        The caller supplies `expected_version` — the broker-row version
        it observed via a prior read. A mismatch surfaces as
        `409 credential_cas_conflict` so two concurrent rotations fail
        closed. Rotating a revoked credential is rejected with
        `409 credential_revoked`.

        Secret material is accepted INBOUND in the request body but is
        NEVER returned: the response is the same metadata-only
        projection every other read surface returns, with the bumped
        `version` and refreshed `expires_at`.
      operationId: RotateCredential
      parameters:
      - $ref: "#/components/parameters/CredentialID"
      requestBody:
        content:
          application/json:
            example:
              expected_version: 1
              material:
                payload: c3VwZXItc2VjcmV0LXRva2Vu
                ttl_seconds: 7776000
                key_values:
                  username: svc-acme
            schema:
              $ref: "#/components/schemas/CredentialRotateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialResponse"
          description: |
            Credential rotated. Body is the metadata-only projection
            with the bumped `version` and refreshed `expires_at`.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_credential_id`, `invalid_body`,
            `invalid_rotate_material` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the parent Project.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Credential not found. Body is a `Problem` with
            `code: credential_not_found`.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Optimistic-concurrency or lifecycle conflict. Body is a
            `Problem` with `code` ∈ { `credential_cas_conflict`,
            `credential_revoked` }.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB credentials ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Rotate a credential's underlying secret.
      tags:
      - provisioning-credentials
  /v1/blueprints:
    get:
      description: |
        Returns a slug-ordered page of Blueprint Catalog entries the
        caller is authorised to see. Per-row visibility is layered on
        top of the page: rows whose `blueprint#user` ReBAC relation the
        caller does not hold are filtered out, so the response items
        are a subset of the persistence-level page.

        The projection is catalogue metadata only — it carries each
        Blueprint's identity, slug, display name, lifecycle status, and
        timestamps, with an empty `versions` array. The per-version
        manifests are never returned by the list surface; fetch a
        single Blueprint to obtain its versions and typed parameter
        schemas.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListBlueprints
      parameters:
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the read service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
                  slug: managed-postgres
                  display_name: Managed PostgreSQL
                  description: A managed PostgreSQL database instance.
                  status: active
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T10:00:00Z
                  versions: []
                next_cursor: eyJzbHVnIjoibWFuYWdlZC1wb3N0Z3JlcyJ9.signed
              schema:
                $ref: "#/components/schemas/BlueprintList"
          description: Page of Blueprints.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor or an out-of-range `limit`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to list the Blueprint Catalog
            (body is a `PermissionDenied` problem) OR the pagination
            cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay (body
            is a `Problem` with `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List the Blueprint Catalog.
      tags:
      - blueprint
  /v1/blueprints/{id}:
    get:
      description: |
        Returns the Blueprint identified by `{id}` together with its
        ordered `versions` array. Each version carries a typed
        `parameter_schema` — the closed-set parameter declarations an
        operator fills in when provisioning a Resource from the
        version.

        The handler runs the `blueprint#user` ReBAC check BEFORE the
        persistence read; an unauthorised caller therefore receives
        `403` without the existence side-channel a "load-then-check"
        flow would leak. A missing Blueprint surfaces as
        `404 blueprint_not_found`.
      operationId: GetBlueprint
      parameters:
      - $ref: "#/components/parameters/BlueprintID"
      responses:
        "200":
          content:
            application/json:
              example:
                id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
                slug: managed-postgres
                display_name: Managed PostgreSQL
                description: A managed PostgreSQL database instance.
                status: active
                created_at: 2026-05-02T10:00:00Z
                updated_at: 2026-05-02T10:00:00Z
                versions:
                - version: 1.0.0
                  provider_kinds:
                  - aws
                  injection_strategy: helm-values
                  created_at: 2026-05-02T10:00:00Z
                  parameter_schema:
                  - name: storage_gb
                    type: integer
                    required: true
                  - name: high_availability
                    type: boolean
                    required: false
              schema:
                $ref: "#/components/schemas/BlueprintResponse"
          description: Blueprint found.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the addressed Blueprint.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/blueprint-not-found
                title: Blueprint Not Found
                status: 404
                detail: no Blueprint with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
                instance: /v1/blueprints/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
                code: blueprint_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Blueprint not found. Body is a `Problem` with
            `code: blueprint_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch a Blueprint by identifier.
      tags:
      - blueprint
  /v1/projects/{project_id}/resources:
    get:
      description: |
        Returns a creation-ordered page of Resources owned by the
        Project identified by `{project_id}`. The handler runs a
        top-level `observe` ReBAC check on the parent Project BEFORE
        the persistence read, then layers a per-row `observe` filter
        on top so the response items are the subset of the
        persistence-level page the caller is authorised to see.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListProjectResources
      parameters:
      - $ref: "#/components/parameters/ResourceProjectID"
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the read service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceList"
          description: Page of Resources.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a malformed Project
            id, a tampered or malformed cursor, or an out-of-range
            `limit`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to observe the parent Project
            (body is a `PermissionDenied` problem) OR the pagination
            cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay
            (body is a `Problem` with `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List Resources inside a Project.
      tags:
      - resource
    post:
      description: |
        Creates a Tenancy Resource inside the addressed Project. The
        `origin` field discriminates the two creation flows:

          * `origin=adopted` — the Resource entered the platform
            through an out-of-band channel (bare-metal systemd unit,
            Kubernetes ExternalSecrets pattern). The handler persists
            the Resource with `Origin=Adopted` and returns `201` with
            the hydrated `ResourceResponse`.
          * `origin=provisioned` — the Resource's substrate is owned
            by the Provisioning Broker. The handler persists the
            Resource with `Origin=Provisioned`, calls
            `broker.Service.Provision` to mint a Pending
            `ProvisionedResource`, and returns `202` with a pollable
            `Location` header pointing at `/v1/resources/{id}`. The
            provisioned flow additionally requires the
            `cloud_credential#uses` ReBAC relation on the named
            Cloud Credential.

        Every call runs the Project `deploy` ReBAC check BEFORE any
        persistence write. A body missing `origin` or carrying a value
        outside `{adopted, provisioned}` is rejected with
        `400 invalid_resource_origin`.
      operationId: CreateResource
      parameters:
      - $ref: "#/components/parameters/ResourceProjectID"
      requestBody:
        content:
          application/json:
            example:
              origin: adopted
              kind: kubernetes-node
              external_ref: node-ref-01
            schema:
              $ref: "#/components/schemas/ResourceCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
          description: |
            Adopted Resource created. The response body is the
            hydrated `ResourceResponse`; the `provisioning` field is
            absent because adopted Resources have no broker-owned
            ProvisionedResource.
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
          description: |
            Provisioned Resource accepted. The broker has minted a
            Pending `ProvisionedResource` and reconcile will drive it
            toward `Ready`. The response body carries the hydrated
            `ResourceResponse` with `provisioning.phase = Pending`;
            the `Location` header carries the canonical URL of the
            new Resource.
          headers:
            Location:
              description: |
                Canonical URL of the freshly created Resource —
                `/v1/resources/{id}` — pollable by the caller to
                observe broker provisioning progress.
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/invalid-resource-origin
                title: Invalid Resource Origin
                status: 400
                detail: "origin must be one of: adopted, provisioned"
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources
                code: invalid_resource_origin
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Body rejected. Body is a `Problem` with `code` ∈
            { `invalid_resource_origin`, `invalid_project_id`,
            `invalid_body` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to create a Resource in this
            Project (missing Project `deploy`) or to use the named
            Cloud Credential (missing `cloud_credential#uses` for the
            provisioned flow). Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Parent Project not found. Body is a `Problem` with
            `code: project_not_found`.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB tenancy ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Create a Resource (adopted or broker-provisioned).
      tags:
      - resource
  /v1/resources/{id}:
    delete:
      description: |
        Deletes the Resource identified by `{id}`. The handler
        branches on the Resource's `origin`:

          * `Origin=Provisioned` — triggers `broker.Service.Deprovision`,
            which advances the broker aggregate into the teardown
            phase and emits the `ProvisionedResourceDeleting` outbox
            event. Returns `202`; the caller polls
            `GET /v1/resources/{id}` to observe phase progression.
          * `Origin=Adopted` — removes the tenancy Resource row
            directly. Returns `204`.

        Every call runs the Project `deploy` ReBAC check BEFORE any
        persistence write. A missing Resource surfaces as
        `404 resource_not_found`.
      operationId: DeleteResource
      parameters:
      - $ref: "#/components/parameters/ResourceID"
      responses:
        "202":
          description: |
            Provisioned Resource deletion accepted. The broker has
            stamped the teardown phase and the reconcile loop will
            drive the aggregate toward `Deleted`. Poll
            `GET /v1/resources/{id}` for phase progression.
        "204":
          description: Adopted Resource deleted.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed Resource id. Body is a `Problem` with
            `code: invalid_resource_id`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to delete the addressed Resource.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Resource not found. Body is a `Problem` with
            `code: resource_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Delete a Resource (graceful for provisioned).
      tags:
      - resource
    get:
      description: |
        Returns the Resource identified by `{id}`. For
        `Origin=Provisioned` Resources the response carries the
        `provisioning` sub-object reporting the broker phase the
        reconcile loop most recently observed. For `Origin=Adopted`
        Resources the `provisioning` field is absent.

        The handler runs the `observe` ReBAC check on the parent
        Project BEFORE the persistence read; an unauthorised caller
        therefore receives `403` without the existence side-channel a
        "load-then-check" flow would leak. A missing Resource surfaces
        as `404 resource_not_found`.
      operationId: GetResource
      parameters:
      - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          content:
            application/json:
              example:
                id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f1
                project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a001
                kind: managed-postgres
                external_ref: null
                origin: provisioned
                created_at: 2026-05-02T10:00:00Z
                updated_at: 2026-05-02T10:00:00Z
                provisioning:
                  phase: Provisioning
                  provisioned_resource_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f2
              schema:
                $ref: "#/components/schemas/ResourceResponse"
          description: Resource found.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the addressed Resource.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/resource-not-found
                title: Resource Not Found
                status: 404
                detail: no Resource with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f1
                instance: /v1/resources/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f1
                code: resource_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Resource not found. Body is a `Problem` with
            `code: resource_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch a Resource by identifier.
      tags:
      - resource
  /v1/management-clusters:
    get:
      description: |
        Returns the slug-ordered fleet of registered management
        clusters. The handler runs an `observe` ReBAC check on the
        `managementfleet:fleet` singleton before the read; an
        unauthorised caller never observes the fleet's existence or
        size. The projection is metadata-only — it carries the cluster
        identity, slug, region, and last-observed status, never the
        kubeconfig Secret reference's contents.
      operationId: ListManagementClusters
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                  name: Production EU
                  slug: prod-eu
                  region: eu-west
                  status: active
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T10:00:00Z
              schema:
                $ref: "#/components/schemas/ManagementClusterList"
          description: The registered management fleet.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to observe the management fleet.
            Body is a `PermissionDenied` problem.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List the registered management clusters.
      tags:
      - management-fleet
    post:
      description: |
        Registers a new management cluster. The handler runs a `manage`
        ReBAC check on the `managementfleet:fleet` singleton, then
        delegates to the Management Fleet service which mints a UUIDv7
        cluster id, constructs the `ManagementCluster` aggregate
        through its validating constructor, and persists it.

        Registration is the ONLY cluster-creating mutation on the
        surface; assignment creation stays reconciliation/broker-only.
        A duplicate `slug` surfaces as `409 management_cluster_conflict`
        — the slug is the human-facing shard key and is unique across
        the fleet.
      operationId: RegisterManagementCluster
      requestBody:
        content:
          application/json:
            example:
              name: Production EU
              slug: prod-eu
              region: eu-west
              kubeconfig_secret_ref: plexsphere-mgmt-prod-eu-kubeconfig
              status: active
            schema:
              $ref: "#/components/schemas/RegisterManagementClusterRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagementClusterResponse"
          description: Management cluster registered.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed body. Body is a `Problem` with `code` ∈
            { `invalid_body`, `invalid_management_cluster` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the management fleet.
            Body is a `PermissionDenied` problem.
        "409":
          content:
