  /v1/nodes/{id}/metrics:
    post:
      description: |
        Accepts a gzip-compressed JSON array of `MetricSample` records
        pushed by plexd and hands the batch to the per-signal ingest
        buffer — a JetStream subject keyed by the originating Node's
        Domain — from which the platform fans out to Grafana Mimir via
        Prometheus remote-write. Every record is tagged server-side with
        the Domain and Project of the originating Node so dashboards and
        alerts scope through the platform label model; the wire body never
        carries an Identity subject or email (see the de-personalisation
        note below).

        The handler applies the following gates in order; each maps to a
        single stable `code` on an RFC 9457 Problem body so generated
        clients can switch on `code` exhaustively:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext in the `Authorization: Bearer` header, refusing a
             missing, malformed, or revoked credential with 401.
          2. Asserts the NSK belongs to the Node addressed by the path
             `id`, refusing cross-Node use with 403 `node_id_mismatch` so
             a leaked NSK cannot be replayed against a sibling Node.
          3. Refuses a `Content-Encoding` other than `gzip` or `identity`
             with 415 `ingest_encoding_unsupported`.
          4. Requires the `X-Plexsphere-Sent-At` header to be present and
             an RFC 3339 timestamp; a missing or unparseable value is
             refused with 400 `ingest_sent_at_invalid`. The header drives
             the ingest-lag metric.
          5. Caps the compressed wire body; a body over the cap is refused
             with 413 `ingest_body_too_large` before the gzip reader runs.
          6. Applies the per-Node then per-Domain byte-weighted quota; an
             exhausted per-Node bucket surfaces as 429
             `per_node_rate_limited` and an exhausted per-Domain bucket as
             429 `capacity_exceeded`, both carrying a `Retry-After` header.
          7. Inflates the gzip stream under a decompression cap (a stream
             that fails to inflate is 400 `ingest_encoding_invalid`; an
             inflated batch over the cap is 413 `ingest_body_too_large`)
             and structurally validates each record (a malformed record or
             a `group` outside the closed set is 400
             `ingest_batch_malformed`; more than the per-batch record cap
             is 413 `ingest_batch_too_many_records`).
          8. Publishes the batch to the ingest buffer; a buffer the stream
             backend cannot accept is 503 `ingest_buffer_unavailable` with
             a `Retry-After` header.

        On success the handler records the ingest-lag, byte, and record
        metrics and returns 202 with an `IngestReceipt` carrying the
        server acceptance timestamp and the accepted record count.

        DE-PERSONALISATION: metric labels carry Domain, Project, Node, and
        (where relevant) workload identifier — never an Identity subject or
        email. PII that a record inadvertently carries is the customer's
        ingest-side responsibility.

        DEFERRED-WIRING POSTURE: when no observability ingest backend is
        configured (empty `PLEXSPHERE_OBS_NATS_URL`) the production
        composition root leaves this surface disabled and every request
        returns 501 with `code: observability_ingest_not_provisioned` so
        log scrapers can alert on the deferred-wiring state.
      operationId: PostNodeMetrics
      parameters:
      - description: Node identifier (UUIDv7) — the ingest scope.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: |
          `Bearer <NSK plaintext>` — the per-Node Node Secret Key issued
          at registration time. The NSK is bound to the Node addressed by
          the path `id`; a credential belonging to a different Node
          surfaces as 403 `node_id_mismatch`.
        explode: false
        in: header
        name: Authorization
        required: true
        schema:
          type: string
        style: simple
      - description: |
          RFC 3339 timestamp at which plexd dispatched the batch. The
          handler requires it and refuses a missing or unparseable value
          with 400 `ingest_sent_at_invalid`; it drives the ingest-lag
          metric the platform records on acceptance.
        explode: false
        in: header
        name: X-Plexsphere-Sent-At
        required: false
        schema:
          format: date-time
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
            - group: node_resources
              name: cpu_seconds_total
              value: 12345.6
              labels:
                cpu: "0"
                mode: user
              timestamp: 2026-04-27T10:15:30Z
            schema:
              items:
                $ref: "#/components/schemas/MetricSample"
              type: array
        required: true
      responses:
        "202":
          content:
            application/json:
              example:
                accepted_at: 2026-04-27T10:15:30.123Z
                records: 42
              schema:
                $ref: "#/components/schemas/IngestReceipt"
          description: |
            Batch accepted and handed to the ingest buffer. The
            `IngestReceipt` body carries the server acceptance timestamp
            and the accepted record count.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/ingest-batch-malformed
                title: Bad Request
                status: 400
                detail: a metric sample is missing a required field or carries a group
                  outside the closed set.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/metrics
                code: ingest_batch_malformed
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The request failed a structural gate. The Problem body's `code`
            field disambiguates the cause:

              - `ingest_sent_at_invalid` — the `X-Plexsphere-Sent-At`
                header is missing or not an RFC 3339 timestamp.
              - `ingest_encoding_invalid` — the gzip stream failed to
                inflate.
              - `ingest_batch_malformed` — the decompressed body is not a
                JSON array, is empty, or a record is missing a required
                field or carries a `group` outside the closed set.
        "401":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/unauthorized
                title: Unauthorized
                status: 401
                detail: "NSK presented in Authorization: Bearer is missing or has\
                  \ been revoked."
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/metrics
                code: unauthorized
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code` field
            is `unauthorized` for a missing or malformed credential and
            `nsk_revoked` for a revoked one, so log scrapers can
            distinguish credential revocation from a generic auth failure.
        "403":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/node-id-mismatch
                title: Forbidden
                status: 403
                detail: NSK is bound to a different Node than the path id.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/metrics
                code: node_id_mismatch
                reason: insufficient_relation
                relation_path: []
                correlation_id: 01HXYZABCDEFGHJKMNPQRSTVWX
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            The NSK authenticates successfully but belongs to a different
            Node than the path `id`. The PermissionDenied body's `code`
            field is `node_id_mismatch` so a leaked NSK cannot be replayed
            against a sibling Node.
        "413":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/ingest-body-too-large
                title: Payload Too Large
                status: 413
                detail: request body exceeds the observability ingest wire cap.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/metrics
                code: ingest_body_too_large
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The batch exceeded a size cap. The Problem body's `code` field
            is `ingest_body_too_large` when the compressed wire body or the
            inflated batch exceeds its byte cap, or
            `ingest_batch_too_many_records` when the batch carries more
            records than the per-batch cap.
        "415":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/ingest-encoding-unsupported
                title: Unsupported Media Type
                status: 415
                detail: Content-Encoding must be gzip or identity.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/metrics
                code: ingest_encoding_unsupported
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The `Content-Encoding` header names an encoding other than
