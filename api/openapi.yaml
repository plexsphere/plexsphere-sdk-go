      requestBody:
        content:
          application/x-ndjson:
            schema:
              items:
                $ref: "#/components/schemas/LogLine"
              type: array
        required: true
      responses:
        "202":
          content:
            application/json:
              example:
                accepted_at: 2026-04-27T10:15:30.123Z
                records: 42
              schema:
                $ref: "#/components/schemas/IngestReceipt"
          description: |
            Batch accepted and handed to the ingest buffer. The
            `IngestReceipt` body carries the server acceptance timestamp
            and the accepted record count.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/ingest-batch-malformed
                title: Bad Request
                status: 400
                detail: a log line is missing a required field or carries a severity
                  outside the closed set.
                instance: /v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/logs
                code: ingest_batch_malformed
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The request failed a structural gate. The Problem body's `code`
            field disambiguates the cause:

              - `ingest_sent_at_invalid` — the `X-Plexsphere-Sent-At`
