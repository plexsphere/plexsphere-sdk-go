        every read surface returns the same wire bytes for the same
        Cloud so clients only need one binding.
      example:
        endpoint:
          key: ""
        region_defaults:
          key: ""
        updated_at: 2000-01-23T04:56:07.000+00:00
        provider: aws
        created_at: 2000-01-23T04:56:07.000+00:00
        external_id: external_id
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
