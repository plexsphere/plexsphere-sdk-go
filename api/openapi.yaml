                status: 400
                detail: Cloud endpoint payload rejected by aws validator
                instance: /v1/clouds
                code: invalid_cloud_endpoint
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Aggregate or validator rejected the body — empty
            `display_name`, malformed `slug`, malformed `endpoint` or
            `region_defaults`, unknown `provider`, or per-provider
            field-level validator rejection. Body is a `Problem` with
            `code` ∈ { `invalid_cloud`, `unknown_provider`,
            `invalid_cloud_endpoint`,
            `invalid_cloud_region_defaults`, `invalid_body` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to create Clouds. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, `relation_path`, and `correlation_id`.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/cloud-slug-conflict
                title: Cloud Slug Conflict
                status: 409
                detail: slug acme-aws-prod is already taken
                instance: /v1/clouds
                code: cloud_slug_conflict
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Conflict — the proposed Cloud collides with a persisted
            row. Body is a `Problem` with `code` ∈
            { `cloud_slug_conflict`, `cloud_external_id_conflict` }.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB Cloud Inventory ceiling
            enforced by the handler.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Create a Cloud Inventory entry.
      tags:
      - cloud
  /v1/clouds/{id}:
    delete:
      description: |
        Deletes the Cloud identified by `{id}`. The empty-aggregate
        guard runs inside the same transaction as the row delete; at
        least one persisted `CloudCredential` forces
        `409 cloud_not_empty` with the `CloudChildCounts` payload in
        the Problem detail so the operator knows how many credentials
        are still attached. A concurrent INSERT racing the guard is
        caught by defense-in-depth — the foreign-key violation
        surfaces as the same `409` so the caller never observes a
        half-deleted Cloud.
      operationId: DeleteCloud
      parameters:
      - $ref: "#/components/parameters/CloudID"
      responses:
        "204":
          description: Cloud deleted.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to delete the addressed Cloud.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Cloud not found. Body is a `Problem` with
            `code: cloud_not_found`.
        "409":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/cloud-not-empty
                title: Cloud Not Empty
                status: 409
                detail: "Cloud still owns: cloud_credentials=2"
                instance: /v1/clouds/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                code: cloud_not_empty
                cloud_child_counts:
                  cloud_credentials: 2
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Cloud still owns at least one child aggregate. Body is a
            `Problem` with `code: cloud_not_empty` and the optional
            `cloud_child_counts` extension carrying the structured
            `CloudChildCounts` so the operator knows how many
            credentials are still attached.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Delete a Cloud.
      tags:
      - cloud
    get:
      description: |
        Returns the Cloud identified by `{id}`. The handler runs the
        `read` ReBAC check BEFORE the persistence read; an unauthorised
        caller therefore receives `403` without the existence side-
        channel a "load-then-check" flow would leak. A missing
        aggregate surfaces as `404 cloud_not_found`.
      operationId: GetCloud
      parameters:
      - $ref: "#/components/parameters/CloudID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudResponse"
          description: Cloud found.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to read the addressed Cloud.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/cloud-not-found
                title: Cloud Not Found
                status: 404
                detail: no Cloud with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                instance: /v1/clouds/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                code: cloud_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Cloud not found. Body is a `Problem` with
            `code: cloud_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch a Cloud by identifier.
      tags:
      - cloud
    patch:
      description: |
        Patches the Cloud identified by `{id}`. The body MUST set at
        least one of `display_name`, `endpoint`, or `region_defaults`
        — an empty body surfaces as `400 empty_patch`.

        DECISION: BOTH `slug` and `provider` are intentionally NOT
        patchable fields. The slug is the URL handle exported into
        cached dashboard links and outbox projections; the provider is
        the validator-routing key for the per-provider validator
        family — changing either would silently break references or
        invalidate every previously-stored endpoint blob. The handler
        rejects any body that carries a `slug` key (even with the same
        value) at decode time with `400 slug_immutable`, and any body
        that carries a `provider` key with `400 provider_immutable`.
        See the `cloud` tag description for the full rationale.

        Mutating `endpoint` or `region_defaults` re-runs the per-
        provider validator on the merged next-state so a stale
        `region_defaults` cannot silently invalidate the merged record;
        field-level validator rejections surface as
        `400 invalid_cloud_endpoint` or
        `400 invalid_cloud_region_defaults`.
      operationId: PatchCloud
      parameters:
      - $ref: "#/components/parameters/CloudID"
      requestBody:
        content:
          application/json:
            example:
              display_name: Acme AWS Production — renamed
              region_defaults:
                vpc_cidr: 10.43.0.0/16
            schema:
              $ref: "#/components/schemas/CloudPatchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudResponse"
          description: Cloud patched.
        "400":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/slug-immutable
                title: Slug Immutable
                status: 400
                detail: Cloud.Slug is immutable; remove the slug field from the patch
                  body
                instance: /v1/clouds/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                code: slug_immutable
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid body. Body is a `Problem` with `code` ∈
            { `invalid_cloud`, `invalid_cloud_endpoint`,
            `invalid_cloud_region_defaults`, `slug_immutable`,
            `provider_immutable`, `empty_patch`, `invalid_body` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the addressed Cloud.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Cloud not found. Body is a `Problem` with
            `code: cloud_not_found`.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB Cloud Inventory ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Patch mutable fields on a Cloud.
      tags:
      - cloud
  /v1/clouds/{id}/cloud-credentials:
    get:
      description: |
        Returns a creation-ordered page of Cloud Credential lifecycle
        metadata for the Cloud identified by `{id}`. The handler runs a
        top-level `observe` ReBAC check on the parent Cloud BEFORE the
        persistence read, then layers a per-row `observe` filter on top
        so the response items are the subset of the persistence-level
        page the caller is authorised to see.

        The projection is metadata-only: it carries the credential
        identity, version, lifecycle timestamps, and a derived status.
        It NEVER exposes the KV mount, KV path, KV version, or any
        secret material — the storage location is deliberately omitted
        as a storage-internal detail.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListCloudCredentials
      parameters:
      - $ref: "#/components/parameters/CloudID"
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the read service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
                  cloud_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                  display_name: Acme AWS provisioner secret
                  version: 1
                  status: active
                  expires_at: 2026-08-02T10:00:00Z
                  revoked_at: null
                  expired_at: null
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T10:00:00Z
                next_cursor: eyJjIjoiMDE5MGE4YjgifQ.signed
              schema:
                $ref: "#/components/schemas/CloudCredentialList"
          description: Page of Cloud Credentials.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor, an out-of-range `limit`, or a malformed
            Cloud id.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to observe the parent Cloud (body
            is a `PermissionDenied` problem) OR the pagination cursor
            was minted by a different caller and the per-(caller,
            pepper) HMAC binding rejected the replay (body is a
            `Problem` with `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List Cloud Credentials owned by a Cloud.
      tags:
      - cloud
  /v1/cloud-credentials/{id}:
    get:
      description: |
        Returns the lifecycle metadata for the Cloud Credential
        identified by `{id}`. The credential id does not encode its
        owning Cloud, so the handler must read the row to learn which
        Cloud to authorise against; the ReBAC `observe` check runs on
        the resolved parent Cloud and a denial returns `403` via the
        audit-first permission-denied path. A missing row surfaces as
        `404 cloud_credential_not_found`.

        The projection is metadata-only and NEVER exposes the KV mount,
        KV path, KV version, or any secret material.
      operationId: GetCloudCredential
      parameters:
      - $ref: "#/components/parameters/CloudCredentialID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudCredentialResponse"
          description: Cloud Credential found.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed Cloud Credential id. Body is a `Problem` with
            `code: invalid_cloud_credential_id`.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to observe the parent Cloud.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/cloud-credential-not-found
                title: Cloud Credential Not Found
                status: 404
                detail: no Cloud Credential with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
                instance: /v1/cloud-credentials/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
                code: cloud_credential_not_found
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Cloud Credential not found. Body is a `Problem` with
            `code: cloud_credential_not_found`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Fetch a Cloud Credential's lifecycle metadata.
      tags:
      - cloud
  /v1/cloud-credentials/{id}/revoke:
    post:
      description: |
        Revokes the Cloud Credential identified by `{id}`. The handler
        reads the row to resolve the parent Cloud, runs the `manage`
        ReBAC check on that Cloud, then delegates to the Cloud
        Credentials Custodian which stamps `revoked_at`, soft-deletes
        the underlying secret, and appends a `CloudCredentialRevoked`
        outbox event in a single transaction.

        Revocation is idempotent: revoking an already-revoked
        credential returns `200` with the unchanged metadata rather
        than an error. The response carries the metadata-only
        projection showing the populated `revoked_at`.
      operationId: RevokeCloudCredential
      parameters:
      - $ref: "#/components/parameters/CloudCredentialID"
      requestBody:
        content:
          application/json:
            example:
              reason: rotated out of band by the platform on-call
            schema:
              $ref: "#/components/schemas/CloudCredentialRevokeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudCredentialResponse"
          description: |
            Cloud Credential revoked (or already revoked — the call is
            idempotent). Body is the metadata-only projection with
            `revoked_at` populated.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_cloud_credential_id`, `invalid_body`,
            `invalid_revoke_reason` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the parent Cloud.
            Body is a `PermissionDenied` problem.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Cloud Credential not found. Body is a `Problem` with
            `code: cloud_credential_not_found`.
        "413":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Request body exceeded the 8 KiB Cloud Credentials ceiling.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Revoke a Cloud Credential.
      tags:
      - cloud
  /v1/projects/{id}/credential-assignments:
    get:
      description: |
        Returns a creation-ordered page of Credential Assignment
        lifecycle metadata for the Project identified by `{id}`. The
        handler runs a top-level `observe` ReBAC check on the parent
        Project BEFORE the persistence read, then layers a per-row
        `observe` filter on top so the response items are the subset
        of the persistence-level page the caller is authorised to see.

        The projection carries the assignment identity, the owning
        Project, the bound Cloud Credential, the lifecycle state, a
        derived `materialised` flag, and the lifecycle timestamps.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      operationId: ListCredentialAssignments
      parameters:
      - $ref: "#/components/parameters/ProjectID"
      - description: |
          Opaque continuation token returned by a previous call's
          `next_cursor`. The encoding is HMAC-signed by the server
          so a tampered cursor surfaces as `400`.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: |
          Maximum number of items to return in a single page. The
          handler clamps the value to [1, 200] before forwarding it
          to the read service.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
                  project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                  cloud_credential_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
                  state: approved
                  materialised: true
                  created_at: 2026-05-02T10:00:00Z
                  updated_at: 2026-05-02T11:00:00Z
                next_cursor: eyJjIjoiMDE5MGE4YjgifQ.signed
              schema:
                $ref: "#/components/schemas/CredentialAssignmentList"
          description: Page of Credential Assignments.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor, an out-of-range `limit`, or a malformed
            Project id.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to observe the parent Project
            (body is a `PermissionDenied` problem) OR the pagination
            cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay (body
            is a `Problem` with `code = cursor_binding_mismatch`).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: List the Credential Assignments owned by a Project.
      tags:
      - cloud
    post:
      description: |
        Opens a Credential Assignment request that binds the Cloud
        Credential named in the body to the Project identified by
        `{id}`. The handler runs a `manage` ReBAC check on the parent
        Project BEFORE the persistence write, then delegates to the
        Credential Assignment application service which records the
        request in the `requested` state and appends a
        `CredentialAssignmentRequested` outbox event in a single
        transaction.

        The newly opened assignment is not yet materialised — the
        binding only becomes live once an approver moves it to the
        `approved` state. A second open request for the same
        (Project, Cloud Credential) pair while an earlier one is still
        live is rejected with `409 duplicate_live_assignment`. A Cloud
        Credential that is not in an assignable lifecycle state is
        rejected with `422 credential_not_assignable`.
      operationId: RequestCredentialAssignment
      parameters:
      - $ref: "#/components/parameters/ProjectID"
      requestBody:
        content:
          application/json:
            example:
              cloud_credential_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1
            schema:
              $ref: "#/components/schemas/CredentialAssignmentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialAssignmentResponse"
          description: |
            Credential Assignment opened in the `requested` state. The
            `Location` header carries the canonical URL of the new
            assignment.
          headers:
            Location:
              description: |
                Canonical URL of the freshly opened Credential
                Assignment — `/v1/credential-assignments/{id}`.
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_project_id`, `invalid_body`,
            `invalid_cloud_credential_id` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Caller is not authenticated.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to manage the parent Project.
            Body is a `PermissionDenied` problem.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            A live Credential Assignment already exists for the same
            (Project, Cloud Credential) pair. Body is a `Problem` with
            `code: duplicate_live_assignment`.
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The named Cloud Credential is not in an assignable
            lifecycle state. Body is a `Problem` with
            `code: credential_not_assignable`.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      summary: Request a Credential Assignment for a Project.
      tags:
      - cloud
  /v1/credential-assignments/{id}/approve:
    post:
      description: |
        Approves the Credential Assignment identified by `{id}`. The
        handler reads the row to resolve the parent Project, runs the
        `manage` ReBAC check on that Project, then delegates to the
        Credential Assignment application service which moves the
        assignment to the `approved` state, materialises the binding,
        and appends a `CredentialAssignmentApproved` outbox event in a
        single transaction.

        Approval is only legal from the `requested` state — any other
        source state returns `409 illegal_transition`. The caller may
        not approve an assignment they themselves requested; that
        self-approval is rejected with `403 self_approval_denied`.
      operationId: ApproveCredentialAssignment
      parameters:
      - $ref: "#/components/parameters/CredentialAssignmentID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialAssignmentResponse"
          description: |
            Credential Assignment approved. Body is the metadata
            projection with `state: approved` and `materialised: true`.
        "400":
          content:
            application/problem+json:
              schema:
