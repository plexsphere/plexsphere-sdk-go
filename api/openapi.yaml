    ValueSchemaKind:
      description: |
        Discriminator for the five supported Label value-schema kinds
        .
      enum:
      - string
      - enum
      - numeric
      - boolean
      - regex
      type: string
    LabelValueSchema:
      description: |
        Polymorphic descriptor of a Label Definition's value contract.
        Callers must set `kind` to one of the five supported values;
        the sibling fields that accompany each kind are optional on the
        wire but enforced by the aggregate:
          * `string` — optional `max_len` (default 256 bytes).
          * `enum` — required `values` (non-empty, unique,
            non-blank).
          * `numeric` — optional `min` / `max` (int64).
          * `boolean` — no extra fields.
          * `regex` — required `pattern` (Go regexp).
        The `kind` property doubles as the OpenAPI discriminator so
        the generated TypeScript client can fan out into per-kind
        narrowing.
      discriminator:
        propertyName: kind
      example:
        min: 6
        max: 1
        kind: string
        values:
        - values
        - values
        pattern: pattern
        max_len: 0
      properties:
        kind:
          $ref: "#/components/schemas/ValueSchemaKind"
        max_len:
          description: |
            Maximum byte length for `kind=string` (default 256 when
            omitted; 0 is equivalent to the default).
          minimum: 0
          type: integer
        values:
          description: |
            Permitted string values for `kind=enum`. Non-empty, unique,
            non-blank.
          items:
            type: string
          type: array
        min:
          description: |
            Inclusive lower bound for `kind=numeric`. Omit for an open
            lower bound.
          format: int64
          type: integer
        max:
          description: |
            Inclusive upper bound for `kind=numeric`. Omit for an open
            upper bound.
          format: int64
          type: integer
        pattern:
          description: |
            Go regexp pattern for `kind=regex`. Compiled at aggregate
            build time; malformed patterns are rejected.
          type: string
      required:
      - kind
    LabelDefinition:
      description: |
        Response shape echoing a persisted Label Definition aggregate
        .
      example:
        local_key: local_key
        on_delete: block
        description: description
        created_at: 2000-01-23T04:56:07.000+00:00
        created_by: user
        cardinality: 5
        immutable: true
        applicable_kinds:
        - applicable_kinds
        - applicable_kinds
        cloud_tag_propagation: true
        updated_at: 2000-01-23T04:56:07.000+00:00
        scope_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        qualified_key: qualified_key
        scope: platform
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        value_schema:
          min: 6
          max: 1
          kind: string
          values:
          - values
          - values
          pattern: pattern
          max_len: 0
      properties:
        id:
          description: Label Definition identifier (UUIDv7).
          format: uuid
          type: string
        scope:
          $ref: "#/components/schemas/LabelDefinition_scope"
        scope_id:
          description: |
            Tenancy identifier. Zero UUID when `scope=platform`;
            non-zero Domain identifier when `scope=domain`; non-zero
            Project identifier when `scope=project`.
          format: uuid
          type: string
        local_key:
          description: |
            Unqualified key token (for example `env`, `cost-center`).
          type: string
        qualified_key:
          description: |
            Fully namespaced key (for example `platform/env`,
            `acme:checkout/owner`). Unique across the platform.
          type: string
        value_schema:
          $ref: "#/components/schemas/LabelValueSchema"
        applicable_kinds:
          description: |
            Lowercase object-kind whitelist (resource, node, project,
            domain, workload, network, …). Assignments whose
            `object.kind` is not in this set are rejected with
            `scope-mismatch`.
          items:
            type: string
          type: array
        on_delete:
          $ref: "#/components/schemas/LabelDefinition_on_delete"
        cardinality:
          default: 1
          description: |
            Declared per-object cardinality cap for Assignments of
            this Definition. `1` means at most one Assignment per
            object; `0` means unlimited (bounded only by the global
            64-per-object ceiling).
          type: integer
        immutable:
          description: |
            When `true`, the value schema is frozen and Assignments of
            this Definition may not have their value replaced
            .
          type: boolean
        cloud_tag_propagation:
          description: |
            When `true`, matching cloud tags are synchronised onto
            cloud resources by the Provisioning Broker.
          type: boolean
        description:
          description: Optional human description (at most 512 chars).
          type: string
        created_by:
          $ref: "#/components/schemas/LabelDefinition_created_by"
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
      required:
      - applicable_kinds
      - cardinality
      - cloud_tag_propagation
      - created_at
      - created_by
      - id
      - immutable
      - local_key
      - on_delete
      - qualified_key
      - scope
      - scope_id
      - updated_at
      - value_schema
    LabelDefinitionRequest:
      description: |
        Body for POST /v1/label-definitions. Mirrors the DDD
        `CreateDefinitionParams` shape: the caller names the scope as
