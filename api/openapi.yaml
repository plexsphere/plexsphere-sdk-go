    IdPBindingStatusRequest:
      description: |
        Body for PATCH /v1/admin/idp/{id}/status. Only `active` and
        `deactivated` are supported from this endpoint; transitions
        such as `degraded` are driven by background probes and cannot
        be set manually.
      example:
        status: active
      properties:
        status:
          $ref: "#/components/schemas/IdPBindingStatusRequest_status"
      required:
      - status
    IdPBindingPatchRequest:
      description: |
        Partial-update body for PATCH /v1/admin/idp/{id}. All fields are optional; only fields present in the
        request are mutated. the `status` field is
        intentionally absent from this schema — status transitions are
        performed exclusively through PATCH /v1/admin/idp/{id}/status.
      example:
        required_acr:
        - required_acr
        - required_acr
        claim_mappings:
          key: claim_mappings
        required_amr:
        - required_amr
        - required_amr
        discovery_url: discovery_url
        jit_policy: allow
      properties:
        discovery_url:
          description: OIDC discovery document URL (absolute http/https).
          type: string
        claim_mappings:
          additionalProperties:
            type: string
          description: |
            Mapping of plexsphere claim name → IdP claim name. An empty
            map clears all mappings.
        required_acr:
          description: Required OIDC ACR values.
          items:
            type: string
          type: array
        required_amr:
          description: Required OIDC AMR values.
          items:
            type: string
          type: array
        jit_policy:
          $ref: "#/components/schemas/IdPBindingRequest_jit_policy"
    GroupRequest:
      description: |
        Body for POST /v1/admin/groups. Field set mirrors the `Group`
        aggregate. DECISION: the aggregate enforces
        a source-specific invariant at construction time — `source=idp`
        requires both `idp_binding_id` (non-zero) AND `idp_claim_value`
        (non-empty); `source=manual` forbids both. Violations are
        rejected with a 400 Problem from validation rather than by a
        SQL CHECK constraint, so the failure surfaces in the transport
        layer rather than the persistence layer.
      example:
        domain_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        idp_claim_value: idp_claim_value
        idp_binding_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        source: manual
        display_name: display_name
        slug: slug
      properties:
        domain_id:
          description: Owning Domain.
          format: uuid
          type: string
        slug:
          description: |
            URL-safe identifier unique within `domain_id`. Lowercase
            ASCII letters, digits, and internal dashes only; cannot
            start or end with a dash.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]([a-z0-9-]{0,62}[a-z0-9])?$"
          type: string
        display_name:
          description: Human-friendly Group name.
          maxLength: 128
          type: string
        source:
          $ref: "#/components/schemas/GroupRequest_source"
        idp_binding_id:
          description: |
            IdP binding the Group is reconciled from. Required when
            `source=idp`; must be omitted when `source=manual`
            .
          format: uuid
          type: string
        idp_claim_value:
          description: |
            Verbatim IdP claim value the Group reconciles to. Required
            when `source=idp`; must be omitted when `source=manual`
            .
          type: string
      required:
      - display_name
      - domain_id
      - slug
      - source
