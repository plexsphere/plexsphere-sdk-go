      tags:
      - access
    post:
      description: |
        Issues a short-lived, session-scoped EdDSA JWT for one mediated
        target inside the owning Project. The handler runs the issuance
        ReBAC check on the targeted Resource BEFORE any persistence write,
        enforces the per-Domain step-up policy, clamps the requested TTL to
        the per-Domain ceiling, admits the session against the per-Domain
        concurrency and rate budgets, then mints one Session whose JTI is
        its own identifier and signs the canonical claim bytes with the
        per-Domain Signing Service key.

        The request body supplies the targeted `resource_id`, the session
        `kind` (`ssh`, `k8s`, or `tcp`), the matching per-kind `target`,
        an optional `requested_ttl_seconds` (silently clamped to the
        per-Domain maximum), and an optional `idempotency_key` (a repeat
        within the dedupe window returns the original session and token).

        The signed token is returned EXACTLY ONCE, in this response. It is
        never persisted server-side beyond its identifier and expiry, and
        the list and read projections never re-expose it.
      operationId: IssueSession
      parameters:
      - $ref: "#/components/parameters/SessionProjectID"
      requestBody:
        content:
          application/json:
            example:
              resource_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
              kind: ssh
              target:
                ssh:
                  user: incident-responder
                  allowed_commands:
                  - journalctl
                  - systemctl status
              requested_ttl_seconds: 1800
            schema:
              $ref: "#/components/schemas/IssueSessionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              example:
                session_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f2
                token: eyJhbGciOiJFZERTQSIsInR5cCI6ImF0K2p3dCIsImtpZCI6ImQwMSJ9.eyJqdGkiOiIwMTkwYThiOCJ9.sig
                expires_at: 2026-05-02T10:30:00Z
                listener_endpoint: 100.64.0.12:2200
                session:
                  id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f2
                  project_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1
                  domain_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1
                  resource_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e1
                  identity_id: 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a9
                  kind: ssh
                  status: active
                  issued_at: 2026-05-02T10:00:00Z
                  expires_at: 2026-05-02T10:30:00Z
                  last_active_at: 2026-05-02T10:00:00Z
                  target:
                    ssh:
                      user: incident-responder
                      allowed_commands:
                      - journalctl
                      - systemctl status
              schema:
                $ref: "#/components/schemas/IssuedSession"
          description: |
            Session issued. Body carries the metadata-only Session
            projection, the signed EdDSA JWT (delivered exactly once), the
            per-kind plexd listener endpoint, and the expiry. The
            `Location` header points at the single-Session read path.
          headers:
            Location:
              description: |
                Absolute path of the issued Session for the single-Session
                read.
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Invalid request — typically a malformed body, a `kind` that
            does not match the supplied `target` variant, or a per-kind
            target that fails a domain invariant. Body is a `Problem` with
            `code` ∈ { `invalid_body`, `invalid_target` }.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            Caller is not authenticated, OR the targeted kind requires a
            fresh step-up the caller has not satisfied. On the step-up
            path the body is a `Problem` with `code: step_up_required` and
            the response carries an RFC 9470 `WWW-Authenticate: Bearer
            error="insufficient_user_authentication"` challenge — with an
            `acr_values` parameter naming the required assurance set when
            the unmet requirement is an ACR, or the bare challenge when the
            unmet requirement is an AMR.
          headers:
            WWW-Authenticate:
              description: |
                RFC 9470 step-up challenge, present only on the
                step-up-required path.
              explode: false
              schema:
                type: string
              style: simple
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
          description: |
            Caller is not authorized to issue sessions on the targeted
            Resource, or the target lies outside the caller's authorised
            scope. Body is a `PermissionDenied` problem whose `reason` is
            `insufficient_relation` or `out_of_scope`.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The owning Project or the targeted Resource does not exist or
            is not visible. Body is a `Problem` with `code` ∈ {
            `project_not_found`, `resource_not_found` }.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The issuance could not be admitted. Body is a `Problem` with
            `code` ∈ { `session_limit_exceeded` (a per-Domain concurrency
            cap or the issuance rate limit is full — the breached dimension
            is named in `detail`), `idempotent_replay` (a prior request
            with the same idempotency key is still in flight) }.
        "501":
          content:
            application/problem+json:
              example:
                type: https://plexsphere.dev/errors/access-session-not-provisioned
                title: Not Implemented
                status: 501
                detail: "POST /v1/projects/{project_id}/sessions requires the production\
                  \ wiring of the access-orchestrator service. One or more ports are\
                  \ not yet provisioned in this build."
                instance: /v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1/sessions
                code: access_session_not_provisioned
              schema:
                $ref: "#/components/schemas/Problem"
          description: |
            The access-orchestrator surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `access_session_not_provisioned` so log scrapers can alert on
            the deferred-wiring state. Resolves once the issuance service
            and its signer / authz ports are wired into the v1 handler
            dependency cone.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Internal server error.
      security:
      - operatorBearer: []
      summary: "Issue a short-lived, session-scoped JWT for a mediated target."
      tags:
      - access
